gement: Creative elements structured, populated, and refreshed monthly to prevent fatigue.\n\n\u2022 47-Point Optimisation Checklist: Structured review covering audience signals, asset performance, budget pacing, conversion goals, and exclusion lists. The checklist is available for review upon request.\n\n\u2022 Audience Signal Configuration: Continuous refinement of audience signal inputs guiding the machine learning model.\n\n\u2022 Baseline Fee Required: GPM-MGMT-01 (\u20ac650/mo) applies in addition. Total: \u20ac1,015/mo.\n\n\u2022 Volume Discount: 2+ Google Ads services: 10% off campaign fees. 3+: 15%.\n\nWhy This Matters to You\n\nWithout expert management, PMax optimises for whatever is easiest to achieve, not what is most valuable to your business. Professional management ensures the algorithm is pointed at the right objectives.\n\nSKU: GPM-PMAX-01"}, {"id": "map_15_41", "category": "Google Paid Media", "label": "Remarketing", "oldName": "Google Retargeting (1x Campaign", "oldDesc": "A stand-alone Google Ads remarketing display campaign, required for multiphase paid media campaigns, where previous ad engagers can qualify for a specific offer.\nAd Spend not included", "oldPrice": "\u20ac145/mo", "oldRaw": 145, "newName": "Precision Display Remarketing Campaign", "newDesc": "This service manages a targeted display remarketing campaign that keeps your brand visible to people who have already visited your website but did not convert. By serving tailored ads to these warm prospects as they browse other websites and apps within Google's Display Network, it maintains brand recall and draws high-intent visitors back to a specific offer or conversion point.\n\n\u2022 Audience Segmentation & List Management: We build and maintain precise remarketing audience lists segmented by behaviour (page visited, time on site, products viewed, and cart abandonment) ensuring each prospect sees the most contextually relevant messaging.\n\n\u2022 Creative Rotation & Refresh: Display ad creatives are refreshed when performance signals indicate audience saturation, preventing ad fatigue and maintaining engagement among warm prospects.\n\n\u2022 Conversion-Focused Campaign Optimisation: The campaign is optimised toward driving specific return actions (form completions, purchases, or bookings) rather than passive impressions, ensuring budget is spent on meaningful re-engagement.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount, enquire for pricing based on your complete service combination.\n\nWhy This Matters to You\n\nThe vast majority of people who visit your website for the first time will not convert on that visit. Remarketing ensures those prospects are not permanently lost. By staying visible across the web after their initial visit, you remain at the front of their mind and dramatically increase the probability of converting them on a return visit.\n\nSKU: GPM-REMK-01", "newPrice": "\u20ac185/mo", "newRaw": 185, "newSku": "GPM-REMK-01", "clientConcern": "\u20ac185/mo for display remarketing \u2014 who creates the display ad creative? If Diginauts, this is underpriced for design + management. If client must supply creative, this needs to be stated. 'Sliding Scale Discount' again without definition.", "providerConcern": "\u20ac185/mo is on the low end for the European market for campaign management \u2014 but viable as a lightweight add-on if the campaign is largely automated. Clarify explicitly: 'Campaign management only. Display creative is supplied by the client or can be produced via our Creative Engine packages.' This both protects scope and creates an upsell.", "recommendation": "ADD: 'Campaign management only. Display creative assets (banner ads, responsive display assets) must be supplied by the client or produced via our Creative Engine packages. Creative production is not included in this fee.' | ADD total cost: 'Baseline Google Ads Management Fee (\u20ac650/mo) is required. Total: \u20ac835/mo.' | RESOLVE sliding scale discount.", "rewrittenDesc": "Targeted display remarketing campaign keeping your brand visible to previous website visitors who did not convert.\n\n\u2022 Audience Segmentation & List Management: Precise remarketing lists segmented by behaviour.\n\n\u2022 Creative Rotation & Refresh: Campaign management only. Display creative assets (banner ads, responsive display assets) must be supplied by the client or produced via Creative Engine packages. Creative production is not included.\n\n\u2022 Conversion-Focused Optimisation: Optimised toward specific return actions, not passive impressions.\n\n\u2022 Baseline Fee Required: GPM-MGMT-01 (\u20ac650/mo) applies in addition. Total: \u20ac835/mo.\n\n\u2022 Volume Discount: 2+ Google Ads services: 10% off. 3+: 15%.\n\nWhy This Matters to You\n\nThe majority of first-time visitors will not convert. Remarketing ensures those prospects are not permanently lost.\n\nSKU: GPM-REMK-01"}, {"id": "map_19_27", "category": "Google Paid Media", "label": "Shopping Ads", "oldName": "Google Shopping Ads The Auto Spacebot (1x campaign)", "oldDesc": "Are you selling physical products online? In our Digiverse, we can connect your web store\u2019s online product feed to Google ads. This ensures real time processing of key product information such as price and availability. Google shopping ads also pull resources from your website to create ads within the Google shopping catalogue section.\u00a0\nAd spend not included", "oldPrice": "\u20ac120/mo", "oldRaw": 120, "newName": "Google Shopping Feed Management", "newDesc": "This service manages the technical bridge between your e-commerce store and Google Merchant Center, ensuring your product listings are always accurate, approved, and performing at their maximum potential within Google Shopping. A healthy, well-structured product feed is the non-negotiable foundation of any successful Shopping or Performance Max campaign.\n\n\u2022 Feed Connection & Synchronisation: We establish and maintain the live connection between your product catalogue and Google Merchant Center, ensuring pricing, availability, and product attributes update in real time as your inventory changes.\n\n\u2022 Feed Optimisation & Refinement: Product titles, descriptions, categories, and attributes are refined over time using performance data to improve Google's ability to match your products to the right search queries, increasing impressions and click-through rates.\n\n\u2022 Compliance & Policy Management: We actively monitor your feed against Google's Limited Use and Shopping policies, resolving disapprovals and policy flags to ensure your products remain eligible to serve at all times.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount, enquire for pricing based on your complete service combination.\n\nWhy This Matters to You\n\nA Shopping campaign is only as strong as the product feed behind it. Inaccurate prices, disapproved listings, or poorly optimised titles mean wasted budget and missed sales. This service ensures the foundation of your e-commerce advertising is always accurate, approved, and optimised; so your ad spend goes further.\n\nSKU: GPM -FEED-01", "newPrice": "\u20ac145/mo", "newRaw": 145, "newSku": "GPM -FEED-01", "clientConcern": "\u20ac145/mo sounds affordable but clients may assume this includes product data entry, photography coordination, and catalogue expansion. 'Feed Optimisation & Refinement' is described as ongoing improvement, but the actual time per month must be limited. 'Sliding Scale Discount' mentioned again without definition.", "providerConcern": "\u20ac145/mo only works if feed management is largely automated and the product catalogue is stable. Google Merchant Center disapprovals can be time-consuming to resolve \u2014 a single policy violation can require hours of troubleshooting that exceeds the monthly fee. Define a scope boundary: 'Feed monitoring, basic optimisation, and policy compliance management. Major feed restructuring or product data entry are scoped and quoted separately.'", "recommendation": "ADD: 'Feed management includes: monitoring, basic title/description optimisation, policy compliance management, and disapproval resolution. Major feed restructuring, supplemental feed creation, or product data entry are scoped and quoted separately.' | RESOLVE sliding scale discount across all Google Ads items.", "rewrittenDesc": "Manages the technical bridge between your e-commerce store and Google Merchant Center.\n\n\u2022 Feed Connection & Synchronisation: Live connection ensuring pricing, availability, and attributes update in real time.\n\n\u2022 Feed Optimisation & Refinement: Titles, descriptions, categories, and attributes refined using performance data. Feed management includes monitoring, basic optimisation, and policy compliance. Major feed restructuring or product data entry are scoped separately.\n\n\u2022 Compliance & Policy Management: Active monitoring and disapproval resolution.\n\n\u2022 Volume Discount: 2+ Google Ads services: 10% off. 3+: 15%.\n\n\u2022 Baseline Fee Required: GPM-MGMT-01 (\u20ac650/mo) applies in addition.\n\nWhy This Matters to You\n\nA Shopping campaign is only as strong as the product feed behind it. This service ensures the foundation of your e-commerce advertising is always accurate, approved, and optimised.\n\nSKU: GPM-FEED-01"}, {"id": "map_26_8", "category": "Paid Social", "label": "Paid Social: Single", "oldName": "Paid Social Media Facebook & Instagram (1x campaign)", "oldDesc": "Travel into the social media deep field to find your future customers with our advanced social media fight navigation system. Diginauts has been developing advanced creative and technical social media marketing models to help you navigate this complex yet opportune space.\nRecommended with Media Shower or higher.\u00a0Ad spend and video production not included.", "oldPrice": "\u20ac265/mo", "oldRaw": 265, "newName": "Baseline Paid Social Management Fee", "newDesc": "This is the essential management layer that keeps your paid social advertising accounts technically sound, continuously optimised, and fully reported. It covers the monthly foundational operational work that ensures your campaign investment is not wasted through technical errors, audience drift, or budget inefficiencies.\n\n\u2022 Technical Account Setup & Maintenance: We configure and maintain the technical foundation of your ad account, including pixel verification, conversion event mapping, and platform compliance checks to ensure your data is being captured correctly.\n\n\u2022 Campaign Monitoring & Optimisation: We actively monitor campaign performance on an ongoing basis, making data-driven adjustments to bids, budgets, placements, and targeting to improve efficiency and results over time.\n\n\u2022 Monthly Performance Reporting: You receive a clear, structured monthly report covering your key performance indicators (reach, engagement, cost-per-result, and return on ad spend) with plain-language commentary on what the data means and what actions are being taken.\n\n\u2022 Pixel & Tracking Health Audits: Regular checks confirm that your tracking pixels and conversion events are firing correctly, ensuring you're not losing valuable data that the algorithm depends on to optimise your campaigns.\n\nWhy This Matters to You\n\nPaid social campaigns left unmanaged deteriorate quickly. Costs rise, audiences saturate, and budgets are misallocated without consistent human oversight. This management fee ensures a dedicated specialist is actively protecting the health and performance of your advertising investment every single month.\n\nSKU: MPM-MGMT-01", "newPrice": "\u20ac650/mo", "newRaw": 650, "newSku": "MPM-MGMT-01", "clientConcern": "Identical structure and price to the Google base fee (\u20ac650/mo), which is good for consistency. But both promise 'monthly reporting'. A client running both Google and Meta campaigns may expect one unified report, or may expect two separate reports \u2014 neither expectation is addressed. 'Campaign Monitoring & Optimisation' could mean daily touch-time or weekly spot-checks; the level of attention isn't quantified.", "providerConcern": "Same reporting overlap concerns as Google base fee. If the client is on both base fees (\u20ac1,300/mo combined), the expectation of service depth increases proportionally. At \u20ac650/mo per platform, this is well-priced for the European market \u2014 but clarify: does the client receive one consolidated cross-platform report or two separate platform reports?", "recommendation": "ADD same base-fee callout as Google equivalent: 'This is a foundational management fee required alongside all paid social campaign services. Campaign-specific fees apply in addition.' | CLARIFY: 'Reporting is consolidated with the Google Ads monthly report where both platforms are active, delivered as a single cross-platform performance summary.' | ADD: 'Platform-side issues (Meta Business Suite bugs, iOS privacy changes) are monitored and reported but resolution is subject to platform timelines outside Diginauts' control.'", "rewrittenDesc": "This is the foundational management layer for all paid social advertising services. It covers account-level technical work, optimisation, and reporting. This fee is charged in addition to campaign-specific management fees.\n\n\u2022 Technical Account Setup & Maintenance: Pixel verification, conversion event mapping, and platform compliance checks.\n\n\u2022 Campaign Monitoring & Optimisation: Data-driven adjustments to bids, budgets, placements, and targeting on an ongoing basis.\n\n\u2022 Monthly Performance Reporting: Where both Google Ads and Paid Social base fees are active, reporting is consolidated into a single cross-platform performance summary \u2014 not two separate reports.\n\n\u2022 Pixel & Tracking Health Audits: Regular checks confirm tracking ": "", "rewrittenDesc": ""}, {"id": "map_53_57", "category": "YouTube", "label": "YouTube: Single", "oldName": "YouTube Video Campaign (1x campaign)", "oldDesc": "Introduce your offering to the world via the biggest video sharing platform in the Digiverse. Produce interesting and engaging video stories and promote them to highly targeted audiences on YouTube via Google\u2019s dynamic audience datasets.\nRecommended with Media Shower or higher. Ad spend and video production not included.", "oldPrice": "\u20ac170/mo", "oldRaw": 170, "newName": "YouTube Video Advertising", "newDesc": "This service manages dedicated video advertising campaigns on YouTube, the world's second-largest search engine and Google's most powerful video advertising environment. Using Google's dynamic audience datasets, we place your video content in front of highly specific user profiles (defined by interests, demographics, search behaviour, and purchase intent) ensuring your brand story reaches the prospects most likely to take action.\n\n\u2022 Audience Targeting & Segmentation: We leverage Google's intent-based audience tools (including affinity segments, in-market audiences, and custom intent audiences) to define precisely who sees your ads and in what context, maximising relevance and minimising wasted impressions.\n\n\u2022 Campaign Setup & Ongoing Management: We build and continuously optimise your YouTube campaign structure, including ad format selection (skippable in-stream, non-skippable, bumper, or discovery ads), bidding strategy, frequency capping, and placement targeting.\n\n\u2022 Performance Monitoring & Reporting: View-through rates, click-through rates, completed view percentages, and conversion data are monitored and reported on a regular basis with clear, actionable commentary.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount, enquire for pricing based on your complete service combination.\n\nWhy This Matters to Yo here builds the trust that makes your search and shopping ads significantly more effective.\n\nSKU: GPM-YTUB-01"}, {"id": "map_28_54", "category": "Social Content & Organic", "label": "Pay Per Post", "oldName": "Pay Per Post (PPP)", "oldDesc": "Create stellar social media organic content with Diginauts. Our social design team will research your industry, competitors, integrate your value propositions, plan your content pillars, design themes, messaging tones & formats, adapt all elements for best practice, create social posting schedules, and deliver your content in a ready to post format.", "oldPrice": "\u20ac75", "oldRaw": 75, "newName": "Strategic Social Content Design (PPP)", "newDesc": "A single, professionally designed organic social media post; researched, designed, written, and delivered ready to publish. Each post is developed with a strategic foundation, ensuring it reflects competitor intelligence, industry trends, and your brand's content pillars rather than being produced in isolation from a commercial context.\n\n\u2022 High-Resolution 4:5 Asset: 1 x professionally designed static image in the optimal feed format for Instagram, Facebook, and LinkedIn; designed to stop the scroll with clear visual hierarchy, brand alignment, and a compelling focal point.\n\n\u2022 SEO-Optimised Caption (up to 150 words): A professionally written caption structured for both human engagement and organic discoverability, with a clear narrative, natural keyword integration, and a defined call-to-action.\n\n\u2022 Hashtag Research & Strategic CTA: Platform-appropriate hashtag sets are researched and included alongside a call-to-action calibrated to your current campaign objective, whether driving profile visits, link clicks, saves, or shares.\n\nWhy This Matters to You\n\nOrganic social content that is designed with commercial intent, not just produced to fill a posting schedule, compounds in value over time. Consistent, high-quality posts build audience trust, support your paid advertising performance, and create a library of brand assets that continues working for you long after it is published.\n\nSKU: OSC -STATC-01", "newPrice": "\u20ac75 per Post/mo", "newRaw": 75, "newSku": "OSC -STATC-01", "clientConcern": "\u20ac75/post is straightforward. 'SEO-Optimised Caption (up to 150 words)' \u2014 the word cap is a good boundary. No revision limit mentioned. Client may expect platform-specific variations (different crops for Stories, LinkedIn) from a single unit.", "providerConcern": "\u20ac75 per post in the European market is competitive. State clearly: 'Delivered as a single 4:5 ratio asset. Platform-specific format variations (Stories, LinkedIn banners) are available at \u20ac25 per additional format.' This protects scope and creates a transparent upsell. Consider pricing as monthly batches (minimum 8 posts) for production efficiency.", "recommendation": "ADD: 'Delivered as a single 4:5 ratio image. Platform-specific format variations (Instagram Stories 9:16, LinkedIn landscape 1.91:1) are available at \u20ac25 per additional format.' | ADD: '1 round of revisions included per post.' | CONSIDER: 'Volume pricing: batches of 8+ posts per month are recommended for production efficiency and can be discussed during onboarding.'", "rewrittenDesc": "A single, professionally designed organic social media post \u2014 researched, designed, written, and delivered ready to publish.\n\n\u2022 High-Resolution 4:5 Asset: 1 x static image in optimal feed format. Platform-specific format variations (Stories 9:16, LinkedIn landscape) available at \u20ac25 per additional format.\n\n\u2022 SEO-Optimised Caption (up to 150 words): Professionally written with natural keyword integration and defined CTA.\n\n\u2022 Hashtag Research & Strategic CTA: Platform-appropriate hashtag sets included.\n\n\u2022 Revisions: 1 round included per post.\n\nWhy This Matters to You\n\nOrganic social content designed with commercial intent compounds in value over time. Consistent, high-quality posts build audience trust and support your paid advertising performance.\n\nSKU: OSC-STATC-01"}, {"id": "map_29_48", "category": "Social Content & Organic", "label": "Pay Per Reel", "oldName": "Pay Per Reel (PPR)", "oldDesc": "Design short form videos to ignite the core of your social media channels. Short form videos have better organic reach potential, allowing more people to see your content.", "oldPrice": "\u20ac135", "oldRaw": 135, "newName": "Short-Form Video Production (Reels) (PPR)", "newDesc": "Professional post-production of a single short-form vertical video asset, specifically engineered for high organic reach on Instagram Reels, TikTok, and YouTube Shorts. These assets are built around platform algorithm requirements, not just general video production standards, with a specific focus on maximising discoverability and watch-through rates within social feed environments.\n\n\u2022 High-Resolution Vertical Video (9:16, up to 45 seconds): A single vertical Reel produced to broadcast-quality standards, structured with a strong hook, high-retention mid-section, and a clear end-screen call-to-action.\n\n\u2022 Safe-Zone Optimisation: A technical layout review maps all text, graphics, and key visual elements against platform-specific UI dead zones (the areas where buttons, captions, and interface overlays appear) ensuring your headlines and key messaging are never obscured on any platform or device.\n\n\u2022 SEO-Optimised Caption & Hashtag Research: A professionally written caption and curated hashtag set designed to maximise the Reel's organic discoverability within the platform's search and recommendation systems.\n\nWhy This Matters to You\n\nShort-form video is the most algorithmically favoured content format on every major social platform. A professionally produced Reel that respects platform technical requirements (safe zones, correct dimensions, hook structure) will consistently outreach and outperform an unoptimised video, regardless of how good the underlying content is. Technical quality and creative quality must both be present.\n\nSKU: OSC -REEL-01", "newPrice": "\u20ac235 per Reel/mo", "newRaw": 235, "newSku": "OSC -REEL-01", "clientConcern": "'Up to 45 seconds' \u2014 client may push for 60s. \u20ac235/reel with 'broadcast-quality standards' is strong value but sets high expectations. 'SEO-Optimised Caption & Hashtag Research' is content writing bundled into a video SKU, which may confuse scope with standalone Social Content items.", "providerConcern": "\u20ac235 per reel in the European market is competitive and viable if source footage quality is good. The bundled caption/hashtag component means a copywriter is involved in what's otherwise a video production workflow \u2014 ensure your process accounts for this. Consider separating the caption as an optional add-on to simplify the production pipeline, or clearly position this as a 'complete reel package'.", "recommendation": "ADD: 'Duration up to 45 seconds. Reels exceeding 45 seconds are quoted as custom projects.' | CLARIFY scope boundary: 'Caption and hashtag research is included as part of this Reel production package. For ongoing social content management, see our Monthly Profile & Content Management service (OSC-MGMT-01).' | ADD: '1 round of revisions included. Additional rounds at \u20ac75/round.'", "rewrittenDesc": "Professional post-production of a single short-form vertical video asset for high organic reach on Instagram Reels, TikTok, and YouTube Shorts.\n\n\u2022 High-Resolution Vertical Video (9:16, up to 45 seconds): Produced to broadcast-quality standards with strong hook, high-retention mid-section, and clear CTA. Reels exceeding 45 seconds are quoted as custom projects.\n\n\u2022 Safe-Zone Optimisation: Technical layout review against platform-specific UI dead zones.\n\n\u2022 SEO-Optimised Caption & Hashtag Research: Professionally written caption and curated hashtag set included as part of this complete Reel package.\n\n\u2022 Revisions: 1 round of revisions included. Additional rounds at \u20ac75/round.\n\nWhy This Matters to You\n\nShort-form video is the most algorithmically favoured content format. A professionally produced Reel that respects platform technical requirements will consistently outperform an unoptimised video.\n\nSKU: OSC-REEL-01"}, {"id": "map_47_51", "category": "Social Content & Organic", "label": "Social Profile Setup", "oldName": "The Social Booster", "oldDesc": "Branded content designed to uplift the visual experience of your social media accounts, incl. Leaderboard banners, logo/profile circles and 4x posts, customised for Instagram, Facebook and LinkedIn.", "oldPrice": "\u20ac290", "oldRaw": 290, "newName": "Social Profile Visual Refresh", "newDesc": "A comprehensive visual redesign of your social media profiles across Instagram, Facebook, and LinkedIn, ensuring every element of your brand's social presence communicates professionalism, consistency, and credibility at first glance. This package updates both profile branding assets and delivers an initial batch of high-quality feed posts to populate the refreshed profiles.\n\n\u2022 Profile Icons & Banner Variations: 2 x professional profile icon variations and 2 x banner designs, each optimised for the specific dimensions and display requirements of Facebook, LinkedIn Company, and LinkedIn Member profiles, ensuring your brand renders correctly and impactfully on every platform.\n\n\u2022 4 x High-Resolution Feed Posts: 4 x custom-designed 4:5 static posts are produced to immediately populate your refreshed profiles with quality content, preventing the empty or inconsistent appearance that undermines the impact of new profile branding.\n\n\u2022 SEO-Optimised Captions & Hashtag Research: 4 x professionally written captions with targeted hashtag research and strategic CTAs, ready to accompany each post at publishing.\n\nWhy This Matters to You\n\nSocial media profiles are the digital equivalent of a shopfront window. Inconsistent branding, outdated imagery, or incorrectly sized assets immediately communicate a lack of professionalism, and send potential customers to competitors who look more established. This refresh ensures your social presence commands the trust your business deserves.\n\nSKU: OSC -REFR-01", "newPrice": "\u20ac390", "newRaw": 390, "newSku": "OSC -REFR-01", "clientConcern": "'2 x profile icon variations and 2 x banner designs' \u2014 client may expect platform-specific designs for each of Instagram/Facebook/LinkedIn (6 banners, not 2). '4 x posts' \u2014 are these unique or reused across platforms? Not specified.", "providerConcern": "\u20ac390 for the full social refresh package is reasonable for Europe. Clarify deliverables precisely: '2 banner designs delivered in 3 platform-specific size formats each' vs. '2 banner designs total.' This distinction prevents disputes. Specify: 'Posts are unique designs, each formatted for the primary platform with minor adaptations for cross-posting.'", "recommendation": "CLARIFY: '2 x banner designs, each delivered in 3 platform-specific formats (Facebook cover, LinkedIn Company banner, LinkedIn Member banner). 2 x profile icon variations formatted for all active platforms.' | CLARIFY: '4 x unique post designs. Each post is formatted for the primary platform (Instagram 4:5) with minor adaptations for cross-platform publishing.' | ADD: '1 round of revisions included on profile assets. Posts follow the standard PPP revision policy.'", "rewrittenDesc": "Comprehensive visual redesign of social media profiles across Instagram, Facebook, and LinkedIn.\n\n\u2022 Profile Icons: 2 x professional variations formatted for all active platforms.\n\n\u2022 Banner Designs: 2 x banner designs, each delivered in 3 platform-specific formats (Facebook cover, LinkedIn Company, LinkedIn Member).\n\n\u2022 4 x Feed Posts: 4 x unique post designs, each formatted for the primary platform (Instagram 4:5) with minor adaptations for cross-posting.\n\n\u2022 SEO-Optimised Captions: 4 x professionally written captions with hashtag research and CTAs.\n\n\u2022 Revisions: 1 round of revisions included on profile assets.\n\nWhy This Matters to You\n\nSocial profiles are your digital shopfront. Inconsistent branding immediately communicates a lack of professionalism. This refresh ensures your presence commands the trust your business deserves.\n\nSKU: OSC-REFR-01"}, {"id": "map_48_35", "category": "Social Content & Organic", "label": "Social Content Package", "oldName": "The Social Orbiter", "oldDesc": "Social Booster + 12x posts, customised for Instagram, Facebook and LinkedIn.", "oldPrice": "\u20ac610/mo", "oldRaw": 610, "newName": "Monthly Profile & Content Management", "newDesc": "A fully integrated monthly social media management package combining a complete profile visual refresh with a consistent, high-volume monthly content schedule. This service delivers 12 x custom-designed posts per month across your primary social channels, maintaining a high level of brand activity, audience engagement, and professional visual presence on an ongoing basis.\n\n\u2022 Everything from Social Profile Visual Refresh: The full profile refresh is included as the foundation (profile icons, banner variations across all three platforms, and the initial 4 x posts) establishing a professional brand baseline before ongoing management begins.\n\n\u2022 8 x Additional Monthly Posts: Beyond the 4 x posts included in the profile refresh, 8 x further custom-designed static posts are produced, each with a professionally written SEO-optimised caption, targeted hashtag research, and a strategic call-to-action, delivering 12 x posts in total per month.\n\n\u2022 Consistent Monthly Output: Content is planned, designed, written, and delivered on a structured monthly schedule, ensuring your social channels never go dark and your brand remains consistently active and visible to your audience.\n\nWhy This Matters to You\n\nConsistency , brand guidelines, social templates, or any visual output will be disappointed. 'Cross-Stakeholder Design Direction Alignment' implies facilitation of a workshop/meeting but doesn't scope: how many attendees? How many sessions? What if stakeholders disagree \u2014 is conflict resolution included?", "providerConcern": "This is a gateway service designed to sell subsequent design work \u2014 but if the audit doesn't lead to a design engagement, the \u20ac1,450 needs to stand on its own as profitable. At this price point for a European market, the fee is reasonable for a structured brand audit, but the output needs to be clearly defined (e.g., a documented brand audit report + competitive analysis deck) so the client perceives tangible value.", "recommendation": "ADD to description: 'Deliverables: A documented Brand Audit Report including competitive visual benchmarking, digital asset inventory, and a design direction recommendations deck. This is a research and strategy phase \u2014 no logos, brand guidelines, or design production is included.' | ADD: 'The Cross-Stakeholder Alignment session is scoped for up to 3 hours with up to 5 attendees. Additional sessions are quoted separately.' | ADD: 'This audit is designed to inform and de-risk subsequent design production \u2014 it is recommended as a prerequisite for all major brand or web design engagements.'", "rewrittenDesc": "A dedicated strategic research and audit phase that analyses your existing brand identity, competitive design landscape, and digital asset ecosystem. This is a research and strategy phase \u2014 no logos, brand guidelines, social templates, or design production is included.\n\n\u2022 Corporate Identity & Collateral Audit: Comprehensive review of existing brand assets assessing consistency, quality, and fitness for digital environments.\n\n\u2022 Competitive Visual Benchmarking: Structured analysis of competitors' visual presence across web, social, and advertising.\n\n\u2022 Digital Asset Require ents simultaneously; eliminating the need to reformat or repurpose assets manually.\n\n\u2022 Up to 30-Second Duration: Optimised for performance advertising within the proven attention window for paid social and search video placements, balancing message completeness with viewer retention rates.\n\n\u2022 Platform-Export Optimisation: Each ratio is exported to the precise technical specifications of its target platform (correct resolution, file size, frame rate, and encoding) ensuring maximum delivery quality and algorithmic favourability.\n\n\u2022 Existing Content Library Foundation: Assets are produced from your existing footage or content library, keeping production efficient and costs controlled while maximising the value of creative you already own.\n\nWhy This Matters to You\n\nA single video in a single format loses reach across every placement it is not correctly sized for. Platform algorithms favour native-format content, and incorrectly formatted ads are penalised with lower delivery and higher costs. This pack ensures every version of your creative is built correctly for every environment it will run in.\n\nSKU: MM-ADPK-01", "newPrice": "\u20ac950 per Videos", "newRaw": 950, "newSku": "MM-ADPK-01", "clientConcern": "'Existing Content Library Foundation' \u2014 client must supply footage. What if they don't have any? No contingency stated. 'Up to 30-Second Duration' \u2014 client may want 60s for YouTube pre-roll. 'Multi-Ratio Delivery' (1:1, 9:16, 16:9) is effectively three versions from one concept.", "providerConcern": "\u20ac950 per video pack delivering three ratio versions is well-priced for the European market. However, three ratios from one concept is operationally intensive. Add a prerequisite: 'Client must supply a minimum of X minutes of source footage at Y minimum resolution.' Define what happens if no footage is available (e.g., stock footage supplement at additional cost).", "recommendation": "ADD: 'Client must supply a minimum of 2 minutes of source footage at 1080p resolution or higher. If no source footage is available, stock footage supplementation is available at \u20ac150 per pack.' | ADD: 'Duration exceeding 30 seconds is quoted as a custom project.' | ADD: '1 round of revisions included. Additional rounds at \u20ac150/round.'", "rewrittenDesc": "A set of short-form video assets optimised for performance advertising, delivered in three platform-native formats from a single concept.\n\n\u2022 Multi-Ratio Delivery: 1:1 (feed), 9:16 (stories/reels), 16:9 (landscape) \u2014 three versions from one concept.\n\n\u2022 Up to 30-Second Duration: Duration exceeding 30 seconds is quoted as a custom project.\n\n\u2022 Platform-Export Optimisation: Each ratio exported to precise platform specifications.\n\n\u2022 Client-Supplied Footage: Client must supply minimum 2 minutes of source footage at 1080p+. If no source footage is available, stock footage supplementation is available at \u20ac150 per pack.\n\n\u2022 Revisions: 1 round included. Additional rounds at \u20ac150/round.\n\nWhy This Matters to You\n\nA single video in a single format loses reach across every placement it isn't correctly sized for. This pack ensures every version is built correctly for every environment.\n\nSKU: MM-ADPK-01"}, {"id": "map_41_1", "category": "Multimedia / Video", "label": "Animation", "oldName": "The Cosmic Animation", "oldDesc": "Project your brand into the Digiverse with animated video content. Create a deeper connection between your solutions and your ideal customer with engaging and well produced animated narratives. Requirements and animation styles can vary greatly, creating a wide range of scope potential, technology apps and budget possibilities.\n\nPrice varies per video", "oldPrice": "Custom", "oldRaw": null, "newName": "Ad Video Optimisation Package", "newDesc": "This service takes existing video content you already own and optimises it specifically for paid advertising deployment. Rather than producing new content from scratch, it transforms your current video material into correctly formatted, platform-ready advertising assets, maximising the return on content you have already invested in.\n\n\u2022 Format Optimisation for Ad Platforms: Your supplied footage is edited, cropped, and technically reconfigured to meet the specific format requirements of paid advertising placements (correct aspect ratios, durations, file specifications, and encoding standards for each target platform).\n\n\u2022 Up to 15-Second Duration: The supplied content is shaped into a high-impact 15-second performance creative, aligning with the proven optimal duration for paid social and search video advertising.\n\n\u2022 Multi-Ratio Output: Delivery includes the optimised asset in the standard required ratios, formatted for feed, story, and display placements as relevant to your campaign requirements.\n\nWhy This Matters to You\n\nRepurposing existing content for advertising is significantly more cost-efficient than producing new assets from scratch, but only if it is done correctly. Raw footage, marketing videos, or social content uploaded directly to ad platforms without proper optimisation performs poorly. This service bridges the gap, ensuring your existing content meets the technical and creative standards required to perform in a paid advertising environment.\n\nSKU: MM-OPTI-01", "newPrice": "\u20ac250 per Video", "newRaw": 250, "newSku": "MM-OPTI-01", "clientConcern": "'Up to 15-second duration' \u2014 client paying \u20ac250 may push for 20\u201330s and argue the value proposition doesn't change. 'Multi-ratio output' doesn't state how many ratios are included \u2014 if only 2 are delivered but client expects 4, there's a dispute. 'Existing video content you already own' \u2014 if supplied footage is poor quality, who decides whether it's usable? No clear rejection/re-brief mechanism.", "providerConcern": "If supplied footage is genuinely unusable (wrong aspect ratio, too low resolution, insufficient length), you're stuck \u2014 the description doesn't give grounds to reject and re-quote. Delivering multi-ratio exports from poorly shot source material means more editing time per unit than priced. At \u20ac250 per video this is reasonable for post-production only \u2014 but define the number of ratio exports included (e.g., 3 standard ratios).", "recommendation": "ADD to description: 'Delivered in 3 standard ratios: 1:1 (feed), 9:16 (stories/reels), 16:9 (landscape). Additional ratios at \u20ac50 each.' | ADD: 'Client supplies all source footage at minimum 1080p resolution. Footage quality is assessed before production begins \u2014 if footage is insufficient, client will be advised before work proceeds.' | ADD: '1 round of revisions included. Additional rounds at \u20ac75/round.'", "rewrittenDesc": "This service takes existing video content you already own and optimises it specifically for paid advertising deployment, transforming your current video material into correctly formatted, platform-ready advertising assets.\n\n\u2022 Format Optimisation for Ad Platforms: Your supplied footage is edited, cropped, and technically reconfigured to meet the specific format requirements of paid advertising placements (correct aspect ratios, durations, file specifications, and encoding standards).\n\n\u2022 Up to 15-Second Duration: The supplied content is shaped into a high-impact 15-second performance creative, aligning with the proven optimal duration for paid social and search video advertising.\n\n\u2022 Multi-Ratio Output: Delivery includes the optimised asset in 3 standard ratios \u2014 1:1 (feed), 9:16 (stories/reels), and 16:9 (landscape). Additional ratios are available at \u20ac50 each.\n\n\u2022 Client-Supplied Footage: Client supplies all source footage at minimum 1080p resolution. Footage quality is assessed before production begins \u2014 if footage is insufficient, you will be advised before work proceeds.\n\n\u2022 Revisions: 1 round of revisions included. Additional rounds at \u20ac75/round.\n\nWhy This Matters to You\n\nRepurposing existing content for advertising is significantly more cost-efficient than producing new assets from scratch, but only if done correctly. This service ensures your existing content meets the technical and creative standards required to perform in a paid advertising environment.\n\nSKU: MM-OPTI-01"}, {"id": "map_42_0", "category": "Multimedia / Video", "label": "Curated Video", "oldName": "The Curated Impulse", "oldDesc": "Ignite your Digital presence with curated videos. These videos do not require any on-site production. Incl. storyboarding (pre-production), media sourcing, post production, customised to your preferred marketing objectives and channels. \n\nPrice varies per video", "oldPrice": "Custom", "oldRaw": null, "newName": "Ad hoc video edit: Per Hour Rate:", "newDesc": "A flexible, on-demand video post-production service billed by the hour, providing access to professional editing resource for projects that do not fit a fixed-scope package. Ideal for one-off edits, existing video modifications, format conversions, or overflow production work that falls outside a standing creative package.\n\n\u2022 Remote Professional Video Editing: All editing is conducted remotely by a professional video editor using industry-standard post-production software, delivering polished results without on-site resource requirements.\n\n\u2022 Flexible Scope: Each hour of editing can be applied to cutting, sequencing, colour grading, subtitle addition, audio mixing, format conversion, asset optimisation, or any standard post-production task as directed.\n\n\u2022 Transparent Billing: Hours are logged accurately and billed at the agreed rate, with a clear scope confirmed before work begins to avoid ambiguity on deliverables.\n\nWhy This Matters to You\n\nNot every video project fits a fixed package. When you have existing footage that needs professional attention, a quick format conversion, or a standalone editing job, this hourly service provides professional quality without the overhead of a full production scope.\n\nSKU: MM-EDIT-01", "newPrice": "\u20ac60 per Hour", "newRaw": 60, "newSku": "MM-EDIT-01", "clientConcern": "No minimum billing increment stated \u2014 a client needing a 20-minute fix may dispute being billed a full hour. 'Any standard post-production task as directed' sets no boundary on what constitutes 'standard' \u2014 motion graphics, compositing, colour science work, and 3D all arguably fall under 'editing' to a non-specialist. No revision policy: if the client rejects the edit, does re-doing it count as a new billable hour or continuation of the original task?", "providerConcern": "At \u20ac60/hr with no minimum engagement, micro-tasks (5-minute tweaks) become admin-heavy and unprofitable. The scope confirmation step adds pre-production time that isn't billable. No cap on revision loops within a single engagement means a perfectionist client can burn hours on a single deliverable. Consider a 1-hour minimum billing increment.", "recommendation": "ADD to description: 'Minimum billing: 1 hour per engagement. Tasks under 1 hour are billed as 1 hour.' | ADD: 'Scope includes: cutting, sequencing, colour grading, subtitle addition, audio mixing, format conversion. Excludes: motion graphics, 3D animation, compositing, and VFX \u2014 these are quoted separately.' | ADD: '1 round of revisions included per engagement. Additional revision rounds billed at the hourly rate.' | ADD: 'A brief written scope confirmation is provided before work begins.'", "rewrittenDesc": "A flexible, on-demand video post-production service billed by the hour, providing access to professional editing resource for projects that do not fit a fixed-scope package.\n\n\u2022 Remote Professional Video Editing: All editing is conducted remotely using industry-standard post-production software, delivering polished results without on-site resource requirements.\n\n\u2022 Scope of Work: Each hour covers cutting, sequencing, colour grading, subtitle addition, audio mixing, format conversion, and asset optimisation. Motion graphics, 3D animation, compositing, and VFX are excluded from this service and quoted separately.\n\n\u2022 Minimum Billing: 1 hour minimum per engagement. Tasks under 1 hour are billed as 1 full hour.\n\n\u2022 Revisions: 1 round of revisions is included per engagement. Additional revision rounds are billed at the hourly rate.\n\n\u2022 Scope Confirmation: A brief written scope confirmation is provided before work begins to ensure alignment on deliverables.\n\nWhy This Matters to You\n\nNot every video project fits a fixed package. When you have existing footage that needs professional attention, a quick format conversion, or a standalone editing job, this hourly service provides professional quality without the overhead of a full production scope.\n\nSKU: MM-EDIT-01"}, {"id": "map_43_0", "category": "Multimedia / Video", "label": "Documentary Video", "oldName": "The Doc. Stargazer", "oldDesc": "Create a window that peeks into the world of your business. The ever popular documentary style video. Excellent for capturing testimonials, stories as well as showcasing capabilities and experience. Incl storyboarding (pre-production), media sourcing, post production, customised to your preferred marketing objectives & channels.", "oldPrice": "Custom", "oldRaw": null, "newName": "Ad hoc video edit: Per Hour Rate:", "newDesc": "A flexible, on-demand video post-production service billed by the hour, providing access to professional editing resource for projects that do not fit a fixed-scope package. Ideal for one-off edits, existing video modifications, format conversions, or overflow production work that falls outside a standing creative package.\n\n\u2022 Remote Professional Video Editing: All editing is conducted remotely by a professional video editor using industry-standard post-production software, delivering polished results without on-site resource requirements.\n\n\u2022 Flexible Scope: Each hour of editing can be applied to cutting, sequencing, colour grading, subtitle addition, audio mixing, format conversion, asset optimisation, or any standard post-production task as directed.\n\n\u2022 Transparent Billing: Hours are logged accurately and billed at the agreed rate, with a clear scope confirmed before work begins to avoid ambiguity on deliverables.\n\nWhy This Matters to You\n\nNot every video project fits a fixed package. When you have existing footage that needs professional attention, a quick format conversion, or a standalone editing job, this hourly service provides professional quality without the overhead of a full production scope.\n\nSKU: MM-EDIT-01", "newPrice": "\u20ac60 per Hour", "newRaw": 60, "newSku": "MM-EDIT-01", "clientConcern": "No minimum billing increment stated \u2014 a client needing a 20-minute fix may dispute being billed a full hour. 'Any standard post-production task as directed' sets no boundary on what constitutes 'standard' \u2014 motion graphics, compositing, colour science work, and 3D all arguably fall under 'editing' to a non-specialist. No revision policy: if the client rejects the edit, does re-doing it count as a new billable hour or continuation of the original task?", "providerConcern": "At \u20ac60/hr with no minimum engagement, micro-tasks (5-minute tweaks) become admin-heavy and unprofitable. The scope confirmation step adds pre-production time that isn't billable. No cap on revision loops within a single engagement means a perfectionist client can burn hours on a single deliverable. Consider a 1-hour minimum billing increment.", "recommendation": "ADD to description: 'Minimum billing: 1 hour per engagement. Tasks under 1 hour are billed as 1 hour.' | ADD: 'Scope includes: cutting, sequencing, colour grading, subtitle addition, audio mixing, format conversion. Excludes: motion graphics, 3D animation, compositing, and VFX \u2014 these are quoted separately.' | ADD: '1 round of revisions included per engagement. Additional revision rounds billed at the hourly rate.' | ADD: 'A brief written scope confirmation is provided before work begins.'", "rewrittenDesc": "A flexible, on-demand video post-production service billed by the hour, providing access to professional editing resource for projects that do not fit a fixed-scope package.\n\n\u2022 Remote Professional Video Editing: All editing is conducted remotely using industry-standard post-production software, delivering polished results without on-site resource requirements.\n\n\u2022 Scope of Work: Each hour covers cutting, sequencing, colour grading, subtitle addition, audio mixing, format conversion, and asset optimisation. Motion graphics, 3D animation, compositing, and VFX are excluded from this service and quoted separately.\n\n\u2022 Minimum Billing: 1 hour minimum per engagement. Tasks under 1 hour are billed as 1 full hour.\n\n\u2022 Revisions: 1 round of revisions is included per engagement. Additional revision rounds are billed at the hourly rate.\n\n\u2022 Scope Confirmation: A brief written scope confirmation is provided before work begins to ensure alignment on deliverables.\n\nWhy This Matters to You\n\nNot every video project fits a fixed package. When you have existing footage that needs professional attention, a quick format conversion, or a standalone editing job, this hourly service provides professional quality without the overhead of a full production scope.\n\nSKU: MM-EDIT-01"}, {"id": "map_9_14", "category": "CRM", "label": "CRM Setup", "oldName": "CRM Set-up and Configuration", "oldDesc": "A tailored CRM (Customer Relationship Management) infrastructure designed to capture, manage, and nurture your leads directly from your website. Diginauts doesn't just \"install\" software; we build a seamless bridge between your digital presence and your sales process. By connecting your WordPress site to your CRM via custom-mapped data fields, we ensure every visitor interaction is logged, categorised, and ready for follow-up without manual data entry.\nOur approach to CRM integration is built for efficiency and scale. We avoid heavy, bloated connection scripts that slow down your site. Instead, we implement \"lean\" integration methods that maintain your website's high-speed performance while ensuring 100% data accuracy. Whether you are capturing simple contact forms or complex multi-step lead qualifications, the data flow is secure, encrypted, and instantaneous.\nThe user experience is at the heart of our builds. We customise the lead capture journey specifically for mobile, tablet, and desktop users, ensuring that forms are easy to navigate and complete on any device. Beyond the technical setup, we configure your CRM dashboard and automated workflows \"by hand,\" tailoring the interface to match your specific business logic. You get a powerful, automated sales engine that is easy to manage and provides clear, actionable insights into your customer pipeline.", "oldPrice": "\u20ac700", "oldRaw": 700, "newName": "CRM Implementation & Lead Strategy", "newDesc": "This service builds the complete Customer Relationship Management (CRM) infrastructure required to capture, organise, and automatically follow up with every lead your website or marketing generates. Using lean integration methods that do not compromise your site's speed, it creates a seamless data bridge between your online presence and your sales process.\n\n\u2022 CRM Platform Configuration: We set up and configure your GoHighLevel CRM environment; building the pipeline structure, contact fields, tagging taxonomy, and user access configuration required to reflect your specific sales process from first enquiry through to closed deal.\n\n\u2022 Website Lead Capture Integration: Lead capture forms, chat widgets, or booking tools on your website are connected to the CRM, ensuring every submission is automatically categorised, tagged, and available in your pipeline the moment it arrives - with zero manual data entry required.\n\n\u2022 Automated Follow-Up Sequences: Initial automated response workflows are configured, ensuring that every enquiry receives an immediate, professional acknowledgement; maintaining lead interest and setting a professional standard from the first interaction.\n\n\u2022 Please Note: Complexity varies significantly between clients. Pricing reflects a base starting point; more complex CRM setups with advanced automation, integrations, or large data migrations are scoped and quoted based on specific requirements.\n\nWhy This Matters to You\n\nA CRM is the commercial nervous system of your business. Without it, leads fall through the gaps, follow-ups are forgotten, and the full value of your marketing investment is never realised. This implementation turns every enquiry your marketing generates into a properly tracked, systematically followed-up commercial opportunity.\n\nSKU: CRM-IMPL-01", "newPrice": "Custom", "newRaw": null, "newSku": "CRM-IMPL-01", "clientConcern": "Price is Custom with no stated base range \u2014 the description says 'base starting point' but never names a number. Clients will anchor to whatever was verbally quoted. 'Automated Follow-Up Sequences' has no limit on sequence count or step count. 'Complexity varies significantly between clients' is honest but doesn't protect you if scope wasn't documented before work began.", "providerConcern": "CRM implementation is the single highest scope-risk service on the card. The gap between a simple 3-field form connected to a pipeline and a multi-sequence, multi-pipeline, API-integrated system with lead scoring is enormous \u2014 but both fall under this SKU. Without a fixed scope document signed before work begins, this service will consistently over-deliver. In the European market, CRM implementation typically starts at \u20ac2,000\u2013\u20ac5,000+ \u2014 ensure your custom quotes reflect the actual complexity.", "recommendation": "**CONSIDER SPLITTING: Create tiered CRM packages \u2014 CRM Lite (basic form + pipeline setup, \u20ac2,000), CRM Standard (multi-sequence automation, \u20ac3,500), CRM Enterprise (custom integrations + lead scoring, \u20ac5,000+) \u2014 allowing clients to self-select complexity level.** | ADD: 'Indicative pricing: CRM implementations typically range from \u20ac2,000\u2013\u20ac5,000 depending on complexity. A detailed scope and fixed quote is provided after an initial discovery session.' | ADD: 'Automated follow-up sequences: up to 3 sequences of up to 5 steps each are included in the base scope. Additional sequences or advanced branching logic are scoped and quoted separately.' | ADD: 'A signed scope document is required before implementation begins. Changes to scope after sign-off are subject to change request pricing.'", "rewrittenDesc": "Complete CRM infrastructure to capture, organise, and automatically follow up with every lead your marketing generates.\n\n\u2022 CRM Platform Configuration: GoHighLevel CRM setup \u2014 pipeline structure, contact fields, tagging taxonomy, and user access configured to your sales process.\n\n\u2022 Website Lead Capture Integration: Forms, chat widgets, or booking tools connected to the CRM with zero manual data entry required.\n\n\u2022 Automated Follow-Up Sequences: Up to 3 initial automated response sequences of up to 5 steps each. Additional sequences or advanced branching logic are scoped and quoted separately.\n\n\u2022 Pricing: CRM implementations typically range from \u20ac2,000\u2013\u20ac5,000 depending on complexity. A detailed scope and fixed quote is provided after a discovery session. A signed scope document is required before implementation begins. Changes after sign-off are subject to change request pricing.\n\nWhy This Matters to You\n\nA CRM is the commercial nervous system of your business. Without it, leads fall through the gaps and the full value of your marketing investment is never realised. This implementation turns every enquiry into a properly tracked, systematically followed-up commercial opportunity.\n\nSKU: CRM-IMPL-01"}, {"id": "map_10_16", "category": "CRM", "label": "CRM Maintenance", "oldName": "CRM System Maintenance & Data Integrity", "oldDesc": "A CRM is only as powerful as the data within it. Our maintenance service ensures your system remains a high-performance tool, free from the \"data decay\" that typically plagues unmanaged systems. Diginauts provides a hands-on technical guardianship of your CRM environment, performing regular audits to ensure that the bridge between your website and your database remains seamless, secure, and lightning-fast.\nOur maintenance approach is proactive and precise. We don\u2019t just monitor for errors; we \"hand-clean\" your data structures, manage user permissions, and ensure that your lead-capture logic continues to function perfectly across all device types. As CRM platforms release updates and web standards evolve, we manage these transitions behind the scenes, preventing any disruption to your workflow or data loss.\n\n5 hours a month cap", "oldPrice": "\u20ac350/mo", "oldRaw": 350, "newName": "CRM Support & Data Integrity Management", "newDesc": "This monthly service keeps your CRM environment operating at its highest level of effectiveness through proactive maintenance, data hygiene management, and ongoing optimisation. It prevents the gradual deterioration of CRM data quality, known as data decay, that silently undermines automated marketing performance and sales pipeline accuracy over time.\n\n\u2022 Data Integrity Audits & Cleaning: We conduct regular structured audits of your contact database, identifying and resolving duplicate records, incomplete data fields, incorrect tags, and outdated contact information - ensuring your pipeline and marketing lists remain accurate and actionable.\n\n\u2022 Automation & Workflow Maintenance: As the GoHighLevel platform evolves and your business processes change, we proactively manage the maintenance of your automation workflows, ensuring they continue to function correctly without disruption to your lead flow or sales sequences.\n\n\u2022 CRM-to-Website Data Bridge Monitoring: The technical connection between your website lead capture and your CRM is monitored and maintained, with proactive intervention if form submissions or data flows are disrupted.\n\n\u2022 Please Note: The complexity and volume of monthly management varies by client. Pricing reflects a base starting point; more complex environments are priced based on scope.\n\nWhy This Matters to You\n\nA CRM that is not actively maintained degrades rapidly. Duplicate records, stale data, and broken automations mean your marketing emails start bouncing, your sales team works from inaccurate information, and automated workflows that were working on day one quietly stop firing. This service is the proactive management discipline that prevents that deterioration.\n\nSKU: CRM-SUPP-01", "newPrice": "Custom", "newRaw": null, "newSku": "CRM-SUPP-01", "clientConcern": "Price is Custom, frequency listed as 'once' but the service is monthly \u2014 same billing mismatch. 'Data Integrity Audits' implies Diginauts guarantees data quality \u2014 if a campaign underperforms because of dirty CRM data, the client may argue this service should have caught it. No defined SLA on response time for broken automations or data flow disruptions.", "providerConcern": "'CRM-to-Website Data Bridge Monitoring' means you're responsible for a connection that can break due to WordPress updates, plugin conflicts, hosting changes, or GHL platform updates \u2014 none of which you control. Fix the billing frequency. In the European market, managed CRM support is typically \u20ac300\u2013\u20ac800/mo depending on complexity \u2014 ensure your custom quotes reflect this.", "recommendation": "**CONSIDER SPLITTING: Separate into CRM Support: Lite (monitoring + data audits only, \u20ac250/mo) and CRM Support: Active (monitoring + workflow maintenance + bridge management, \u20ac500/mo) to create a scalable path.** | FIX: Change billing frequency from 'once' to 'monthly'. | ADD: 'Monthly support scope includes: up to X hours of data auditing, workflow maintenance, and bridge monitoring. Issues exceeding this allocation are quoted separately or addressed at the hourly AI Integration rate.' | ADD: 'Data quality is a shared responsibility. Diginauts maintains the technical infrastructure and identifies data issues \u2014 but source data accuracy depends on correct data entry practices by the client's team.'", "rewrittenDesc": "Monthly CRM maintenance keeping your environment operating at peak effectiveness through proactive data hygiene, workflow maintenance, and monitoring.\n\n\u2022 Data Integrity Audits & Cleaning: Regular audits resolving duplicates, incomplete fields, incorrect tags, and outdated contacts. Data quality is a shared responsibility \u2014 Diginauts maintains the technical infrastructure and identifies issues, but source data accuracy depends on correct data entry practices by your team.\n\n\u2022 Automation & Workflow Maintenance: Proactive management as the GoHighLevel platform evolves and your processes change.\n\n\u2022 CRM-to-Website Data Bridge Monitoring: The connection between your website and CRM is monitored with proactive intervention if data flows are disrupted.\n\n\u2022 Monthly Scope: Includes a defined allocation of maintenance hours per month. Issues exceeding this allocation are addressed at the hourly rate or carried to the following month.\n\n\u2022 Pricing: Varies by complexity. A base starting point is quoted after assessing your CRM environment.\n\nWhy This Matters to You\n\nA CRM that is not actively maintained degrades rapidly. This service is the proactive management discipline that prevents that deterioration.\n\nSKU: CRM-SUPP-01"}, {"id": "map_22_15", "category": "CRM", "label": "CRM Subscription", "oldName": "Managed CRM Subscription & Ecosystem Access", "oldDesc": "The Infrastructure: Your all-in-one license and high-speed environment.\nThis subscription provides your business with the \"keys to the kingdom.\" It covers the essential licensing and the enterprise-grade cloud infrastructure required to host your data. Unlike standard \"off-the-shelf\" software that surprises you with extra fees for storage or API usage, this is a fixed-cost gateway to a high-performance environment.\n\u2022 Software Licensing: Full access to the CRM ecosystem and WordPress-integrated tools.\n\u2022 High-Speed Hosting: Dedicated cloud resources so your system stays fast as your database grows.\n\u2022 Connectivity: Covers the \"always-on\" data bridge between your website and your sales team.\n\u2022 Security: Advanced encryption and server-side protocols to keep customer data locked down.", "oldPrice": "\u20ac50/mo", "oldRaw": 50, "newName": "CRM Platform Ecosystem & Cloud Hosting", "newDesc": "This is a fixed monthly software access fee that covers your GoHighLevel CRM platform licensing and the enterprise-grade cloud hosting infrastructure required to operate your CRM environment. It is the foundational access layer that keeps your lead capture, automation, and database infrastructure securely operational at all times.\n\n\u2022 GoHighLevel Platform License: Access to the GoHighLevel CRM platform under our agency ecosystem; providing the full suite of CRM, automation, pipeline, and communication tools without requiring you to manage a direct platform account.\n\n\u2022 Enterprise Cloud Infrastructure: The hosting resources, data security, and uptime reliability of your CRM environment are maintained at an enterprise level, ensuring your lead capture and automation systems remain operational around the clock.\n\n\u2022 Base Fee Coverage: The standard monthly fee covers most single-business CRM use cases. More complex configurations with multiple sub-accounts, advanced integrations, or significantly higher usage volumes may require an adjusted pricing arrangement.\n\n\u2022 Please Note: Pricing scales with usage complexity. Our base fee is competitive when compared to equivalent enterprise CRM platforms.\n\nWhy This Matters to You\n\nYour CRM is a live, mission-critical business system. The moment it goes down or loses access, your lead capture stops, your automations pause, and your sales team loses visibility of their pipeline. This hosting fee ensures the infrastructure behind your CRM is always available, always secure, and always managed at a professional level.\n\nSKU: CRM-HOST-01", "newPrice": "Custom", "newRaw": null, "newSku": "CRM-HOST-01", "clientConcern": "Price is Custom but frequency is listed as 'once' in the system \u2014 this is a monthly recurring fee. Invoicing confusion is guaranteed. Client may compare to raw GHL pricing ($97\u2013$497/mo) visible on the GHL website and question the markup. 'More complex configurations' may incur higher fees, but the thresholds aren't defined.", "providerConcern": "This is a margin play on GHL reselling. If GHL increases their pricing (which they have done historically), your margin shrinks unless you pass the increase through. 'Enterprise Cloud Infrastructure' is strong language \u2014 make sure your actual hosting setup justifies the term. Fix the billing frequency from 'once' to 'monthly' before going live. In the European market, managed CRM hosting at a reasonable markup on GHL is justifiable \u2014 but be prepared for clients who Google the raw platform cost.", "recommendation": "FIX: Change billing frequency from 'once' to 'monthly'. | ADD: 'This is a managed platform access fee. The base fee covers standard single-business CRM usage. Multi-location setups, sub-accounts, or high-volume automation usage may require an adjusted fee \u2014 this will be discussed during onboarding.' | ADD: 'Platform pricing is reviewed annually. Clients will be notified 30 days in advance of any fee adjustments.'", "rewrittenDesc": "A fixed monthly software access fee covering your GoHighLevel CRM platform licensing and enterprise-grade cloud hosting infrastructure.\n\n\u2022 GoHighLevel Platform License: Full suite access under our agency ecosystem.\n\n\u2022 Enterprise Cloud Infrastructure: Hosting, data security, and uptime reliability maintained at enterprise level.\n\n\u2022 Base Fee Coverage: The standard monthly fee covers most single-business CRM use cases. Multi-location setups, sub-accounts, or high-volume automation usage may require an adjusted fee \u2014 discussed during onboarding.\n\n\u2022 Platform Pricing: Reviewed annually. Clients notified 30 days in advance of any adjustments.\n\nWhy This Matters to You\n\nYour CRM is a live, mission-critical business system. This hosting fee ensures the infrastructure is always available, secure, and managed at a professional level.\n\nSKU: CRM-HOST-01"}, {"id": "map_34_45", "category": "SEO", "label": "SEO", "oldName": "SEO The Algorithmic Crawler (Per website)", "oldDesc": "Help your future customers navigate digital space by making your WordPress website more discoverable on Google\u2019s organic search results. These rankings are earned, and do not form part of Google\u2019s paid advertising rankings.\u00a0\nOrganic traffic accounts for some of the highest quality web traffic a brand or company can capture. Diginaut\u2019s SEO offer incl. superior on-page meta data structuring, in-depth keyword analysis, SEO content research, SEO content design, fine tuning SERP features to boost visibility and leveraging relevant Google apps.\nExternal link building does not form part of our service. Please inquire for more info on Diginaut\u2019s SEO service scope as there are a wide range of configuration options available.\nCost depends on requirements and scope", "oldPrice": "Custom", "oldRaw": null, "newName": "SEO Maintenance: Base", "newDesc": "This service provides the essential monthly technical maintenance required to protect and incrementally improve your website's position in organic search results. It addresses the continuous stream of on-page issues, performance signals, and content opportunities that, if left unmanaged, cause search rankings to erode over time.\n\n\u2022 SE Ranking Platform Audits: We run regular technical SEO audits using enterprise-grade software to identify crawl errors, broken links, duplicate content, missing metadata, page speed issues, and other ranking-suppressing technical faults.\n\n\u2022 On-Page Issue Remediation: Identified issues are actioned and fixed on a rolling monthly basis, ensuring your website remains technically sound and fully crawlable by Google's indexing systems.\n\n\u2022 Rank Tracking & Performance Reporting: Your target keyword positions are tracked weekly, with monthly reporting showing ranking movements, organic traffic trends, and click-through rate performance from Google Search Console data.\n\nWhy This Matters to You\n\nSEO is not a one-time project, it is an ongoing discipline. Search engines continuously re-evaluate websites, competitors regularly update their content, and technical issues accumulate over time. Without active monthly maintenance, rankings that took months to build can be lost in weeks. This service protects your existing organic investment and creates the stable foundation required for sustainable search growth.\n\nSKU: SEO-MNT-01", "newPrice": "\u20ac750/mo", "newRaw": 750, "newSku": "SEO-MNT-01", "clientConcern": "'SE Ranking Platform Audits' \u2014 naming the tool is transparent but may concern clients who prefer other tools. \u20ac750/mo for SEO maintenance is competitive for Europe. Does this include content updates or just technical fixes? 'Issue Remediation' has no cap on fixes per month.", "providerConcern": "\u20ac750/mo is well-priced for the European market for ongoing SEO maintenance. Define the monthly scope clearly: e.g., 'Up to X hours of technical remediation, X pages audited, X priority issues addressed.' Without this, demanding clients will submit unlimited fix requests. Naming SE Ranking is fine but have a transition plan if you switch tools.", "recommendation": "**CONSIDER SPLITTING: Create SEO Maintenance: Base (technical audits + remediation, current scope) and SEO Maintenance: Growth (technical + 1 monthly content piece, \u20ac1,100/mo) to create a clear upgrade path that includes content production.** | ADD: 'Monthly scope includes: 1 x technical SEO audit, rank tracking, and remediation of up to 5 priority issues identified in the audit. Issues beyond this allocation are carried to the following month or addressed at the hourly development rate.' | ADD: 'Content creation, copywriting, and new page development are not included in this maintenance service. See Content Gap Analysis (SEO-GAP-01) for content production.'", "rewrittenDesc": "Essential monthly technical SEO maintenance to protect and incrementally improve organic search performance.\n\n\u2022 SE Ranking Platform Audits: Regular technical audits identifying crawl errors, broken links, duplicate content, and ranking-suppressing faults.\n\n\u2022 On-Page Issue Remediation: Up to 5 priority issues addressed per month. Issues beyond this allocation are carried to the following month or addressed at the hourly rate. Content creation and new page development are not included \u2014 see Content Gap Analysis (SEO-GAP-01).\n\n\u2022 Rank Tracking & Performance Reporting: Target keywords tracked weekly with monthly reporting.\n\nWhy This Matters to You\n\nSEO is an ongoing discipline. Without active maintenance, rankings that took months to build can be lost in weeks. This service protects your organic investment.\n\nSKU: SEO-MNT-01"}, {"id": "map_33_44", "category": "Project Management", "label": "Project Management", "oldName": "Project Manager", "oldDesc": "Allocating your very own Diginaut to help you solve problems and assist with tasks as they relate to services that Diginauts is able to offer or support. \n\n10 hours per month 20% discount", "oldPrice": "\u20ac440/mo", "oldRaw": 440, "newName": "Project Management fee", "newDesc": "A flexible, per-hour project management service providing dedicated coordination, timeline oversight, and cross-team resource management for complex, multi-service engagements. This ensures that when multiple service lines are running simultaneously (creative, paid media, development, and data) they are all aligned, on schedule, and progressing toward your business goals in a coordinated and accountable way.\n\n\u2022 Dedicated Account Oversight: A named project manager maintains responsibility for the coordination of all active service lines within your account, acting as the single point of communication between your organisation and all execution teams.\n\n\u2022 Agile Sprint Tracking & Timeline Enforcement: Work is organised and tracked in structured sprint cycles with clear milestones, ensuring deliverables are produced to schedule and any delays or blockers are identified and escalated immediately.\n\n\u2022 Stakeholder Status Reporting: Regular structured status updates are delivered to your stakeholders; covering progress against milestones, upcoming actions, budget pacing, and any decisions requiring client input.\n\n\u2022 Quality Assurance Workflows: Before any deliverable is presented to you, it passes through a defined quality assurance process to ensure it meets the agreed brief, technical specifications, and brand standards.\n\nWhy This Matters to You\n\nComplex digital marketing programmes involve multiple disciplines, vendors, timelines, and stakeholders. Without dedicated project management, misaligned priorities, missed deadlines, and poor communication between teams quietly erode the value of every service you are investing in. This service ensures everything runs in coordination, and that you always know exactly where things stand.\n\nSKU:\u00a0AS-PROJ-01", "newPrice": "\u20ac55 per Hour/mo", "newRaw": 55, "newSku": "AS-PROJ-01", "clientConcern": "\u20ac55/hr for project management is competitive for the European market. 'Named project manager' creates a personal relationship expectation \u2014 what happens during leave or turnover? 'Quality Assurance Workflows' implies every deliverable is QA'd, but against what standards if the brief was vague?", "providerConcern": "\u20ac55/hr for PM is at the lower end of the European market (typically \u20ac75\u2013\u20ac120/hr). This rate works for volume but may signal junior capability to larger clients. Consider whether this rate reflects actual cost-to-serve. 'Named project manager' is a strong commitment \u2014 ensure cover arrangements are in place. The QA promise needs a documented process to be defensible.", "recommendation": "ADD: 'A named project manager is assigned. In the event of leave or absence, a qualified substitute is provided with full project context.' | ADD: 'QA is conducted against the signed brief and any documented specifications. Deliverables produced from undocumented verbal briefs are subject to client approval without a QA quality claim.' | CONSIDER: Adding a minimum monthly engagement (e.g., 5 hours minimum) to justify the 'named PM' commitment.", "rewrittenDesc": "Flexible per-hour project management providing coordination, timeline oversight, and cross-team resource management.\n\n\u2022 Dedicated Account Oversight: A named project manager coordinates all active service lines. In the event of leave or absence, a qualified substitute is provided with full context.\n\n\u2022 Agile Sprint Tracking: Work organised in structured sprint cycles with clear milestones.\n\n\u2022 Stakeholder Status Reporting: Regular updates on progress, budget pacing, and required decisions.\n\n\u2022 Quality Assurance Workflows: Deliverables pass through a defined QA process measured against the signed brief and documented specifications. Deliverables from undocumented verbal briefs are subject to client approval without a QA quality claim.\n\nWhy This Matters to You\n\nComplex digital programmes involve multiple disciplines and timelines. Without dedicated project management, misaligned priorities erode value. This service ensures everything runs in coordination.\n\nSKU: AS-PROJ-01"}, {"id": "new_2", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "AI Agent & Core Workflow Automation Setup", "newDesc": "A fixed-scope deployment of smart automated workflows and custom AI agents, designed to systematically eliminate repetitive manual tasks from your business operations. Using leading integration platforms and LLM APIs, this service maps, designs, and launches 2-3 core automation sequences - turning operational bottlenecks into autonomous, AI-powered processes.\n\n\u2022 Core Business Process Mapping (2-3 Workflows): We identify and document 2-3 repetitive operational sequences that are consuming disproportionate manual time (such as lead scoring and routing, automated content generation, customer communication workflows, or internal reporting processes) and design the automation logic for each.\n\n\u2022 Multi-Platform Workflow Automation (Make/Zapier): We build and deploy the automation sequences using industry-leading integration platforms, connecting your existing tools and data sources without requiring custom code wherever native integrations exist.\n\n\u2022 Structured Prompt Engineering: For any AI-driven steps within the workflow, we design and calibrate the prompt architectures that ensure the AI component produces consistent, accurate, and commercially appropriate outputs within the automated sequence.\n\n\u2022 Operational Team Handover & Training: We document the deployed automations clearly and conduct a structured handover session with your team, ensuring they understand how to monitor, adjust, and extend the workflows independently after delivery.\n\nWhy This Matters to You\n\nManual, repetitive processes are expensive - not just in direct time cost, but in the human error, inconsistency, and staff frustration they generate. Each automation deployed under this service continues working reliably, at scale, without those costs - freeing your team to focus on work that genuinely requires human judgement and creativity.\n\nSKU: AI-AUTO-01", "newPrice": "\u20ac1,850", "newRaw": 1850, "newSku": "AI-AUTO-01", "clientConcern": "'2\u20133 core automation sequences' \u2014 a client may define a single 'sequence' as a 15-step workflow with conditional branching across 4 platforms, while Diginauts may define it as a linear 3-step trigger-action chain. No definition of sequence complexity anywhere. The handover implies self-sufficiency, but if something breaks post-delivery, clients will expect support. API subscription costs (Make/Zapier plans, LLM API tokens) are not mentioned \u2014 client may assume these are included in the \u20ac1,850 fee.", "providerConcern": "\u20ac1,850 for 2\u20133 automations is viable for straightforward workflows but one complex Make scenario with error handling, conditional paths, and API rate limit management can consume the entire budget alone. No ongoing support is included, but 'extend the workflows independently' language creates an implicit expectation of availability for questions. Clearly state that third-party platform subscription costs (Make/Zapier/API tokens) are borne by the client.", "recommendation": "ADD: 'A single automation sequence is defined as a linear or lightly branched workflow of up to 8 steps across up to 2 connected platforms. Workflows exceeding this complexity are scoped and quoted separately.' | ADD: 'Third-party platform subscription costs (Make/Zapier plans, API tokens, LLM usage fees) are borne by the client and not included in this fee.' | ADD: 'Post-delivery support is not included. Ongoing maintenance and troubleshooting can be engaged via our hourly AI Integration rate (AI-INT-01).'", "re
