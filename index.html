writtenDesc": "A fixed-scope deployment of smart automated workflows and custom AI agents, designed to eliminate repetitive manual tasks from your business operations.\n\n\u2022 Core Business Process Mapping (2\u20133 Workflows): We identify and document 2\u20133 repetitive operational sequences and design the automation logic for each. A single automation sequence is defined as a linear or lightly branched workflow of up to 8 steps across up to 2 connected platforms. Workflows exceeding this complexity are scoped and quoted separately.\n\n\u2022 Multi-Platform Workflow Automation (Make/Zapier): We build and deploy the automation sequences using industry-leading integration platforms, connecting your existing tools and data sources.\n\n\u2022 Structured Prompt Engineering: For any AI-driven steps, we design and calibrate the prompt architectures that ensure consistent, accurate, and commercially appropriate outputs.\n\n\u2022 Operational Team Handover & Training: We document the deployed automations clearly and conduct a structured handover session with your team.\n\n\u2022 Third-Party Costs: Platform subscription costs (Make/Zapier plans, API tokens, LLM usage fees) are borne by the client and are not included in this fee.\n\n\u2022 Post-Delivery Support: Post-delivery support is not included. Ongoing maintenance and troubleshooting can be engaged via our hourly AI Integration rate (AI-INT-01, \u20ac120/hr).\n\nWhy This Matters to You\n\nManual, repetitive processes are expensive \u2014 not just in direct time cost, but in the human error, inconsistency, and staff frustration they generate. Each automation deployed continues working reliably, at scale, without those costs.\n\nSKU: AI-AUTO-01"}, {"id": "new_3", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "AIO Visibility Shield", "newDesc": "Artificial intelligence is fundamentally changing how people find information online. Tools like Google AI Overviews, ChatGPT, Perplexity, and similar platforms now answer search queries directly; often without the user ever visiting a website. This service tracks where your brand appears within those AI-generated responses and makes targeted content adjustments to improve your visibility within them.\n\n\u2022 AI Citation Tracking: Using SE Ranking's AI monitoring tools, we track whether and how your brand, content, and key topics are being cited within AI-generated search responses across major platforms; providing visibility into an entirely new category of search real estate.\n\n\u2022 AI Fragment Optimisation: We identify the specific content structures, answer formats, and authority signals that AI search engines favour when selecting sources to cite, and make targeted on-page adjustments to align your content with those patterns.\n\n\u2022 Reporting & Trend Monitoring: Monthly reporting shows changes in AI citation frequency, which topics are generating AI appearances, and how this new traffic channel is evolving, giving you early intelligence in a rapidly developing landscape.\n\nWhy This Matters to You\n\nAI-generated answers are displacing traditional search results at an accelerating pace. Brands that appear prominently within those answers gain visibility and credibility without the user needing to search further. This service ensures you are not invisible in the search environment of tomorrow.\n\nSKU: SEO-AIO-01", "newPrice": "\u20ac250/mo", "newRaw": 250, "newSku": "SEO-AIO-01", "clientConcern": "'Targeted content adjustments' is dangerously ambiguous \u2014 does this mean rewriting entire pages, adding FAQ schema, tweaking meta descriptions, or restructuring content architecture? A client paying \u20ac250/mo will interpret this as whatever they need it to be. 'AI Citation Tracking' relies on SE Ranking's AI monitoring, but the accuracy of these tools is still immature \u2014 clients may challenge the data. No baseline or KPI is established, making it hard to prove value.", "providerConcern": "The AI search landscape changes monthly \u2014 what works for AI visibility today may be irrelevant in 6 months. You're selling a service where the deliverable definition is inherently unstable. \u20ac250/mo only works if 'adjustments' are metadata-level, not content rewrites. A single article rewrite triggered by citation findings would consume the entire monthly margin. Define the scope as monitoring + reporting + minor metadata adjustments, with content rewrites priced separately.", "recommendation": "ADD: 'This service includes: monthly AI citation monitoring and reporting, plus minor on-page metadata adjustments (meta descriptions, heading structures, FAQ schema) to improve AI visibility. Full content rewrites or new article creation are not included \u2014 see Content Gap Analysis (SEO-GAP-01) for content production.' | ADD: 'AI search visibility is an emerging discipline. Results are tracked and reported transparently, but specific ranking or citation outcomes cannot be guaranteed.'", "rewrittenDesc": "AI is fundamentally changing how people find information online. This service tracks where your brand appears within AI-generated search responses and makes targeted adjustments to improve your visibility.\n\n\u2022 AI Citation Tracking: Using SE Ranking's AI monitoring tools, we track whether and how your brand is being cited within AI-generated search responses across major platforms.\n\n\u2022 AI Fragment Optimisation: We make targeted on-page metadata adjustments (meta descriptions, heading structures, FAQ schema) to align your content with the patterns AI search engines favour. Full content rewrites and new article creation are not included \u2014 see Content Gap Analysis (SEO-GAP-01) for content production.\n\n\u2022 Reporting & Trend Monitoring: Monthly reporting shows changes in AI citation frequency and how this channel is evolving.\n\n\u2022 Important Note: AI search visibility is an emerging discipline. Results are tracked and reported transparently, but specific ranking or citation outcomes cannot be guaranteed.\n\nWhy This Matters to You\n\nAI-generated answers are displacing traditional search results at an accelerating pace. Brands that appear prominently within those answers gain visibility and credibility. This service ensures you are not invisible in the search environment of tomorrow.\n\nSKU: SEO-AIO-01"}, {"id": "new_4", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Andromeda Hook Bolt-on", "newDesc": "Andromeda Hook Bolt-on: Alternative Visual Introduction for Existing Video\n\nThis is an add-on to an existing Andromeda Pulse Video. It produces a single new 3-second visual opening sequence for the same core video, using a completely different visual setup, scene, or graphic treatment. This allows you to run two distinct versions of the same ad and let the algorithm identify which opening performs best; without the cost of producing an entirely new video.\n\n\u2022 Unique Visual Entry Point: A fresh 3-second intro is designed and produced using a visually distinct concept from the original hook, ensuring it registers as a genuinely different creative stimulus for the audience.\n\n\u2022 Seamless Integration: The new intro is cut and delivered as a complete, standalone video; ready to upload and run as a separate creative variant alongside the original.\n\n\u2022 Algorithm-Driven Testing: Running multiple hook variations on the same body of content accelerates the algorithm's ability to identify the most efficient creative, lowering your cost-per-result over time.\n\nWhy This Matters to You\n\nThe first three seconds of a paid video determine whether the viewer stops scrolling or keeps moving. Testing multiple visual entry points on the same core message is one of the most cost-efficient optimisation strategies available. This bolt-on delivers that capability at a fraction of the cost of a full additional video.\n\nSKU: MPM -ANDR-02", "newPrice": "\u20ac125", "newRaw": 125, "newSku": "MPM -ANDR-02", "clientConcern": "Described as a 'bolt-on' but there's no stated prerequisite that an Andromeda Pulse Video must have been purchased. A client could theoretically order this standalone and then argue they need the base video too. No revision count \u2014 if the 3-second hook doesn't land, how many iterations are included? 'Completely different visual setup' \u2014 who defines what qualifies as 'completely different'?", "providerConcern": "At \u20ac125 for a 3-second creative piece, margin depends entirely on complexity. If the client expects a fully new concept (different scene, graphic treatment) vs. a simple re-edit of existing footage, the time investment is vastly different. Add an explicit prerequisite: 'Requires an existing Andromeda Pulse Video (MPM-ANDR-01).' Define revision count (e.g., 1 round included).", "recommendation": "ADD prerequisite: 'This is an add-on service. Requires an existing Andromeda Pulse Video (MPM-ANDR-01). Cannot be ordered as a standalone item.' | ADD: '1 round of revisions included. Additional iterations at \u20ac50 each.' | CLARIFY: 'A distinct visual hook means a different opening scene, graphic treatment, or visual concept \u2014 not a minor variation of the original.'", "rewrittenDesc": "An add-on to an existing Andromeda Pulse Video (MPM-ANDR-01 \u2014 required prerequisite, cannot be ordered standalone). It produces a single new 3-second visual opening sequence using a completely different visual concept, allowing you to run two distinct versions of the same ad.\n\n\u2022 Unique Visual Entry Point: A fresh 3-second intro is designed using a visually distinct concept from the original hook \u2014 meaning a different opening scene, graphic treatment, or visual setup, not a minor variation.\n\n\u2022 Seamless Integration: The new intro is delivered as a complete, standalone video ready to upload alongside the original.\n\n\u2022 Algorithm-Driven Testing: Running multiple hook variations accelerates the algorithm's ability to identify the most efficient creative.\n\n\u2022 Revisions: 1 round of revisions included. Additional iterations at \u20ac50 each.\n\nWhy This Matters to You\n\nThe first three seconds determine whether the viewer stops scrolling. Testing multiple visual entry points is one of the most cost-efficient optimisation strategies available.\n\nSKU: MPM-ANDR-02"}, {"id": "new_5", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Andromeda Pulse Video", "newDesc": "A standalone, professionally produced 15-second video asset built specifically for performance advertising on Meta platforms. This is a purpose-built paid media creative, engineered for algorithm favourability, scroll-stopping visual impact, and conversion-oriented structure - not a general brand video repurposed for ads.\n\n\u2022 Performance-Optimised Video Production: A single 15-second video is produced to paid media best-practice specifications, including correct aspect ratios, safe-zone compliance, and platform-native design principles to maximise delivery efficiency.\n\n\u2022 Conversion-Focused Structure: The video is built around a proven performance framework (a strong visual hook in the first three seconds, a clear value proposition in the middle, and a direct call-to-action close) to drive measurable action from viewers.\n\n\u2022 Platform-Native Delivery: The final asset is delivered in the correct format, resolution, and file specification required for optimal placement across Meta's feed, story, and reel environments.\n\nWhy This Matters to You\n\nA video that performs on social media looks very different from a brand film or a general marketing video. Paid media creative must communicate value and trigger action within seconds, in a format the algorithm rewards with lower costs and wider reach. This service produces an asset built to that specific standard.\n\nSKU: MPM -ANDR-01", "newPrice": "\u20ac395", "newRaw": 395, "newSku": "MPM -ANDR-01", "clientConcern": "'Purpose-built paid media creative' but no mention of who supplies raw footage, b-roll, product shots, or brand assets. If the client assumes Diginauts shoots or sources this, \u20ac395 is well below production costs and expectations will be misaligned. 'Single 15-second video' \u2014 client may want 30s or expect a second version for a different platform. No revision limit stated.", "providerConcern": "This is priced as post-production only, but the description reads like a full production service. Explicitly state: 'Client supplies all raw footage and brand assets. On-site production is not included.' At \u20ac395 for a 15-second performance video, margin is reasonable for post-production work \u2014 but only if the brief-to-delivery cycle is tight. Add a revision limit (e.g., 2 rounds).", "recommendation": "ADD: 'Client supplies all raw footage, product shots, and brand assets. On-site filming or footage sourcing is not included in this service.' | ADD: '1 round of revisions included. Additional rounds at \u20ac100/round.' | ADD: 'Delivered in the primary platform ratio (9:16 for Meta). Additional ratio exports available at \u20ac75 each.'", "rewrittenDesc": "A standalone, professionally produced 15-second video asset built specifically for performance advertising on Meta platforms. This is purpose-built paid media creative \u2014 not a general brand video repurposed for ads.\n\n\u2022 Performance-Optimised Video Production: A single 15-second video produced to paid media specifications, including correct aspect ratios, safe-zone compliance, and platform-native design principles.\n\n\u2022 Conversion-Focused Structure: Built around a proven performance framework \u2014 strong visual hook, clear value proposition, direct call-to-action close.\n\n\u2022 Platform-Native Delivery: Delivered in the primary platform ratio (9:16 for Meta). Additional ratio exports are available at \u20ac75 each.\n\n\u2022 Client-Supplied Assets: Client supplies all raw footage, product shots, and brand assets. On-site filming or footage sourcing is not included.\n\n\u2022 Revisions: 1 round of revisions included. Additional rounds at \u20ac100/round.\n\nWhy This Matters to You\n\nA video that performs on social media looks very different from a brand film. Paid media creative must communicate value and trigger action within seconds, in a format the algorithm rewards. This service produces an asset built to that specific standard.\n\nSKU: MPM-ANDR-01"}, {"id": "new_6", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Auto Dashboard Reporting", "newDesc": "This is a recurring software access fee that provides you with a continuously live, interactive reporting dashboard consolidating performance data from all your active marketing channels into a single, always-available view. No more requesting monthly reports or manually compiling data from multiple platforms; your numbers are live, integrated, and automatically narrated.\n\n\u2022 24/7 Secure Cloud Dashboard Access: A branded, secure reporting environment accessible from any device at any time, giving you and your team real-time visibility into marketing performance without waiting for a human to compile a report.\n\n\u2022 Native API Connections - Up to 5 Channels: Live data connections to up to five core marketing channels (e.g., Google Ads, Meta Ads, GA4, LinkedIn, Shopify) are maintained and updated automatically on a daily basis.\n\n\u2022 Automated Weekly & Monthly AI Narrative Summaries: Beyond raw data, the dashboard generates automated written performance summaries using AI, translating numbers into plain-language commentary on what is working, what has changed, and where attention is required.\n\n\u2022 Multi-Platform ROI Roll-Ups: Cross-channel return on investment is calculated and displayed in a unified view, showing not just individual channel performance but the aggregate return on your total marketing investment.\n\nWhy This Matters to You\n\nData that lives inside individual advertising platforms and requires manual extraction is data that does not inform decisions fast enough. This dashboard puts every number, from every channel, in one place (always current, always accessible) so you can identify issues and opportunities in real time rather than weeks after they occurred.\n\nSKU: DATA-DASH-01", "newPrice": "\u20ac85/mo", "newRaw": 85, "newSku": "DATA-DASH-01", "clientConcern": "'Up to 5 channels' \u2014 clients will read this as 'I get 5' not 'I get up to 5 depending on complexity'. If they have 7 channels, they'll expect all 7 or demand to know the per-channel uplift cost. 'AI Narrative Summaries' \u2014 if the AI generates inaccurate or misleading performance commentary and the client acts on it, who bears responsibility? No human QA step is mentioned for the AI output.", "providerConcern": "\u20ac85/mo as a software access fee requires extremely low touch-time to be profitable. If clients email with questions about their dashboard weekly, the support cost exceeds the fee within the first month. Add a disclaimer that AI-generated summaries are indicative, not advisory. Platform pricing changes flow directly to your margin \u2014 build in a review clause.", "recommendation": "ADD: 'Dashboard connects up to 5 marketing channels. Additional channel connections are available at \u20ac25/channel/mo.' | ADD: 'AI-generated narrative summaries are indicative performance commentary, not strategic advice. Diginauts reviews summaries for accuracy but recommends clients verify key decisions against raw data or consult with their account manager.' | ADD: 'Dashboard software costs are subject to annual review in line with platform pricing.'", "rewrittenDesc": "A recurring software access fee providing a continuously live, interactive reporting dashboard consolidating performance data from your active marketing channels into a single view.\n\n\u2022 24/7 Secure Cloud Dashboard Access: A branded, secure reporting environment accessible from any device at any time.\n\n\u2022 Native API Connections \u2014 Up to 5 Channels: Live data connections to up to 5 core marketing channels (e.g., Google Ads, Meta Ads, GA4, LinkedIn, Shopify). Additional channel connections are available at \u20ac25/channel/mo.\n\n\u2022 Automated AI Narrative Summaries: The dashboard generates automated written performance summaries translating numbers into plain-language commentary. AI-generated summaries are indicative performance commentary, not strategic advice. Diginauts reviews summaries for accuracy but recommends verifying key decisions against raw data.\n\n\u2022 Multi-Platform ROI Roll-Ups: Cross-channel return on investment is calculated and displayed in a unified view.\n\n\u2022 Pricing Note: Dashboard software costs are subject to annual review in line with underlying platform pricing.\n\nWhy This Matters to You\n\nData that lives inside individual advertising platforms and requires manual extraction does not inform decisions fast enough. This dashboard puts every number, from every channel, in one place \u2014 always current, always accessible.\n\nSKU: DATA-DASH-01"}, {"id": "new_7", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Baseline Google Ads Management Fee", "newDesc": "This is the foundational management layer required for all standalone Google Ads service lines. It covers the essential account-level technical work, ongoing health monitoring, and performance reporting that underpins every campaign in your Google Ads environment - ensuring your advertising infrastructure is always set up correctly, tracked accurately, and reported on clearly.\n\n\u2022 Technical Account Setup & Configuration: We handle the core technical establishment of your Google Ads account environment, including conversion tracking integration, audience list setup, account linking (Google Analytics 4, Merchant Center, Search Console), and billing configuration.\n\n\u2022 Pixel & Conversion Tracking Maintenance: We maintain and verify the accuracy of your conversion tracking signals; ensuring that every form submission, purchase, call, or booking is correctly attributed to the campaigns driving it.\n\n\u2022 Campaign Monitoring & Health Checks: Ongoing monitoring of account-level health metrics, budget pacing, quality score trends, and policy compliance flags, with proactive intervention when issues are identified.\n\n\u2022 Monthly Performance Reporting: A clear, structured monthly performance report covering all active campaigns, with plain-language analysis of results and forward-looking optimisation recommendations.\n\nWhy This Matters to You\n\nThe technical foundation of your Google Ads account directly determines the quality of data available for optimisation. Incorrect conversion tracking, broken audience lists, or misconfigured account settings can silently waste significant budget. This baseline management fee ensures those foundations are always sound \u2014 and that you always know how your investment is performing.\n\nSKU: GPM-MGMT-01", "newPrice": "\u20ac650/mo", "newRaw": 650, "newSku": "GPM-MGMT-01", "clientConcern": "This is a base fee that sits UNDER all Google campaign-specific services \u2014 but the description reads like a complete service. A client could reasonably interpret 'Campaign Monitoring & Health Checks' and 'Monthly Performance Reporting' as full campaign management and question why they're paying additional fees for individual campaign types. The stacking model (\u20ac650 base + \u20ac425 Search + \u20ac365 PMax etc.) needs to be explicitly shown in proposals, not discovered at invoice time.", "providerConcern": "The reporting promise appears in this base fee AND in most individual campaign items. Are you producing one consolidated report or multiple? If clients expect a separate report per campaign plus a base-level report, the reporting burden alone could exceed the fee. 'Proactive intervention when issues are identified' is an open-ended commitment \u2014 a single billing misconfiguration investigation can consume hours. At \u20ac650/mo this is a healthy fee for account-level management, but scope boundaries need to be airtight.", "recommendation": "ADD prominent callout: 'This is a foundational management fee required alongside all campaign-specific services. It does not include campaign creation or management \u2014 campaign services are listed separately and their fees apply in addition to this baseline.' | CLARIFY reporting: 'One consolidated monthly performance report is produced covering all active campaigns under this account. Individual campaign items do not generate separate reports.' | ADD: 'Account-level health interventions are limited to issues identified during scheduled monitoring. Emergency response or out-of-cycle troubleshooting is billed at the Project Management hourly rate.'", "rewrittenDesc": "This is the foundational management layer required for all standalone Google Ads service lines. It covers account-level technical work, health monitoring, and performance reporting. This fee is charged in addition to campaign-specific management fees \u2014 it does not include campaign creation or management.\n\n\u2022 Technical Account Setup & Configuration: Conversion tracking integration, audience list setup, account linking (GA4, Merchant Center, Search Console), and billing configuration.\n\n\u2022 Pixel & Conversion Tracking Maintenance: We maintain and verify accuracy of your conversion tracking signals.\n\n\u2022 Campaign Monitoring & Health Checks: Ongoing monitoring of account-level health metrics, budget pacing, quality scores, and policy compliance, with proactive intervention when issues are identified. Account-level health interventions are limited to issues identified during scheduled monitoring \u2014 emergency response is billed at the Project Management hourly rate.\n\n\u2022 Monthly Performance Reporting: One consolidated monthly performance report covering all active campaigns, with analysis and forward-looking recommendations. Individual campaign items do not generate separate reports.\n\n\u2022 Important: Campaign-specific management fees apply in addition to this baseline. Your total monthly investment is this fee plus any campaign management fees. See individual campaign items for pricing.\n\nWhy This Matters to You\n\nThe technical foundation of your Google Ads account directly determines the quality of data available for optimisation. Incorrect tracking, broken audience lists, or misconfigured settings silently waste budget. This baseline fee ensures those foundations are always sound.\n\nSKU: GPM-MGMT-01"}, {"id": "new_10", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Content Gap Analysis", "newDesc": "This service identifies the specific topics, keywords, and content formats where your competitors are outranking you, and then produces a high-quality, search-optimised article specifically designed to close those gaps and claim that organic visibility for your brand.\n\n\u2022 Comprehensive Competitor Content Audit: We conduct a structured analysis of your top organic competitors, mapping the keywords they rank for that you currently do not, the content formats that are earning them traffic, and the topic areas where your website has no presence; producing a clear, prioritised opportunity report.\n\n\u2022 Authority Article Production: One fully researched, professionally written, and SEO-optimised article is produced each month targeting a high-value gap identified in the audit. Each article is structured to satisfy both human readers and search engine ranking requirements, and is formatted to compete for AI-generated search answer fragments (AI-Ready).\n\nWhy This Matters to You\n\nYour competitors' search rankings are a direct map of the revenue your website is currently missing. Every keyword they rank for and you don't represents a pool of potential customers finding them instead of you. This service systematically identifies those gaps and produces the content required to close them, turning competitor intelligence into your own organic growth.\n\nSKU: SEO-GAP-01", "newPrice": "\u20ac450/mo", "newRaw": 450, "newSku": "SEO-GAP-01", "clientConcern": "\u20ac450/mo for a competitor content audit AND a professionally written article is strong value. But the article scope is uncapped: no word count range, no research depth limitation, no topic complexity boundary. 'SEO-optimised' and 'AI-Ready' are outcome promises that can't be guaranteed \u2014 if the article doesn't rank within 3\u20136 months, the client may challenge the service's effectiveness.", "providerConcern": "At \u20ac450/mo, this works if the audit is largely automated (SE Ranking export) and the article is written efficiently. However, if a client's industry requires deep technical knowledge (medical, legal, financial), research and writing time per article could exceed profitability. Define article scope (e.g., 800\u20131,200 words) and state that specialist industries may require a content supplement fee.", "recommendation": "ADD: 'Article scope: 1 x professionally written article of 800\u20131,200 words per month, targeting a priority keyword gap identified in the audit.' | ADD: 'SEO optimisation follows current best practices for on-page structure, keyword integration, and schema markup. Ranking outcomes are influenced by domain authority, competition, and backlink profile \u2014 specific ranking positions or timelines cannot be guaranteed.' | ADD: 'Specialist industries (medical, legal, financial) requiring expert-level research may incur a content supplement fee \u2014 this will be discussed during onboarding.'", "rewrittenDesc": "This service identifies topics and keywords where competitors outrank you, then produces a high-quality article to close those gaps.\n\n\u2022 Comprehensive Competitor Content Audit: We map keywords competitors rank for that you do not, producing a prioritised opportunity report.\n\n\u2022 Authority Article Production: 1 x professionally written article of 800\u20131,200 words per month, targeting a priority keyword gap. Structured for both human readers and search engine ranking requirements.\n\n\u2022 SEO & AI Optimisation: Each article follows current best practices for on-page structure and keyword integration. Ranking outcomes are influenced by domain authority, competition, and backlink profile \u2014 specific ranking positions or timelines cannot be guaranteed.\n\n\u2022 Specialist Industries: Industries requiring expert-level research (medical, legal, financial) may incur a content supplement fee \u2014 discussed during onboarding.\n\nWhy This Matters to You\n\nYour competitors' search rankings are a direct map of the revenue your website is currently missing. This service systematically identifies those gaps and produces the content required to close them.\n\nSKU: SEO-GAP-01"}, {"id": "new_11", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Creative Engine: Essential", "newDesc": "This package delivers the minimum recommended volume of paid social creative assets to keep your ad campaigns active, tested, and performing. It provides a structured monthly output of video, static, and carousel formats designed to feed your advertising campaigns with fresh signal.\n\n\u2022 Short-Form Video Production: 1 x 15-second performance video produced monthly, formatted and optimised for paid social placement across Meta platforms.\n\n\u2022 Carousel Ad Assets: 1 x multi-frame carousel asset developed to guide the viewer through a product, story, or offer sequence in a single ad unit.\n\n\u2022 Static Display Ads: 4 x high-resolution static image ads, designed to perform across feed and story placements with clear visual hierarchy and call-to-action.\n\n\u2022 Hook Variations: 2 x alternative 3-second opening sequences for the core video, allowing the algorithm to identify which visual intro drives the highest engagement and lowest cost per result.\n\nWhy This Matters to You\n\nCreative is the single largest controllable variable in paid social performance. Without a regular supply of fresh assets, ad fatigue sets in, costs rise, and results decline. This package ensures your campaigns always have the minimum viable creative rotation required to maintain efficiency and generate reliable data for optimisation.\n\nSKU: MPM -CREAT-01", "newPrice": "\u20ac850/mo", "newRaw": 850, "newSku": "MPM -CREAT-01", "clientConcern": "Deliverable counts are clear (1 video, 1 carousel, 4 statics, 2 hooks) \u2014 good. But no revision count per asset type. 'Minimum recommended volume' language is a double-edged sword: it validates the package but gives the client ammunition to argue they need more. No mention of who provides creative direction, brand guidelines, or photography/footage.", "providerConcern": "At \u20ac850/mo for 8 assets, you're at roughly \u20ac106/asset. For the European market this is competitive but requires templatised production and minimal revision loops. If even one asset requires a full creative concept (not just format adaptation), the economics stretch. Define: '1 round of revisions per asset included; additional rounds at \u20acX.' Clarify that the client supplies brand guidelines and creative direction.", "recommendation": "ADD: '1 round of consolidated revisions per monthly asset batch. Additional revision rounds at \u20ac150/round.' | ADD: 'Client supplies brand guidelines, approved imagery/photography, and creative direction. Diginauts produces the assets \u2014 strategic campaign planning and creative strategy are not included at this tier.' | CHANGE: 'Minimum recommended volume' to 'Entry-level creative volume' to avoid the implication that more is needed.", "rewrittenDesc": "The entry-level creative production package delivering the minimum volume of paid social assets to keep campaigns active and tested.\n\n\u2022 1 x 15-Second Performance Video, 1 x Carousel Ad, 4 x Static Display Ads, 2 x Hook Variations.\n\n\u2022 Client Responsibilities: Client supplies brand guidelines, approved imagery/photography, and creative direction. Diginauts produces the assets \u2014 strategic campaign planning is not included at this tier.\n\n\u2022 Revisions: 1 round of consolidated revisions per monthly asset batch. Additional rounds at \u20ac150/round.\n\n\u2022 Feedback Window: Consolidated feedback is due within 3 business days of asset delivery. Feedback received after this window is applied to the following month's production cycle.\n\nWhy This Matters to You\n\nCreative is the single largest controllable variable in paid social performance. Without a regular supply of fresh assets, ad fatigue sets in and results decline. This package ensures your campaigns always have the minimum creative rotation required to maintain efficiency.\n\nSKU: MPM-CREAT-01"}, {"id": "new_12", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Creative Engine: Growth", "newDesc": "This package delivers a significantly elevated volume of paid social creative assets engineered for brands actively scaling their advertising investment. The increased output enables systematic creative testing across multiple audience segments, driving down cost-per-result as winning formats are identified and reinforced.\n\n\u2022 Short-Form Video Production: 2 x 15-second performance videos produced monthly, providing the volume needed to run true A/B creative tests across campaigns simultaneously.\n\n\u2022 Carousel Ad Assets: 2 x multi-frame carousel assets, allowing you to test different narrative flows, product groupings, or offer structures within the same campaign period.\n\n\u2022 Static Display Ads: 8 x high-resolution static image ads, covering multiple placement types, audience angles, and visual approaches for comprehensive feed coverage.\n\n\u2022 Hook Variations: 4 x alternative 3-second opening sequences across the core video assets, accelerating the identification of the highest-performing creative entry points.\n\nWhy This Matters to You\n\nAt growth stage, volume is strategy. The more creative signals you feed the algorithm, the faster it learns which combination of audience, message, and format generates your best return. This package provides the creative throughput needed to scale ad spend confidently without diminishing returns caused by creative saturation.\u00a0\n\nSKU: MPM -CREAT-02", "newPrice": "\u20ac1,450/mo", "newRaw": 1450, "newSku": "MPM -CREAT-02", "clientConcern": "Same revision gap as Essential. 16 assets/month at \u20ac1,450 is \u20ac90/asset \u2014 cheaper per unit than Essential. Client may expect the same per-asset attention and custom creative direction at higher volume. No statement about whether assets are unique concepts or format variations of the same concept.", "providerConcern": "16 assets/month requires a production pipeline, not a single designer. At \u20ac1,450/mo this is well-priced for the European market IF you have batch production workflows. No cap on feedback rounds means a client reviewing each of 16 assets individually creates an admin burden that dwarfs production time. Operationalise this with templates, asset libraries, and a defined feedback window (e.g., 'consolidated feedback within 3 business days').", "recommendation": "ADD same revision policy: '1 round of consolidated revisions per monthly batch. Additional rounds at \u20ac200/round.' | ADD: 'Assets are produced as format variations of 2 core creative concepts per month, not 16 unique concepts. Concept development is systematised for production efficiency.' | ADD: 'Consolidated feedback is due within 3 business days of asset delivery. Feedback received after this window is applied to the following month's production cycle.'", "rewrittenDesc": "An elevated volume of paid social creative for brands actively scaling their advertising investment, enabling systematic creative testing.\n\n\u2022 2 x 15-Second Performance Videos, 2 x Carousel Ads, 8 x Static Display Ads, 4 x Hook Variations. Assets are produced as format variations of 2 core creative concepts per month, not 16 unique concepts.\n\n\u2022 Revisions: 1 round of consolidated revisions per monthly batch. Additional rounds at \u20ac200/round.\n\n\u2022 Feedback: Consolidated feedback due within 3 business days of delivery.\n\nWhy This Matters to You\n\nAt growth stage, volume is strategy. The more creative signals you feed the algorithm, the faster it learns which combinations generate your best return. This package provides the throughput needed to scale ad spend confidently.\n\nSKU: MPM-CREAT-02"}, {"id": "new_13", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Creative Engine: Max", "newDesc": "This is the highest-tier creative production package, built for market-leading brands that require an extensive volume and variety of paid social assets. Operating on a Concept Mapping methodology, this package develops creatives across multiple distinct audience personas simultaneously, ensuring your campaigns speak directly and personally to each segment of your market.\n\n\u2022 Short-Form Video Production: 4 x 15-second performance videos produced monthly across different creative concepts, personas, or product angles to maximise campaign coverage and testing depth.\n\n\u2022 Carousel Ad Assets: 4 x multi-frame carousel assets, enabling parallel testing of entirely different narrative approaches, product ranges, or audience-specific messaging strategies.\n\n\u2022 Static Display Ads: 12 x high-resolution static image ads providing comprehensive placement coverage, from feed to story to display networks.\n\n\u2022 Hook Variations: 6 x alternative 3-second opening sequences, delivering a broad creative pool for the algorithm to continuously identify and exploit the most efficient entry points.\n\nWhy This Matters to You\n\nAt market-leader level, your advertising must simultaneously speak to multiple distinct customer types without diluting your brand message. This package generates the creative depth needed to run persona-level campaigns at scale, prevent creative fatigue across large audiences, and sustain high performance through consistent algorithmic learning and reinforcement.\n\nSKU: MPM -CREAT-03", "newPrice": "\u20ac2,500/mo", "newRaw": 2500, "newSku": "MPM -CREAT-03", "clientConcern": "'Concept Mapping methodology' is presented as proprietary but isn't defined. Client may challenge what this means in practice. At \u20ac2,500/mo for 26 assets, client expectations for quality AND strategic depth will be very high \u2014 this is positioned as the market-leader tier. Clients paying this amount will expect strategic input, not just production output.", "providerConcern": "26 assets/month at \u20ac2,500 is \u20ac96/asset \u2014 similar economics to Growth but with significantly higher quality expectations. 'Persona-level campaigns' implies strategic segmentation work that isn't priced separately. The 'Concept Mapping' methodology needs to be documented and operationalised, otherwise it's a marketing promise without a delivery framework. At this price point in Euros, client expectations around strategic contribution will be high \u2014 ensure the team can deliver consultative value, not just creative volume.", "recommendation": "ADD: 'Concept Mapping: Each month, creative assets are developed across 2\u20133 distinct audience personas, with messaging and visual treatment tailored to each segment. Persona definitions are established during onboarding and reviewed quarterly.' | ADD same revision and feedback policies as Growth tier. | ADD: 'Strategic creative direction is included at this tier. A monthly 30-minute creative alignment call is scheduled with your account manager.'", "rewrittenDesc": "The highest-tier creative production package, operating on a Concept Mapping methodology \u2014 each month, creative assets are developed across 2\u20133 distinct audience personas, with messaging and visual treatment tailored to each segment. Persona definitions are established during onboarding and reviewed quarterly.\n\n\u2022 4 x 15-Second Performance Videos, 4 x Carousel Ads, 12 x Static Display Ads, 6 x Hook Variations.\n\n\u2022 Strategic Creative Direction: Included at this tier. A monthly 30-minute creative alignment call is scheduled with your account manager.\n\n\u2022 Revisions & Feedback: Same consolidated revision and feedback policies as Growth tier.\n\nWhy This Matters to You\n\nYour advertising must simultaneously speak to multiple distinct customer types without diluting your brand message. This package generates the creative depth needed to run persona-level campaigns at scale.\n\nSKU: MPM-CREAT-03"}, {"id": "new_17", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Custom AI Integration & Automation: Ad-hoc / Hourly", "newDesc": "Specialist AI engineering billed by the hour, covering the development and embedding of large language models (LLMs), AI agents, and intelligent automated workflows into your software systems or internal business operations. This service is for organisations that want to leverage the commercial value of AI beyond off-the-shelf tools; building bespoke integrations tailored to their specific data, workflows, and operational context.\n\n\u2022 AI System Consulting & Architecture: We begin with a consultative architecture review, identifying where AI integration creates genuine operational leverage for your specific business model and designing a technical approach that is proportionate to the problem being solved.\n\n\u2022 API Configuration & LLM Integration: We configure and integrate leading AI platform APIs (including OpenAI, Anthropic, and equivalents) connecting their capabilities to your specific application, data sources, and workflow requirements.\n\n\u2022 Vector Store Setup & Retrieval Systems: For applications requiring AI to reason over your own data (documents, knowledge bases, product catalogues) we implement vector databases (Pinecone, Chroma, Weaviate) and retrieval-augmented generation (RAG) architectures that allow AI systems to access and reference your information accurately.\n\n\u2022 Prompt Engineering & Performance Calibration: AI outputs are only as good as the prompts and context structures that drive them. We design, test, and calibrate the prompt architectures that determine how your AI system behaves, ensuring consistent, reliable, and commercially useful outputs.\n\nWhy This Matters to You\n\nGeneric AI tools are available to everyone, and therefore provide no competitive advantage to anyone. Custom AI integration, built around your specific data, processes, and customer interactions, creates a capability that is genuinely proprietary and difficult for competitors to replicate.\n\nSKU: AI-INT-01", "newPrice": "\u20ac120 per Hour", "newRaw": 120, "newSku": "AI-INT-01", "clientConcern": "\u20ac120/hr with no minimum hours or engagement estimate. A client may book 1\u20132 hours expecting a complete AI chatbot or RAG system. The description lists advanced capabilities (vector stores, Pinecone, RAG architectures) that create expectations of deep technical delivery. No IP ownership clause \u2014 who owns the custom prompts, integrations, and architectures built?", "providerConcern": "\u20ac120/hr for AI engineering is competitive in the European market (comparable services typically run \u20ac150\u2013\u20ac300/hr), but it's at the lower end for the skill level described. This rate works if you're positioning as accessible and building volume, but may signal junior capability to enterprise prospects. Set a minimum engagement (e.g., 5 hours) and add an IP clause to your terms. Consider a higher rate for vector store and RAG work specifically.", "recommendation": "**CONSIDER SPLITTING: Create AI Integration: Consulting (scoping + architecture design, fixed fee \u20ac500) and AI Integration: Development (implementation billed hourly at \u20ac120/hr). The consulting phase sets expectations and produces a scope document before development hours are committed.** | ADD: 'Minimum engagement: 5 hours. Engagements under 5 hours are billed at the 5-hour minimum.' | ADD: 'A scoping session (included in billable hours) is conducted before any development work begins to define objectives, technical approach, and estimated hours.' | ADD: 'All custom code, prompts, and architectures developed during the engagement are owned by the client upon payment. Diginauts retains no proprietary rights to client-specific implementations.' | ADD: 'Post-delivery monitoring, maintenance, and updates are not included \u2014 these can be engaged on an ongoing hourly basis.'", "rewrittenDesc": "Specialist AI engineering billed by the hour, covering development and embedding of LLMs, AI agents, and intelligent automated workflows into your systems.\n\n\u2022 AI System Consulting & Architecture: Consultative architecture review identifying where AI creates genuine operational leverage.\n\n\u2022 API Configuration & LLM Integration: Configuration of leading AI platform APIs (OpenAI, Anthropic, and equivalents).\n\n\u2022 Vector Store Setup & Retrieval Systems: Implementation of vector databases and RAG architectures for AI systems that reason over your own data.\n\n\u2022 Prompt Engineering & Calibration: Design, testing, and calibration of prompt architectures for consistent, reliable outputs.\n\n\u2022 Minimum Engagement: 5 hours. A scoping session (included in billable hours) is conducted before development begins.\n\n\u2022 IP Ownership: All custom code, prompts, and architectures developed are owned by the client upon payment.\n\n\u2022 Post-Delivery: Monitoring, maintenance, and updates are not included \u2014 these can be engaged on an ongoing hourly basis.\n\nWhy This Matters to You\n\nCustom AI integration built around your specific data and processes creates a capability that is genuinely proprietary and difficult for competitors to replicate.\n\nSKU: AI-INT-01"}, {"id": "new_18", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Custom Web Application Development: Ad-hoc / Hourly", "newDesc": "Full-stack custom web application development billed by the hour, providing access to senior engineering capability for projects that require bespoke software solutions beyond the scope of standard website or e-commerce builds. This covers custom frontend and backend development, API design, database architecture, and technical problem-solving for specific business workflow requirements.\n\n\u2022 Full-Stack Engineering: Both frontend (user interface, user experience, interactive components) and backend (server logic, database, API endpoints, authentication) development are covered within the hourly scope; providing complete engineering resource from a single engagement.\n\n\u2022 Technical Architecture & Code Review: Where required, we provide architectural scoping, technical specification documentation, and code review services alongside active development, ensuring the solution being built is scalable, maintainable, and correctly structured.\n\n\u2022 Database Design & Setup: Relational and non-relational database architecture is designed and implemented to match the specific data requirements of your application's workflows.\n\nWhy This Matters to You\n\nOff-the-shelf software does not solve every business problem. When your operational requirements demand a custom solution (a specific internal tool, a bespoke customer-facing application, or a unique workflow automation) this service provides the engineering capability to build it correctly, without the overhead of a fixed-scope retainer.\n\nSKU: APP-DEV-01", "newPrice": "\u20ac120 per Hour", "newRaw": 120, "newSku": "APP-DEV-01", "clientConcern": "Same rate as AI Integration (\u20ac120/hr) despite being described as 'senior engineering capability'. No minimum hours, no scoping requirement. A client could request 3 hours of 'full-stack development' and expect a functional application. 'Database Design & Setup' at this rate is reasonable but the client may underestimate the hours required.", "providerConcern": "\u20ac120/hr for full-stack development is competitive but at the low end of the European market for senior-level work. This rate attracts volume but may attract clients who underestimate project complexity. Add a mandatory scoping step (even if unpaid) before any engagement exceeding 5 hours. Define clearly: this is development resource, not a fixed-price project \u2014 output depends on hours purchased.", "recommendation": "ADD: 'Minimum engagement: 5 hours. A scoping session is conducted before development begins.' | ADD: 'This is development resource billed by the hour, not a fixed-price project. Output and deliverables are proportional to hours purchased.' | ADD: 'Post-delivery hosting, maintenance, and support are not included. See Web Maintenance (WEB-MNT-02) or hourly development engagements for ongoing support.'", "rewrittenDesc": "Full-stack custom web application development billed by the hour, providing senior engineering capability for bespoke software solutions.\n\n\u2022 Full-Stack Engineering: Frontend (UI/UX, interactive components) and backend (server logic, database, API endpoints, authentication) development.\n\n\u2022 Technical Architecture & Code Review: Architectural scoping, specification documentation, and code review services.\n\n\u2022 Database Design & Setup: Relational and non-relational database architecture.\n\n\u2022 Minimum Engagement: 5 hours. A scoping session is conducted before development begins. This is development resource billed by the hour, not a fixed-price project \u2014 output is proportional to hours purchased.\n\n\u2022 Post-Delivery: Hosting, maintenance, and support are not included. See Web Maintenance (WEB-MNT-02) or ongoing hourly engagements for support.\n\nWhy This Matters to You\n\nWhen your operational requirements demand a custom solution, this service provides the engineering capability to build it correctly, without the overhead of a fixed-scope retainer.\n\nSKU: APP-DEV-01"}, {"id": "new_19", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Data Architect: Advanced", "newDesc": "This is the most advanced data and analytics service available, designed for high-volume businesses that need their marketing data to reflect the complete commercial reality of their operation, not just website clicks, but actual revenue, profit margins, and offline outcomes. It connects your CRM, your advertising platforms, and your reporting tools into a single, integrated data ecosystem.\n\n\u2022 Offline CRM Data Import: We establish automated pipelines that import closed deal data, actual revenue, and offline sales outcomes from your CRM back into Google Ads and Meta. This allows the advertising algorithms to optimise toward your most profitable customer types, not just the cheapest leads.\n\n\u2022 Profit-Margin Tagging: Conversion values within your advertising platforms are enhanced with actual profit margin data, enabling campaign optimisation toward real profit contribution rather than raw revenue or volume; a critical capability for businesses with variable margins across products or services.\n\n\u2022 Custom Reporting Dashboards: We design and build bespoke performance dashboards that consolidate data from all your marketing channels, CRM, and financial systems into a single, executive-ready reporting environment with the metrics that matter most to your business.\n\nWhy This Matters to You\n\nStandard marketing analytics tells you how many clicks and conversions you received. Advanced data engineering tells you which campaigns are actually making your business money. For high-volume operations, the difference between optimising toward volume and optimising toward profit can represent a significant swing in marketing ROI.\n\nSKU: DATA-ARCH-03", "newPrice": "\u20ac950", "newRaw": 950, "newSku": "DATA-ARCH-03", "clientConcern": "\u20ac950 once-off for 'the most advanced data and analytics service available' creates a value expectation that may be difficult to satisfy. 'Offline CRM Data Import' and 'Profit-Margin Tagging' require the client to provide structured financial data \u2014 if they can't or won't, the service stalls but they'll still expect results. 'Custom Reporting Dashboards' could mean a Looker Studio template or a fully bespoke BI tool.", "providerConcern": "\u20ac950 once-off is competitive for the setup described, but the work (CRM data pipelines, profit-margin tagging, dashboard builds) inherently requires ongoing maintenance. After the setup, who maintains the data pipeline when the CRM schema changes or the ad platform updates its API? Consider pairing this with a mandatory monthly maintenance add-on, or clearly state that post-setup maintenance is billed at hourly rates.", "recommendation": "**CONSIDER SPLITTING: Create Data Architect: Setup (current once-off scope) and Data Architect: Maintenance (monthly pipeline monitoring + dashboard updates, \u20ac250/mo). The setup-only model leaves ongoing maintenance unaddressed, which will result in data pipeline decay.** | ADD: 'This is a setup and configuration service. Ongoing pipeline monitoring, data refresh, and dashboard maintenance are not included \u2014 see our hourly development or CRM maintenance services for ongoing support.' | ADD: 'Client is responsible for providing access to CRM data exports, financial data, and advertising platform admin access. Project timeline is dependent on timely data provision.' | CONSIDER: Rename to 'Data Architect: Setup' and create a separate monthly 'Data Architect: Maintenance' SKU.", "rewrittenDesc": "Advanced data and analytics setup connecting your CRM, advertising platforms, and reporting tools into an integrated data ecosystem. This is a setup and configuration service \u2014 ongoing maintenance is not included.\n\n\u2022 Offline CRM Data Import: Automated pipelines importing closed deal data and revenue from your CRM back into ad platforms. Client provides access to CRM exports and financial data \u2014 project timeline depends on timely data provision.\n\n\u2022 Profit-Margin Tagging: Conversion values enhanced with actual profit margin data, enabling optimisation toward real profit.\n\n\u2022 Custom Reporting Dashboards: Bespoke performance dashboards consolidating data from all marketing channels into a single executive-ready view.\n\n\u2022 Post-Setup Maintenance: Ongoing pipeline monitoring and dashboard maintenance are billed at hourly development rates. A monthly Data Architect maintenance retainer can be quoted on request.\n\nWhy This Matters to You\n\nStandard analytics tells you clicks and conversions. Advanced data engineering tells you which campaigns are actually making your business money.\n\nSKU: DATA-ARCH-03"}, {"id": "new_20", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Demand Gen Campaign Management", "newDesc": "Demand Gen campaigns are Google's most visually immersive advertising format, placing your brand across YouTube, YouTube Shorts, Gmail, and Google Discover - the environments where people consume content, not just search for it. This service manages a Demand Gen campaign designed to build brand consideration and engage high-quality lookalike audiences before they reach the purchase decision stage.\n\n\u2022 Immersive Ad Format Management: We manage rich visual ad formats specifically designed for Google's content-consumption surfaces, ensuring your creative is appropriately formatted and optimised for each placement environment.\n\n\u2022 Audience Segmentation & Lookalike Targeting: We build and refine targeted audience segments based on interest signals, browsing behaviour, and lookalike modelling from your existing customer base, ensuring your ads reach prospects most likely to convert.\n\n\u2022 Creative Rotation & Performance Monitoring: All creative assets are rotated on a monthly basis with weekly performance monitoring, allowing underperforming elements to be identified and replaced promptly.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount, enquire for pricing based on your complete service combination.\n\nWhy This Matters to You\n\nNot every future customer is ready to search for you today. Demand Gen reaches them earlier in the journey, on the platforms they use for entertainment and discovery, building familiarity and intent before they reach the search stage. It is the bridge between pure brand awareness and high-intent conversion campaigns.\n\nSKU: GPM-DGEN-01", "newPrice": "\u20ac295/mo", "newRaw": 295, "newSku": "GPM-DGEN-01", "clientConcern": "'Sliding Scale Discount' is mentioned but never quantified \u2014 first of multiple occurrences across the Google Ads card. 'Creative Rotation & Performance Monitoring' doesn't state whether Diginauts supplies the creative assets or whether the client must provide them. 'Enquire for pricing' language may frustrate clients who expected transparent pricing.", "providerConcern": "\u20ac295/mo for Demand Gen campaign management is reasonable if creative is supplied by the client. If creative production is expected within this fee, it's underpriced. Clarify the creative supply responsibility explicitly. The 'Sliding Scale' discount needs to be formalised into a published table or removed \u2014 vague discount promises create negotiation overhead.", "recommendation": "ADD: 'Campaign creative (images, video) must be supplied by the client or sourced via our Creative Engine or Andromeda video packages. Creative production is not included in the campaign management fee.' | RESOLVE sliding scale: Either publish the discount table (e.g., '2 Google services: 10% off campaign fees, 3+: 15% off') or remove the sliding scale reference entirely and price each item at its net rate.", "rewrittenDesc": "Google's most visually immersive advertising format, placing your brand across YouTube, YouTube Shorts, Gmail, and Google Discover.\n\n\u2022 Immersive Ad Format Management: Rich visual ad formats optimised for each placement environment.\n\n\u2022 Audience Segmentation & Lookalike Targeting: Targeted audience segments based on interest signals, browsing behaviour, and lookalike modelling.\n\n\u2022 Creative Rotation & Performance Monitoring: All creative assets rotated monthly with weekly performance monitoring. Campaign creative (images, video) must be supplied by the client or sourced via our Creative Engine or Andromeda video packages. Creative production is not included in this management fee.\n\n\u2022 Volume Discount: Clients running 2+ Google Ads services receive a 10% discount on campaign management fees. Clients running 3+ services receive 15%.\n\n\u2022 Baseline Fee Required: Baseline Google Ads Management Fee (GPM-MGMT-01, \u20ac650/mo) applies in addition.\n\nWhy This Matters to You\n\nDemand Gen reaches prospects earlier in their journey, building familiarity and intent before they reach the search stage. It is the bridge between brand awareness and conversion campaigns.\n\nSKU: GPM-DGEN-01"}, {"id": "new_22", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "E-Comm Stack: Launch", "newDesc": "This package provides essential Google Ads visibility for e-commerce businesses at the launch phase. It combines Google Shopping and Performance Max to ensure your products appear prominently in Google's shopping results from day one, capturing buyers who are actively searching to purchase.\n\n\u2022 Google Shopping Campaign (via CSS): Your products are listed in Google's Shopping results with images, prices, and ratings visible before the user even clicks. We manage your Shopping campaign through a Comparison Shopping Service (CSS) partner, which reduces your cost-per-click and extends your budget further than a standard shopping setup.\n\n\u2022 Performance Max Campaign: Google's flagship campaign type automatically serves your product ads across Search, Shopping, Display, YouTube, Gmail, and Maps simultaneously, using machine learning to find the combinations that drive purchases most efficiently.\n\n\u2022 Product Feed Connection: We establish and manage the link between your product catalogue and Google Merchant Center, ensuring your listings are approved, accurate, and eligible to serve.\n\nWhy This Matters to You\n\nFor a new e-commerce store, visibility is everything. Google Shopping puts your products directly in front of buyers who are already searching for them, with pricing and imagery visible before they even visit your site. This stack ensures you are present at the most commercially valuable moment in the buyer's journey from the moment you launch.\n\nSKU: GPM-ECOM-01", "newPrice": "\u20ac1,200/mo", "newRaw": 1200, "newSku": "GPM-ECOM-01", "clientConcern": "'CSS partner' claim reduces CPC \u2014 client may demand proof of the specific discount percentage. 'Product Feed Connection' is listed but Product Upload is a separate paid item (SHPF-UP-01) \u2014 client may assume products are fully loaded as part of this \u20ac1,200/mo package.", "providerConcern": "\u20ac1,200/mo for Shopping + PMax management is competitive for the European market. The CSS benefit is a real differentiator \u2014 document the average CPC reduction for client proposals. Feed issues (disapprovals, policy violations) from Merchant Center are time-consuming and unpredictable \u2014 factor this into your time allocation. Ensure proposals distinguish between campaign management (this SKU) and product catalogue management (separate SKU).", "recommendation": "ADD: 'Product Feed Connection establishes the technical link between your store and Google Merchant Center. Product catalogue population is managed via our Product Upload service (SHPF-UP-01) \u2014 products are not uploaded as part of this campaign management package.' | ADD: 'CSS partner benefit: Google Shopping campaigns managed through our CSS partnership typically achieve a 20% reduction in cost-per-click compared to standard Google Shopping setup. Actual results vary by category and competition.'", "rewrittenDesc": "Essential Google Ads visibility for e-commerce businesses at launch phase, combining Google Shopping and Performance Max.\n\n\u2022 Google Shopping Campaign (via CSS): Products listed in Shopping results. Managed through a CSS partner, typically achieving approximately 20% CPC reduction vs. standard setup (results vary by category).\n\n\u2022 Performance Max Campaign: Machine learning serves product ads across all Google surfaces.\n\n\u2022 Product Feed Connection: Technical link between your store and Google Merchant Center. Product catalogue population is managed separately via Product Upload (SHPF-UP-01) \u2014 products are not uploaded as part of this management package.\n\n\u2022 Baseline Fee Required: GPM-MGMT-01 (\u20ac650/mo) applies in addition.\n\nWhy This Matters to You\n\nGoogle Shopping puts your products directly in front of active buyers, with pricing and imagery visible before they visit your site. This stack ensures you are present at the most valuable moment in the buyer's journey from launch.\n\nSKU: GPM-ECOM-01"}, {"id": "new_23", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "E-Comm Stack: Leader", "newDesc": "This is the most comprehensive Google Ads package available for e-commerce brands, designed for established stores that want to dominate their category. It deploys Shopping, Performance Max, YouTube Shopping, and Display campaigns simultaneously, ensuring complete market coverage across every stage of the buyer's decision journey.\n\n\u2022 Google Shopping & Performance Max: Full management of both Shopping and PMax campaigns to capture high-intent purchase traffic at scale, with continuous optimisation across all Google-owned surfaces.\n\n\u2022 YouTube Shopping Integration: Your products appear directly within YouTube video content as shoppable cards, reaching buyers while they're actively engaged with related content, an increasingly powerful e-commerce channel.\n\n\u2022 Display Remarketing: Targeted display ads re-engage previous site visitors and add-to-cart abandoners across Google's partner network, recovering high-intent prospects who didn't complete their purchase.\n\n\u2022 Advanced Attribution & Reporting: Cross-channel attribution modelling connects all four campaign types to your revenue data, providing a clear picture of how each channel contributes to overall e-commerce performance.\n\nWhy This Matters to You\n\nAt market-leader level, a single campaign type is not enough to maintain category dominance. Competitors are investing across multiple channels simultaneously. This stack ensures your brand is visible, persuasive, and converting at every touchpoint; from the first YouTube discovery through to the final Google Search that triggers purchase.\n\nSKU: GPM-ECOM-02", "newPrice": "\u20ac2,500/mo", "newRaw": 2500, "newSku": "GPM-ECOM-02", "clientConcern": "At \u20ac2,500/mo this is the premium Google Ads package \u2014 client expectations for performance, reporting depth, and strategic input will be proportionally high. 'YouTube Shopping Integration' requires a functional Merchant Center feed \u2014 if the client's feed isn't ready, this component can't deliver. 'Advanced Attribution & Reporting' promises cross-channel attribution, which may not match the client's understanding.", "providerConcern": "\u20ac2,500/mo (plus \u20ac650 base = \u20ac3,150/mo total) is well-priced for comprehensive e-commerce Google Ads management in the European market. However, managing Shopping + PMax + YouTube Shopping + Display simultaneously is operationally intensive \u2014 ensure the time allocation per campaign type is realistic. The cross-channel attribution promise is the highest-risk element: set realistic expectations during onboarding about attribution model limitations.", "recommendation": "ADD: 'YouTube Shopping Integration requires a compliant Google Merchant Center product feed. If your feed is not yet established, see our Google Shopping Feed Management service (GPM-FEED-01).' | ADD: 'Cross-channel attribution reporting uses Google's data-driven attribution model. Attribution accuracy depends on correct tracking configuration across all platforms and sufficient conversion volume for model training.' | ADD prerequisite note: 'Baseline Google Ads Management Fee (GPM-MGMT-01) is required alongside this package.'", "rewrittenDesc": "The most comprehensive Google Ads package for established e-commerce brands, deploying Shopping, PMax, YouTube Shopping, and Display simultaneously.\n\n\u2022 Google Shopping & Performance Max: Full management capturing high-intent purchase traffic at scale.\n\n\u2022 YouTube Shopping Integration: Shoppable product cards within YouTube content. Requires a compliant Merchant Center feed \u2014 see Google Shopping Feed Management (GPM-FEED-01) if not yet established.\n\n\u2022 Display Remarketing: Targeted ads re-engage previous visitors and cart abandoners.\n\n\u2022 Attribution & Reporting: Cross-channel attribution using Google's data-driven model. Attribution accuracy depends on correct tracking and sufficient conversion volume.\n\n\u2022 Baseline Fee Required: GPM-MGMT-01 (\u20ac650/mo) applies in addition. Total monthly investment: \u20ac3,150/mo.\n\nWhy This Matters to You\n\nAt market-leader level, a single campaign type is not enough. This stack ensures visibility and conversion at every touchpoint from discovery to purchase.\n\nSKU: GPM-ECOM-02"}, {"id": "new_25", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "GEO-Grid Optimizer", "newDesc": "This service is designed for businesses that need to rank prominently in local search results and on Google Maps. Using a geo-grid tracking system, it provides a visual, data-driven view of exactly where in your target area you are visible on Google Maps, and then takes targeted action to improve that visibility through strategic Google Business Profile management.\n\n\u2022 Google Maps Geo-Grid Tracking: We deploy SE Ranking's geo-grid tool to generate a geographic map of your Google Maps ranking positions across your target city, town, or service area. This reveals precisely where you rank strongly and where competitors are outranking you, at a street-by-street level.\n\n\u2022 Google Business Profile (GBP) Management: 3 x monthly GBP updates keep your profile active, accurate, and algorithmically favoured. Updates include post publishing, offer creation, Q&A management, and attribute optimisation - all signals that Google's local ranking algorithm rewards.\n\n\u2022 Local Visibility Reporting: Monthly reporting shows geo-grid movement, profile engagement metrics (views, direction requests, calls), and keyword ranking shifts within your local search area.\n\nWhy This Matters to You\n\nFor any business serving a local or regional customer base, Google Maps is frequently the first point of discovery. A well-optimised Google Business Profile consistently outranks websites in local search results, and a geo-grid approach ensures you're targeting the specific locations where your customers are actually searching, not just your own postcode.\"\n\nSKU: SEO-GEO-01", "newPrice": "\u20ac190/mo", "newRaw": 190, "newSku": "SEO-GEO-01", "clientConcern": "'3 x monthly GBP updates' \u2014 client may expect daily posting or weekly updates. 'Street-by-street level' geo-grid tracking is a strong claim \u2014 actual granularity depends on SE Ranking's coverage in the client's specific region. Limited to Google Maps \u2014 client may assume Apple Maps/Waze coverage is included.", "providerConcern": "\u20ac190/mo for geo-grid tracking + 3 GBP updates + monthly reporting is viable if updates are quick (post publishing, not content creation) and reporting is largely automated. Verify SE Ranking's geo-grid coverage in your clients' specific markets before promising 'street-by-street' precision \u2014 coverage varies significantly outside major metros.", "recommendation": "ADD: '3 x monthly GBP updates include: post publishing, offer updates, Q&A management, or attribute optimisation. Custom graphic design for GBP posts is not included \u2014 visual assets can be sourced via our Social Content services.' | ADD: 'Geo-grid tracking accuracy depends on SE Ranking's coverage in your specific region. Coverage is verified during onboarding. This service covers Google Maps visibility only \u2014 Apple Maps, Waze, and other mapping platforms are not included.'", "rewrittenDesc": "Local search visibility service using geo-grid tracking and Google Business Profile management.\n\n\u2022 Google Maps Geo-Grid Tracking: Geographic map of your ranking positions across your target area. Coverage depends on SE Ranking's availability in your specific region (verified during onboarding). This service covers Google Maps visibility only \u2014 Apple Maps, Waze, and other platforms are not included.\n\n\u2022 Google Business Profile Management: 3 x monthly GBP updates including post publishing, offer updates, Q&A management, and attribute optimisation. Custom graphic design for GBP posts is not included \u2014 visual assets can be sourced via Social Content services.\n\n\u2022 Local Visibility Reporting: Monthly geo-grid movement, engagement metrics, and keyword ranking shifts.\n\nWhy This Matters to You\n\nFor local businesses, Google Maps is frequently the first point of discovery. A well-optimised GBP consistently outranks websites in local search.\n\nSKU: SEO-GEO-01"}, {"id": "new_30", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Hosting Fee", "newDesc": "A fixed annual fee for professional, managed web hosting; providing the server infrastructure, security, and technical environment required to keep your website reliably online and performing at speed. Managed hosting removes the technical complexity of server administration, ensuring your website operates on a professional, maintained infrastructure without requiring in-house technical knowledge to oversee it.\n\n\u2022 Up to 4GB Secure SSD Storage: Your website files, databases, and media assets are hosted on fast, solid-state storage allocated to your environment - providing the performance baseline required for a well-scoring website experience.\n\n\u2022 SSL Certificate Provisioning: A complimentary SSL certificate is provisioned and maintained, ensuring your website operates securely over HTTPS; a technical requirement for Google ranking and a trust signal for all website visitors.\n\n\u2022 Automated Daily Backups with 14-Day Retention: Your complete website is backed up automatically every day, with 14 days of backups retained; providing a reliable safety net in the event of accidental deletion, site failure, or security compromise.\n\n\u2022 99.9% Uptime Guarantee: Your website is hosted on an infrastructure with a guaranteed 99.9% availability commitment, ensuring your online presence is accessible to customers around the clock.\n\nWhy This Matters to You\n\nCheap or unmanaged hosting is one of the most common causes of poor website performance, security vulnerabilities, and unexpected downtime. Professional managed hosting ensures your website is always fast, always available, always backed up, and always secure - protecting the commercial value of the website asset you have invested in.\n\nSKU: AS-HOST-01", "newPrice": "\u20ac160", "newRaw": 160, "newSku": "AS-HOST-01", "clientConcern": "\u20ac160/year is exceptionally affordable. '4GB SSD Storage' is limited \u2014 client may not understand storage limits until they hit them. '99.9% Uptime Guarantee' \u2014 if the site goes down during a critical period, the client may reference this and expect compensation.", "providerConcern": "\u20ac160/year is extremely low margin \u2014 verify this is sustainable against your actual hosting costs. '99.9% Uptime Guarantee' is a contractual commitment \u2014 ensure your hosting provider actually guarantees this with pass-through protection. If a client's site gets hacked, the liability exposure exceeds the annual fee many times over. Consider increasing this to \u20ac240\u2013\u20ac360/year and adding value (more storage, priority support).", "recommendation": "CONSIDER: Increase to \u20ac240\u2013\u20ac360/year and add: 'Includes up to 8GB SSD storage.' | ADD: '99.9% uptime is provided by our hosting infrastructure partner. In the event of downtime, resolution is prioritised but no financial SLA credits are offered at this pricing tier.' | ADD: 'Storage overages are available at \u20ac40/year per additional 4GB.'", "rewrittenDesc": "Professional managed web hosting \u2014 server infrastructure, security, and technical environment for reliable website performance.\n\n\u2022 Up to 4GB Secure SSD Storage: Fast, solid-state storage. Storage overages available at \u20ac40/year per additional 4GB.\n\n\u2022 SSL Certificate Provisioning: Complimentary SSL certificate maintained for secure HTTPS operation.\n\n\u2022 Automated Daily Backups with 14-Day Retention: Complete website backed up daily with 14-day rolling retention.\n\n\u2022 99.9% Uptime Target: Hosted on infrastructure targeting 99.9% availability. In the event of downtime, resolution is prioritised but no financial SLA credits are offered at this pricing tier.\n\nWhy This Matters to You\n\nCheap or unmanaged hosting is one of the most common causes of poor performance and security vulnerabilities. Professional hosting protects the commercial value of your website investment.\n\nSKU: AS-HOST-01"}, {"id": "new_36", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Pay per Thumbnail (Reels)", "newDesc": "A single custom-designed cover thumbnail for an Instagram Reel, created to ensure your Reel feed grid maintains a professional, cohesive visual appearance. On Instagram, the Reel thumbnail is the first frame a profile visitor sees, making it a critical brand touchpoint that is frequently overlooked in social media content production.\n\n\u2022 High-Resolution Vertical Cover (9:16 Ratio): A bespoke thumbnail designed at full Reel resolution, with strong visual composition, clear typography, and brand-aligned design; ensuring the cover image compels a viewer to press play.\n\n\u2022 Instagram Grid Safe-Zone Preview (1:1 Optimisation): The thumbnail is designed with your Instagram profile grid in mind, ensuring the 1:1 crop that appears in your profile grid is visually intentional and contributes positively to the overall aesthetic of your feed, not an arbitrary crop of the vertical image.\n\nWhy This Matters to You\n\nYour Instagram profile grid is your brand's first impression for every new visitor. Reels with generic, undesigned thumbnails undermine the visual consistency of an otherwise well-curated feed. This service ensures every Reel contributes to a professional, intentional profile grid rather than disrupting it.\n\nSKU: OSC -THMB-01", "newPrice": "\u20ac75 per Post", "newRaw": 75, "newSku": "OSC -THMB-01", "clientConcern": "\u20ac75 per thumbnail is clear and simple. 'Instagram Grid Safe-Zone Preview' implies a design QA step that may take more time than the price suggests. Client may bulk-order 30 thumbnails and expect a volume discount. No revision count stated.", "providerConcern": "At \u20ac75 per thumbnail, margin is healthy for the European market if production is efficient (20\u201330 minutes per thumbnail). Batch orders should be handled as a project with defined timelines, not individual transactions. Consider adding a minimum batch size or a bulk rate to encourage larger orders. Add a revision limit (e.g., 1 round included).", "recommendation": "ADD: '1 round of revisions included per thumbnail. Additional revisions at \u20ac25/round.' | ADD: 'Bulk orders of 10+ thumbnails are recommended for production efficiency. Contact us for batch pricing.' | CLARIFY: 'Each thumbnail is a standalone design \u2014 template replication across multiple thumbnails is not applied without creative justification.'", "rewrittenDesc": "A single custom-designed cover thumbnail for an Instagram Reel, ensuring your grid maintains a professional, cohesive appearance.\n\n\u2022 High-Resolution Vertical Cover (9:16): Bespoke thumbnail with strong composition, clear typography, and brand alignment.\n\n\u2022 Instagram Grid Safe-Zone Preview: Designed with the 1:1 grid crop in mind for a visually i
