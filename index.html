newName": "Hosting Fee", "newDesc": "A fixed annual fee for professional, managed web hosting; providing the server infrastructure, security, and technical environment required to keep your website reliably online and performing at speed. Managed hosting removes the technical complexity of server administration, ensuring your website operates on a professional, maintained infrastructure without requiring in-house technical knowledge to oversee it.\n\n\u2022 Up to 4GB Secure SSD Storage: Your website files, databases, and media assets are hosted on fast, solid-state storage allocated to your environment - providing the performance baseline required for a well-scoring website experience.\n\n\u2022 SSL Certificate Provisioning: A complimentary SSL certificate is provisioned and maintained, ensuring your website operates securely over HTTPS; a technical requirement for Google ranking and a trust signal for all website visitors.\n\n\u2022 Automated Daily Backups with 14-Day Retention: Your complete website is backed up automatically every day, with 14 days of backups retained; providing a reliable safety net in the event of accidental deletion, site failure, or security compromise.\n\n\u2022 99.9% Uptime Guarantee: Your website is hosted on an infrastructure with a guaranteed 99.9% availability commitment, ensuring your online presence is accessible to customers around the clock.\n\nWhy This Matters to You\n\nCheap or unmanaged hosting is one of the most common causes of poor website performance, security vulnerabilities, and unexpected downtime. Professional managed hosting ensures your website is always fast, always available, always backed up, and always secure - protecting the commercial value of the website asset you have invested in.\n\nSKU: AS-HOST-01", "newPrice": "$160", "newRaw": 160, "newSku": "AS-HOST-01", "clientConcern": "R160/year is exceptionally affordable but '4GB SSD Storage' is very limited \u2014 a single high-resolution video or image gallery can exceed this. Client may not understand storage limits until they hit them, at which point they'll expect free upgrades. '99.9% Uptime Guarantee' \u2014 if the site goes down during a critical sales period, the client may reference this guarantee and expect compensation or SLA credits.", "providerConcern": "R160/year is barely profitable unless hosting costs are extremely low and the site requires zero support. '99.9% Uptime Guarantee' is a contractual commitment \u2014 verify your actual hosting provider guarantees this and that you have pass-through protection. '14-Day Backup Retention' \u2014 if a site issue is discovered on day 15, the backup is gone. 'SSL Certificate Provisioning' is standard and free via Let's Encrypt \u2014 not a value-add. If a client's site gets hacked and data is compromised, the liability exposure far exceeds the annual fee."}, {"id": "new_36", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Pay per Thumbnail (Reels)", "newDesc": "A single custom-designed cover thumbnail for an Instagram Reel, created to ensure your Reel feed grid maintains a professional, cohesive visual appearance. On Instagram, the Reel thumbnail is the first frame a profile visitor sees, making it a critical brand touchpoint that is frequently overlooked in social media content production.\n\n\u2022 High-Resolution Vertical Cover (9:16 Ratio): A bespoke thumbnail designed at full Reel resolution, with strong visual composition, clear typography, and brand-aligned design; ensuring the cover image compels a viewer to press play.\n\n\u2022 Instagram Grid Safe-Zone Preview (1:1 Optimisation): The thumbnail is designed with your Instagram profile grid in mind, ensuring the 1:1 crop that appears in your profile grid is visually intentional and contributes positively to the overall aesthetic of your feed, not an arbitrary crop of the vertical image.\n\nWhy This Matters to You\n\nYour Instagram profile grid is your brand's first impression for every new visitor. Reels with generic, undesigned thumbnails undermine the visual consistency of an otherwise well-curated feed. This service ensures every Reel contributes to a professional, intentional profile grid rather than disrupting it.\n\nSKU: OSC -THMB-01", "newPrice": "$75 per Post", "newRaw": 75, "newSku": "OSC -THMB-01", "clientConcern": "R75 per thumbnail is clear and simple. But 'Instagram Grid Safe-Zone Preview' implies a design QA step that suggests more time and care than R75 allows. Client may bulk-order 20-30 thumbnails and expect a volume discount that isn't offered. No revision count stated \u2014 if the client rejects the first design, how many iterations are included?", "providerConcern": "At R75 per thumbnail, margin depends on production speed. If a designer can produce one in 20-30 minutes including the grid preview check, it's viable. But if the client provides vague creative direction ('make it pop'), the back-and-forth eats into margin. Batch orders of 20+ thumbnails should be handled as a separate project with its own timeline, not as 20 individual R75 transactions processed separately. Consider adding a minimum order quantity."}, {"id": "new_39", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Platform Training", "newDesc": "A structured, recorded training session designed to give you and your team full confidence in managing your website's content independently through its CMS (Content Management System) after project delivery. This eliminates dependency on external resource for routine content tasks and gives your team the tools to keep your site current and relevant.\n\n\u2022 3-Hour Live Recorded Session: A dedicated live session conducted within your actual website environment, covering all content management tasks relevant to your specific platform and setup. The recording is delivered for ongoing reference.\n\n\u2022 CMS & Content Workflow Training: Training covers all day-to-day editorial tasks; creating and editing pages, publishing blog posts, updating images, amending contact information, managing navigation menus, and any platform-specific content modules used in your build.\n\n\u2022 Q&A & Scenario Walkthrough: Time is allocated for your team to ask specific questions, walk through real tasks they anticipate needing to perform, and clarify any processes that may not be immediately intuitive.\n\nWhy This Matters to You\n\nA website that your team cannot update independently becomes a bottleneck. News goes unpublished, offers go live late, and routine amendments require unnecessary external coordination and cost. This training session removes that bottleneck entirely, giving your team the confidence and capability to own your site's content from handover day forward.\n\nSKU: WEB-TRN-01", "newPrice": "$400", "newRaw": 400, "newSku": "WEB-TRN-01", "clientConcern": "'3-Hour Live Recorded Session' \u2014 if the client brings 10 team members with different questions and skill levels, 3 hours may not be sufficient. No follow-up support is mentioned \u2014 when a team member forgets a process 2 weeks later, they'll expect to be able to call or email. The recording is valuable for reference but doesn't replace the ability to ask follow-up questions after the session.", "providerConcern": "R400 for 3 hours of live training + recording production and delivery is tight on margin. The 'within your actual website environment' requirement means pre-session preparation (logging in, familiarising with the client's specific setup, preparing examples relevant to their content). If the client's CMS setup is non-standard or heavily customised, the trainer needs prep time that isn't billed. Consider adding a follow-up email support window (e.g., 2 weeks post-session) to manage expectations."}, {"id": "new_40", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "POPIA/GDPR Compliance", "newDesc": "A technical audit and configuration service that ensures your website's data collection practices comply with the requirements of the Protection of Personal Information Act (POPIA) in South Africa and/or the General Data Protection Regulation (GDPR) in Europe. This covers the implementation of the technical mechanisms required to obtain, record, and manage visitor consent for data collection - reducing your legal exposure and building visitor trust.\n\n\u2022 Dynamic Cookie Consent Banner: We integrate a properly configured, legally compliant cookie consent management platform (CMP) on your website; displaying a clear, honest consent mechanism to visitors and recording consent decisions as required by POPIA and GDPR.\n\n\u2022 Privacy Policy Linkage & Documentation: The consent framework is linked to your privacy policy documentation, ensuring visitors can access full information about your data practices at the point of consent.\n\n\u2022 Google Analytics 4 Consent Mode Setup: GA4 is configured in Consent Mode, ensuring that analytics data collection respects user consent choices - preventing data from being collected from visitors who have declined tracking and maintaining compliance with platform policy requirements.\n\n\u2022 Basic Data Leak Testing: We conduct a basic technical check to identify obvious data leaks (tracking pixels or scripts firing before consent is granted) and correct them.\n\nWhy This Matters to You\n\nData privacy legislation carries real legal and financial consequences for non-compliant businesses. Beyond legal risk, a professionally implemented consent experience also communicates to visitors that your business respects their privacy; which is an increasingly important factor in online trust and conversion. This service ensures you are compliant and credible.\n\nSKU: AS-COMP-01", "newPrice": "$850", "newRaw": 850, "newSku": "AS-COMP-01", "clientConcern": "R850 once-off for compliance implementation \u2014 but POPIA/GDPR compliance is an ONGOING legal obligation, not a one-time technical fix. A client may assume that after paying R850, they are 'compliant' indefinitely. 'Basic Data Leak Testing' \u2014 the word 'basic' is carrying enormous weight. If a real data breach occurs and the client discovers that pixels were firing before consent was granted, they may claim this service should have caught it. No ongoing monitoring or annual re-audit is included.", "providerConcern": "The word 'basic' in 'Basic Data Leak Testing' is your legal safety net \u2014 but it needs to be much more prominent. Consider a formal disclaimer that this service provides a technical baseline, not a legal compliance guarantee. If a client faces a POPIA/GDPR complaint and references this service as their compliance measure, you could be drawn into the investigation. Cookie consent platforms (CMPs) require ongoing configuration as new scripts and trackers are added to the site \u2014 this isn't a set-and-forget service, but it's priced as one. Consider an annual re-audit add-on."}, {"id": "new_42", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Presentation Design", "newDesc": "Professional design and layout of a high-impact pitch deck or corporate presentation, transforming raw notes, data, or content outlines into visually compelling, brand-aligned slides. Whether for investor presentations, client pitches, internal strategy sessions, or conference keynotes, this service produces a presentation that communicates with authority and visual clarity.\n\n\u2022 Up to 8 x Custom Slides: 8 x professionally designed slides, each treated as an individual design composition; not a template applied repeatedly. Custom typography, iconography, data visualisation, and high-resolution imagery are applied throughout.\n\n\u2022 Brand-Aligned Visual System: Typography, colour palette, layout grids, and graphic elements are selected and applied in strict alignment with your brand identity, ensuring the presentation feels like a natural extension of your brand - not a generic slide deck.\n\n\u2022 Data Visualisation & Charts: Where your content includes data, statistics, or comparative information, we design custom chart and infographic treatments that communicate the numbers clearly and persuasively - not as raw spreadsheet exports.\n\n\u2022 Fully Editable Source Files: The completed presentation is delivered as a fully editable file in your preferred format (PowerPoint, Google Slides, or Figma) ensuring your team can make future amendments independently.\n\nWhy This Matters to You\n\nA poorly designed presentation undermines even the strongest content. When you are pitching for investment, presenting to a major client, or representing your brand at a conference, the visual quality of your slides is an implicit statement about the quality of your business. This service ensures your presentation reinforces your credibility rather than quietly undermining it.\n\nSKU: AS-PRES-01", "newPrice": "$650", "newRaw": 650, "newSku": "AS-PRES-01", "clientConcern": "'Up to 8 x Custom Slides' \u2014 a client needing a 20-slide board presentation will be surprised by the limit. R650 for 8 custom slides with data visualisation and brand alignment is strong value, but the client may expect unlimited revisions since 'Fully Editable Source Files' are delivered. No revision limit is stated for the design process itself \u2014 a perfectionist CMO could request 5 rounds of changes.", "providerConcern": "R650 for 8 custom slides with data visualisation is aggressive \u2014 comparable design agencies charge R150-300/slide. This only works if you have a strong template library and can adapt quickly. 'Fully Editable Source Files' means the client can modify your work after delivery \u2014 which is standard, but they may also come back with 'I broke the layout, can you fix it?' requests that aren't covered. The 'Custom typography, iconography, data visualisation' promise implies a senior designer, not a junior \u2014 resource allocation matters. Consider an overage rate for slides beyond 8."}, {"id": "new_47", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Shopify Training", "newDesc": "This is a structured, recorded training session designed to give you and your team the knowledge and confidence to manage your Shopify store independently after handover. It covers the day-to-day operational tasks that keep your store running smoothly, without requiring ongoing external support for routine actions.\n\n\u2022 3-Hour Live Recorded Session: A dedicated training session covering all core Shopify admin functions relevant to your store's setup. The session is recorded in full and delivered to you for future reference, allowing team members to revisit specific sections as needed.\n\n\u2022 Operational Coverage: Training covers product management (adding, editing, and organising products), order processing and fulfilment workflows, discount and promotion setup, basic reporting and analytics interpretation, and customer record management.\n\n\u2022 Store-Specific Walkthrough: The session is conducted within your actual Shopify environment, not a generic demo store, ensuring training is directly relevant to your specific setup, theme, and installed apps.\n\nWhy This Matters to You\n\nDependency on external support for routine store operations creates unnecessary cost and delays. This training ensures your team can handle day-to-day management confidently and independently, reserving external resource for genuine development work rather than basic administrative tasks.\n\nSKU: SHPF-TRN-01", "newPrice": "$400", "newRaw": 400, "newSku": "SHPF-TRN-01", "clientConcern": "Identical structure to Platform Training (WEB-TRN-01) \u2014 same price, same 3-hour format. Good consistency. 'Store-Specific Walkthrough' conducted in the client's actual environment is a strong differentiator vs. generic training. Same concern applies: 3 hours may not be enough for a large team, and no post-session support is mentioned.", "providerConcern": "Same margin and scope concerns as WEB-TRN-01. Shopify admin is generally more intuitive than WordPress CMS, so training may be more efficient \u2014 but the client's questions about order management, inventory, and fulfilment can go deep. Ensure the trainer is fluent in the client's specific Shopify setup, including any installed apps that modify the standard admin experience."}, {"id": "new_49", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Signal Lite: Lead Gen", "newDesc": "This service establishes the foundational digital tracking infrastructure for small to mid-sized service businesses, ensuring that every meaningful interaction on your website is correctly measured, attributed, and available for use in optimising your advertising campaigns and understanding your marketing performance.\n\n\u2022 GA4 & Google Tag Manager Setup: We install and configure Google Analytics 4 (GA4) and Google Tag Manager (GTM) (the industry-standard combination for flexible, scalable website tracking) ensuring your data collection is built on a professional foundation from the outset.\n\n\u2022 Form-Fill Conversion Tracking: Every contact form, enquiry form, and lead submission on your website is configured as a tracked conversion event, ensuring that every lead generated is correctly counted and attributed to the marketing channel responsible.\n\n\u2022 Monthly Signal Health Audits: We run regular audits to verify that all tracking tags are firing correctly, conversion events are being captured accurately, and no data is being silently lost, ensuring your analytics data remains trustworthy over time.\n\nWhy This Matters to You\n\nEvery marketing decision you make is only as good as the data behind it. Without correct tracking, you cannot know which campaigns are generating leads, which pages are losing visitors, or where your budget is being wasted. Signal Lite ensures your business is making decisions based on accurate, reliable data, not guesswork.\n\nSKU: DATA-SIGL-01", "newPrice": "$195/mo", "newRaw": 195, "newSku": "DATA-SIGL-01", "clientConcern": "R195/mo for GA4 + GTM setup AND ongoing monthly health audits bundles a significant once-off setup task into a monthly fee. The setup value is front-loaded into month 1, meaning months 2+ feel like you're paying for 'monitoring' only. A cost-conscious client may cancel after month 2 once the setup is done, taking the infrastructure with them. No minimum contract length is mentioned.", "providerConcern": "The setup component (GA4 installation, GTM configuration, conversion event mapping) is a 3-8 hour job that you're amortising across monthly payments. If the client cancels after 2-3 months, you may not recover the setup investment. Consider a setup fee + reduced monthly retainer model, or specify a minimum term. 'Monthly Signal Health Audits' \u2014 define what this means operationally: how many tags checked, what constitutes a 'health audit', and what's the deliverable? Without this, it's an undefined monthly commitment."}, {"id": "new_50", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Signal Pro: E-comm / Hosp", "newDesc": "As browser privacy restrictions tighten and ad-blockers become increasingly common, standard client-side tracking loses a growing proportion of conversion signals. Signal Pro implements server-side tracking infrastructure that bypasses these limitations, recovering lost conversion data, improving the accuracy of your advertising signals, and ensuring your campaigns can optimise effectively in a privacy-first environment.\n\n\u2022 Server-Side Google Tag Manager (sGTM via Stape.io): We deploy a server-side GTM container, moving your tracking from the user's browser to a secure server environment. This significantly reduces data loss from ad-blockers, browser privacy settings, and iOS tracking restrictions.\n\n\u2022 Meta Conversions API (CAPI): We implement Meta's server-side Conversions API alongside the standard browser pixel, creating a dual-signal setup that maximises the conversion data reaching Meta's algorithm. This directly improves campaign efficiency and reducing cost-per-result.\n\n\u2022 Cross-Domain & Booking Engine Tracking: For hospitality and e-commerce businesses using external booking systems or payment platforms, we implement cross-domain tracking to maintain the user session across separate domains, preventing revenue from being attributed to \"direct\" traffic and losing campaign credit for bookings.\n\nWhy This Matters to You\n\nMissing conversion data is not just an analytics problem, it actively degrades your advertising performance. When Meta or Google cannot see a significant portion of your conversions, their algorithms cannot optimise efficiently, and you pay more for worse results. Signal Pro repairs that signal and gives the algorithm the complete picture it needs to perform.\n\nSKU: DATA-SIGP-02", "newPrice": "$495/mo", "newRaw": 495, "newSku": "DATA-SIGP-02", "clientConcern": "R495/mo for server-side tracking is good value for the capability, but 'Stape.io' introduces a named third-party dependency \u2014 if Stape has outages or changes its service, the client's tracking infrastructure is affected. 'Cross-Domain & Booking Engine Tracking' is genuinely complex \u2014 a client with multiple booking systems (e.g., a hotel with a booking engine, spa booking, and restaurant reservations on different platforms) may assume all are covered under this single fee.", "providerConcern": "Stape.io pricing directly affects your margins \u2014 if Stape increases their server-side GTM hosting costs, your spread shrinks. Setup effort is heavily front-loaded (server provisioning, CAPI configuration, cross-domain setup) but billed monthly \u2014 same amortisation risk as Signal Lite. Cross-domain tracking for hospitality can be extremely complex, especially with third-party booking engines that don't support standard GTM integration. Scope the number of domains/booking systems covered upfront \u2014 'Cross-Domain' without a numerical limit is open-ended."}, {"id": "new_53", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Strategic Social Content Design (Carousel) (PPP)", "newDesc": "A professionally designed multi-frame carousel post, complete with a LinkedIn-optimised PDF export; one of the most effective organic content formats available for driving saves, shares, and organic reach on LinkedIn and Instagram simultaneously. Each carousel is developed with the same strategic research foundation as our static posts, structured to deliver genuine value across multiple slides.\n\n\u2022 High-Resolution Carousel Set (4:5 Ratio): A multi-frame carousel designed for Instagram and Facebook feed placement, with each slide designed as part of a cohesive visual story that rewards the viewer for swiping through to the end.\n\n\u2022 LinkedIn Document Post Export (PDF): The carousel is also exported as a PDF in LinkedIn's native document post format (one of LinkedIn's highest-reach content types) extending the same creative asset across two platform environments from a single production.\n\n\u2022 SEO-Optimised Caption (up to 150 words): A professionally written accompanying caption with clear narrative framing, natural keyword integration, and a call-to-action appropriate to the format.\n\nWhy This Matters to You\n\nCarousel and document posts consistently outperform ild a clean, functional user interface using modern frameworks (React/Next.js), ensuring the MVP is both usable and properly responsive across desktop and mobile devices from launch day.\n\n\u2022 User Authentication & Core CRUD Functionality: A secure user authentication system (registration, login, session management) is implemented alongside the core Create, Read, Update, and Delete functionality required to demonstrate the product's primary value proposition.\n\n\u2022 Database Integration & Edge Testing: A relational or document database is selected, integrated, and populated with the data structures required for your application's core workflows. Comprehensive edge-case testing is conducted before launch to identify and resolve critical issues prior to users encountering them.\n\n\u2022 Initial Production Launch: The MVP is deployed to a production environment and made publicly accessible, completing the full cycle from concept to live application.\n\nWhy This Matters to You\n\nThe most expensive mistake in product development is building too much before validating whether the core concept resonates with users. An MVP sprint gets a functional version of your idea in front of real users as quickly as possible (at a fraction of the cost of a full build) so you can learn, iterate, and invest further with evidence rather than assumption.\n\nSKU: APP-MVP-01", "newPrice": "$4,500", "newRaw": 4500, "newSku": "APP-MVP-01", "clientConcern": "R4,500 for an MVP with authentication, CRUD functionality, database integration, edge testing, AND production deployment is extremely aggressive pricing. 'React/Next.js' \u2014 once built, the client may expect ongoing maintenance, feature additions, and bug fixes at the same fixed-sprint rate. No hosting or infrastructure costs are mentioned post-launch \u2014 who pays for the server? 'Minimum Viable Product' \u2014 the word 'minimum' will be interpreted very differently by the client ('it should work perfectly') and the provider ('it should demonstrate the concept').", "providerConcern": "R4,500 for a full MVP sprint is significantly below market rate. This only works if the scope is extremely tightly defined and the application is genuinely simple (basic CRUD with auth). Any complexity \u2014 payment processing, real-time features, complex data relationships, third-party integrations \u2014 will blow the budget. 'Edge Testing' is a professional promise that takes significant time to do properly. Post-launch hosting and maintenance are entirely unaddressed \u2014 the client will expect the app to keep working, and when something breaks (it will), they'll call you. Consider adding mandatory hosting and maintenance SKUs."}];

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const notesRef = db.collection('notes');
const pricesRef = db.collection('updatedPrices');
const commentsRef = db.collection('comments');
const raciRef = db.collection('raci');
const summaryRef = db.collection('summary');

let notes={}, updatedPrices={}, comments={}, raci={}, summaryComments={};
let activeFilter = 'All';

async function loadData() {
  try {
    const [n,p,c,r,s] = await Promise.all([notesRef.get(),pricesRef.get(),commentsRef.get(),raciRef.get(),summaryRef.get()]);
    n.forEach(d => { notes[d.id] = d.data().text; });
    p.forEach(d => { updatedPrices[d.id] = d.data().price; });
    c.forEach(d => { comments[d.id] = d.data().text; });
    r.forEach(d => { raci[d.id] = d.data(); });
    s.forEach(d => { summaryComments[d.id] = d.data().text; });
    document.getElementById('fbStatus').className = 'status connected';
    document.getElementById('fbStatus').querySelector('span').textContent = 'Firebase connected';
    render(); renderSummary();
  } catch(e) {
    console.error(e);
    document.getElementById('fbStatus').className = 'status disconnected';
    document.getElementById('fbStatus').querySelector('span').textContent = 'Offline mode';
    render(); renderSummary();
  }
}

function flashSave() { const el=document.getElementById('saveIndicator'); el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1500); }
async function saveField(ref, id, data) { try { await ref.doc(id).set({...data, updatedAt: new Date().toISOString()}); flashSave(); } catch(e){} }
async function deleteField(ref, id) { try { await ref.doc(id).delete(); flashSave(); } catch(e){} }

async function saveNote(id,text) { notes[id]=text; await saveField(notesRef,id,{text}); render(); }
async function deleteNote(id) { delete notes[id]; await deleteField(notesRef,id); render(); }
async function saveComment(id,text) { comments[id]=text; await saveField(commentsRef,id,{text}); render(); }
async function deleteComment(id) { delete comments[id]; await deleteField(commentsRef,id); render(); }
async function saveUpdatedPrice(id,price) { if(price){updatedPrices[id]=price; await saveField(pricesRef,id,{price});} else {delete updatedPrices[id]; await deleteField(pricesRef,id);} }
async function saveRaci(cat,role,val) { if(!raci[cat]) raci[cat]={}; raci[cat][role]=val; await saveField(raciRef,cat,raci[cat]); }
async function saveSummaryComment(id,text) { summaryComments[id]=text; await saveField(summaryRef,id,{text}); }

function showPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelector('.tab[onclick*="'+page+'"]').classList.add('active');
  document.getElementById('filters').style.display = page==='comparison' ? 'flex' : 'none';
}

function downloadXLS() {
  const rows = DATA.map(row => ({
    'Category': row.category, 'Match Label': row.label,
    'Old Item': row.oldName||'', 'Old Price': row.oldPrice||'',
    'New Item': row.newName||'', 'New SKU': row.newSku||'',
    'New Price': row.newPrice||'',
    'Delta': (()=>{ if(!row.oldRaw||!row.newRaw) return ''; const d=row.newRaw-row.oldRaw; return d>0?'+$'+d.toLocaleString():d<0?'-$'+Math.abs(d).toLocaleString():'Same'; })(),
    'Updated Price': updatedPrices[row.id]||'',
    'Client Concerns': row.clientConcern||'',
    'Provider Concerns': row.providerConcern||'',
    'Comments': comments[row.id]||'',
    'Notes': notes[row.id]||'',
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:28},{wch:22},{wch:36},{wch:14},{wch:36},{wch:16},{wch:14},{wch:12},{wch:14},{wch:60},{wch:60},{wch:40},{wch:40}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Price Card Comparison');
  XLSX.writeFile(wb,'diginauts-price-card-comparison.xlsx');
}

const categories = [...new Set(DATA.map(r=>r.category))];

function buildFilters() {
  const el=document.getElementById('filters');
  el.innerHTML='';
  const all=document.createElement('button');
  all.className='btn btn-secondary'+(activeFilter==='All'?' btn-active':'');
  all.textContent='All';
  all.onclick=()=>{activeFilter='All';render();buildFilters();};
  el.appendChild(all);
  categories.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='btn btn-secondary'+(activeFilter===cat?' btn-active':'');
    btn.textContent=cat;
    btn.onclick=()=>{activeFilter=cat;render();buildFilters();};
    el.appendChild(btn);
  });
}

function getDelta(row) {
  if(row.oldRaw===null||row.newRaw===null) return '<span class="delta na">n/a</span>';
  const d=row.newRaw-row.oldRaw;
  if(d>0) return '<span class="delta up">+$'+d.toLocaleString()+'</span>';
  if(d<0) return '<span class="delta down">−$'+Math.abs(d).toLocaleString()+'</span>';
  return '<span class="delta same">—</span>';
}

function esc(s) { if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function render() {
  const filtered = activeFilter==='All' ? DATA : DATA.filter(r=>r.category===activeFilter);
  const el=document.getElementById('content');
  el.innerHTML='';
  let lastCat='';
  filtered.forEach((row,idx)=>{
    if(row.category!==lastCat){
      lastCat=row.category;
      if(idx===0){
        const hdr=document.createElement('div');
        hdr.className='col-header';
        hdr.innerHTML='<span>Old Item</span><span>Old Price</span><span></span><span>New Item</span><span>New Price</span><span>SKU</span><span>Δ</span><span>Updated Price</span>';
        el.appendChild(hdr);
      }
      const h=document.createElement('div');
      h.className='cat-header';
      h.textContent=row.category;
      el.appendChild(h);
      // RACI bar
      const catKey=row.category.replace(/[^a-zA-Z0-9]/g,'_');
      const rc=raci[catKey]||{};
      const rb=document.createElement('div');
      rb.className='raci-bar';
      ['R','A','C','I'].forEach(role=>{
        const lbl=role==='R'?'Responsible':role==='A'?'Accountable':role==='C'?'Consulted':'Informed';
        rb.innerHTML+=`<div class="raci-field"><span class="raci-label">${role}</span><input class="raci-input" placeholder="${lbl}" value="${esc(rc[role]||'')}" data-cat="${catKey}" data-role="${role}" /></div>`;
      });
      el.appendChild(rb);
      // Bind RACI inputs after append
      rb.querySelectorAll('.raci-input').forEach(inp=>{
        inp.onblur=()=>saveRaci(inp.dataset.cat,inp.dataset.role,inp.value.trim());
        inp.onkeydown=(e)=>{if(e.key==='Enter')inp.blur();};
      });
    }
    const div=document.createElement('div');
    div.className='row';
    const isNew=!row.oldName;
    const noMatch=!row.newName;
    const delta=isNew?'<span class="delta new-tag">NEW</span>':noMatch?'':getDelta(row);
    const hasConcern=row.clientConcern||row.providerConcern;
    const hasComment=!!comments[row.id];
    const hasNote=!!notes[row.id];

    let html=`<div class="row-main">
      <div><span class="item-name old-name">${isNew?'<span class="no-match-cell">—</span>':esc(row.oldName)}</span><span class="label-tag">${esc(row.label)}</span></div>
      <span class="price old-price">${isNew?'':esc(row.oldPrice)}</span>
      <span class="arrow">${noMatch?'':'→'}</span>
      <span class="item-name new-name">${noMatch?'<span class="no-match">No comparison</span>':esc(row.newName)}</span>
      <span class="price new-price">${noMatch?'':esc(row.newPrice)}</span>
      <span class="sku">${row.newSku?esc(row.newSku):''}</span>
      <span>${delta}</span>
      <input class="updated-price-input" data-id="${row.id}" placeholder="—" value="${updatedPrices[row.id]||''}" />
    </div>
    <div class="row-actions">`;
    if(hasConcern) html+=`<button class="toggle-btn" data-target="concern-${row.id}"><span class="dot finding"></span>Stress Test</button>`;
    html+=`<button class="toggle-btn" data-target="comment-${row.id}"><span class="dot ${hasComment?'has':'empty'}"></span>${hasComment?'Edit comment':'Add comment'}</button>`;
    html+=`<button class="toggle-btn" data-target="note-${row.id}"><span class="dot ${hasNote?'has':'empty'}"></span>${hasNote?'Edit note':'Add note'}</button>`;
    if(row.oldDesc||row.newDesc) html+=`<button class="desc-toggle" data-id="desc-${row.id}">Descriptions</button>`;
    html+=`</div>`;
    // Concern panel
    if(hasConcern) html+=`<div class="concern-panel" id="concern-${row.id}"><div class="concern-col client-col"><h4>⚠ Client Concerns</h4>${esc(row.clientConcern)}</div><div class="concern-col provider-col"><h4>⚙ Service Provider Concerns</h4>${esc(row.providerConcern)}</div></div>`;
    // Comment
    if(hasComment) html+=`<div class="preview-text preview-comment">${esc(comments[row.id])}</div>`;
    html+=`<div class="edit-area" id="comment-${row.id}"><textarea placeholder="Add your comment...">${comments[row.id]||''}</textarea><div class="edit-actions">${hasComment?'<button class="edit-btn delete" data-action="deleteComment" data-id="'+row.id+'">Delete</button>':''}<button class="edit-btn cancel" data-target="comment-${row.id}">Cancel</button><button class="edit-btn save" data-action="saveComment" data-id="${row.id}">Save</button></div></div>`;
    // Note
    if(hasNote) html+=`<div class="preview-text preview-note">${esc(notes[row.id])}</div>`;
    html+=`<div class="edit-area" id="note-${row.id}"><textarea placeholder="Add a note...">${notes[row.id]||''}</textarea><div class="edit-actions">${hasNote?'<button class="edit-btn delete" data-action="deleteNote" data-id="'+row.id+'">Delete</button>':''}<button class="edit-btn cancel" data-target="note-${row.id}">Cancel</button><button class="edit-btn save" data-action="saveNote" data-id="${row.id}">Save</button></div></div>`;
    // Desc
    html+=`<div class="desc-panel" id="desc-${row.id}"><div class="desc-col"><h4>Old Description</h4><div class="desc-text">${row.oldDesc?esc(row.oldDesc):'—'}</div></div><div class="desc-col"><h4>New Description</h4><div class="desc-text">${row.newDesc?esc(row.newDesc):'—'}</div></div></div>`;

    div.innerHTML=html;
    el.appendChild(div);
  });
  bindEvents();
}

function bindEvents() {
  document.querySelectorAll('.toggle-btn').forEach(b=>{ b.onclick=()=>{const p=document.getElementById(b.dataset.target);if(p)p.classList.toggle('open');}; });
  document.querySelectorAll('.desc-toggle').forEach(b=>{ b.onclick=()=>{const p=document.getElementById(b.dataset.id);if(p)p.classList.toggle('open');}; });
  document.querySelectorAll('.edit-btn.save').forEach(b=>{ b.onclick=()=>{
    const area=document.getElementById(b.dataset.action.replace('save','').toLowerCase()+'-'+b.dataset.id)||b.closest('.edit-area');
    const text=b.closest('.edit-area').querySelector('textarea').value.trim();
    if(text){ if(b.dataset.action==='saveComment') saveComment(b.dataset.id,text); else saveNote(b.dataset.id,text); }
  };});
  document.querySelectorAll('.edit-btn.cancel').forEach(b=>{ b.onclick=()=>{document.getElementById(b.dataset.target).classList.remove('open');}; });
  document.querySelectorAll('.edit-btn.delete').forEach(b=>{ b.onclick=()=>{ if(b.dataset.action==='deleteComment') deleteComment(b.dataset.id); else deleteNote(b.dataset.id); };});
  document.querySelectorAll('.updated-price-input').forEach(i=>{ i.onblur=()=>saveUpdatedPrice(i.dataset.id,i.value.trim()); i.onkeydown=(e)=>{if(e.key==='Enter')i.blur();}; });
}

function renderSummary() {
  const el=document.getElementById('summaryContent');
  el.innerHTML=`
  <div class="summary-section">
    <h2>Overall Stress Test Summary</h2>
    <p class="summary-text">This review assessed all 58 new line items across the Diginauts service library against potential client misinterpretation, scope ambiguity, pricing sustainability, and operational delivery risks. The findings are structured as client-side concerns (how could a client misread, exploit, or be disappointed by this item?) and provider-side concerns (where could Diginauts face margin erosion, scope creep, or delivery challenges?).</p>
  </div>

  <div class="summary-section">
    <h2>Systemic Themes Identified</h2>
    <div class="theme-card">
      <h4>1. Undefined "Sliding Scale Discount"</h4>
      <p>Referenced 4+ times across Google Ads items but never quantified. Clients will ask for specifics during sales conversations. Either publish a discount table or remove the reference entirely — vague discount promises create negotiation overhead on every deal and risk inconsistent pricing across your client base.</p>
      <div class="affected">Affects: PMax, Remarketing, Shopping Feed, YouTube, Demand Gen</div>
    </div>
    <div class="theme-card">
      <h4>2. Base Fee Stacking Not Explicitly Communicated</h4>
      <p>Both Google Ads (R650/mo) and Paid Social (R650/mo) base management fees sit underneath campaign-specific fees. Total monthly costs are significantly higher than individual line items suggest. If this stacking isn't shown explicitly in proposals, clients will feel misled at invoice time. Every proposal should show: Base Fee + Campaign Fee = Total Monthly Cost.</p>
      <div class="affected">Affects: All Google Paid Media items, Baseline Paid Social, YouTube</div>
    </div>
    <div class="theme-card">
      <h4>3. No Revision Limits Stated</h4>
      <p>Across virtually all creative and design items (videos, posts, carousels, presentations, landing pages, websites), no revision count is specified. This exposes Diginauts to unlimited revision loops. Consider adding a standard revision policy (e.g., "2 rounds of revisions included; additional rounds at R150/round") applied consistently across all creative SKUs.</p>
      <div class="affected">Affects: All Creative Engine tiers, PPP, PPR, Andromeda, Presentation Design, all website packages</div>
    </div>
    <div class="theme-card">
      <h4>4. Billing Frequency Mismatches</h4>
      <p>Several items are described as monthly services but have pricing frequency set to "once" in the system. This will cause invoicing confusion and potential disputes. Items that need correction: CRM Platform Hosting, CRM Support & Data Integrity, Monthly Profile & Content Management.</p>
      <div class="affected">Affects: CRM-HOST-01, CRM-SUPP-01, OSC-MGMT-01</div>
    </div>
    <div class="theme-card">
      <h4>5. Hourly Services Lack Minimums</h4>
      <p>Ad hoc video editing (R60/hr), AI Integration (R120/hr), Web App Development (R120/hr), and Project Management (R55/hr) all lack minimum engagement hours or billing increments. Clients could book 30-minute tasks, creating disproportionate admin overhead. Consider a 1-hour minimum billing increment and/or minimum project sizes for scoped work.</p>
      <div class="affected">Affects: MM-EDIT-01, AI-INT-01, APP-DEV-01, AS-PROJ-01</div>
    </div>
    <div class="theme-card">
      <h4>6. Creative Supply Responsibilities Unclear</h4>
      <p>Multiple campaign management and video items require client-supplied creative assets (footage, display ads, video content) but don't explicitly state this in the description. If a client signs up for YouTube Advertising or PMax management without video assets, those campaign types can't run — but the management fee is still charged. Every item that requires client-supplied creative should state this as a prerequisite.</p>
      <div class="affected">Affects: YouTube Video Advertising, PMax, Demand Gen, Remarketing, Andromeda Pulse, Performance Video Ad Pack</div>
    </div>
    <div class="theme-card">
      <h4>7. Once-Off Services Requiring Ongoing Maintenance</h4>
      <p>Several items priced as once-off deliverables describe work that inherently requires ongoing maintenance: POPIA/GDPR compliance, Data Architect, Integration Hub, AI Automation Setup. Clients may assume the once-off fee covers perpetual functionality. Consider pairing each with a recommended maintenance add-on or making ongoing monitoring explicit as out-of-scope.</p>
      <div class="affected">Affects: AS-COMP-01, DATA-ARCH-03, SHPF-INT-01, AI-AUTO-01</div>
    </div>
    <div class="theme-card">
      <h4>8. Aggressive Pricing on High-Skill Services</h4>
      <p>AI Integration (R120/hr), Web App Development (R120/hr), MVP Sprint (R4,500), and Project Management (R55/hr) are priced significantly below market rate for the skill levels described. This risks attracting clients with enterprise expectations at freelancer budgets, and may signal to higher-value prospects that the service lacks seniority. Review whether these rates are sustainable and whether they position Diginauts correctly in the market.</p>
      <div class="affected">Affects: AI-INT-01, APP-DEV-01, APP-MVP-01, AS-PROJ-01</div>
    </div>
  </div>
