ocial media campaigns, exported to match key placements on YouTube, Google, Instagram, Facebook & LinkedIn for optimal performance. These videos do not include any on-site production. All media shower video assets are created using existing video and content libraries.\n\ncost per pack", "oldPrice": "$950/mo", "oldRaw": 950, "newName": "Performance Video Ad Pack: Short-Form", "newDesc": "This package produces a professionally post-produced set of short-form video assets specifically optimised for performance advertising across all major digital platforms. Rather than a single video, it delivers a complete set of correctly formatted, platform-native versions from a single creative concept, ensuring your video content performs at its maximum potential regardless of where it is placed.\n\n\u2022 Multi-Ratio Delivery - 1:1, 9:16, 16:9: One core video is delivered in all three standard aspect ratios, covering square (feed), vertical (stories/reels), and landscape (YouTube/desktop) placements simultaneously; eliminating the need to reformat or repurpose assets manually.\n\n\u2022 Up to 30-Second Duration: Optimised for performance advertising within the proven attention window for paid social and search video placements, balancing message completeness with viewer retention rates.\n\n\u2022 Platform-Export Optimisation: Each ratio is exported to the precise technical specifications of its target platform (correct resolution, file size, frame rate, and encoding) ensuring maximum delivery quality and algorithmic favourability.\n\n\u2022 Existing Content Library Foundation: Assets are produced from your existing footage or content library, keeping production efficient and costs controlled while maximising the value of creative you already own.\n\nWhy This Matters to You\n\nA single video in a single format loses reach across every placement it is not correctly sized for. Platform algorithms favour native-format content, and incorrectly formatted ads are penalised with lower delivery and higher costs. This pack ensures every version of your creative is built correctly for every environment it will run in.\n\nSKU: MM-ADPK-01", "newPrice": "$950 per Videos", "newRaw": 950, "newSku": "MM-ADPK-01", "clientConcern": "'Existing Content Library Foundation' \u2014 the client must supply footage. But what if they don't have any? The description doesn't offer an alternative or contingency. 'Up to 30-Second Duration' \u2014 client may want 60s for YouTube pre-roll. 'Multi-Ratio Delivery' (1:1, 9:16, 16:9) is effectively three separate editing jobs from one concept \u2014 the client may not appreciate that they're getting significant value here, or they may demand additional ratios.", "providerConcern": "Delivering three ratio versions from one concept is operationally intensive \u2014 this is essentially three videos of editing work priced as one. At R950 per pack, you need to ensure the production workflow supports efficient multi-ratio output. If the client's source footage is only available in one aspect ratio, the reformatting work for the other two is creative, not just technical. 'Platform-Export Optimisation' \u2014 if platform specifications change (Meta regularly updates requirements), you need to stay current."}, {"id": "map_41_1", "category": "Multimedia / Video", "label": "Animation", "oldName": "The Cosmic Animation", "oldDesc": "Project your brand into the Digiverse with animated video content. Create a deeper connection between your solutions and your ideal customer with engaging and well produced animated narratives. Requirements and animation styles can vary greatly, creating a wide range of scope potential, technology apps and budget possibilities.\n\nPrice varies per video", "oldPrice": "Custom", "oldRaw": null, "newName": "Ad Video Optimisation Package", "newDesc": "This service takes existing video content you already own and optimises it specifically for paid advertising deployment. Rather than producing new content from scratch, it transforms your current video material into correctly formatted, platform-ready advertising assets, maximising the return on content you have already invested in.\n\n\u2022 Format Optimisation for Ad Platforms: Your supplied footage is edited, cropped, and technically reconfigured to meet the specific format requirements of paid advertising placements (correct aspect ratios, durations, file specifications, and encoding standards for each target platform).\n\n\u2022 Up to 15-Second Duration: The supplied content is shaped into a high-impact 15-second performance creative, aligning with the proven optimal duration for paid social and search video advertising.\n\n\u2022 Multi-Ratio Output: Delivery includes the optimised asset in the standard required ratios, formatted for feed, story, and display placements as relevant to your campaign requirements.\n\nWhy This Matters to You\n\nRepurposing existing content for advertising is significantly more cost-efficient than producing new assets from scratch, but only if it is done correctly. Raw footage, marketing videos, or social content uploaded directly to ad platforms without proper optimisation performs poorly. This service bridges the gap, ensuring your existing content meets the technical and creative standards required to perform in a paid advertising environment.\n\nSKU: MM-OPTI-01", "newPrice": "$250 per Video", "newRaw": 250, "newSku": "MM-OPTI-01", "clientConcern": "'Up to 15-second duration' \u2014 client paying R250 per video may push for 20-30s and argue the value proposition doesn't change. 'Multi-ratio output' doesn't state how many ratios are included \u2014 if only 2 are delivered but the client expects 4, there's a dispute. 'Existing video content you already own' \u2014 if the supplied footage is poor quality, who decides whether it's usable? No clear rejection/re-brief mechanism.", "providerConcern": "If the supplied footage is genuinely unusable (wrong aspect ratio, too low resolution, insufficient length), you're stuck \u2014 the description doesn't give you grounds to reject and re-quote. Delivering multi-ratio exports from poorly shot source material means more editing time per unit than priced. No explicit statement that the client must supply footage upfront, leaving room for drip-fed assets that extend timelines."}, {"id": "map_42_0", "category": "Multimedia / Video", "label": "Curated Video", "oldName": "The Curated Impulse", "oldDesc": "Ignite your Digital presence with curated videos. These videos do not require any on-site production. Incl. storyboarding (pre-production), media sourcing, post production, customised to your preferred marketing objectives and channels. \n\nPrice varies per video", "oldPrice": "Custom", "oldRaw": null, "newName": "Ad hoc video edit: Per Hour Rate:", "newDesc": "A flexible, on-demand video post-production service billed by the hour, providing access to professional editing resource for projects that do not fit a fixed-scope package. Ideal for one-off edits, existing video modifications, format conversions, or overflow production work that falls outside a standing creative package.\n\n\u2022 Remote Professional Video Editing: All editing is conducted remotely by a professional video editor using industry-standard post-production software, delivering polished results without on-site resource requirements.\n\n\u2022 Flexible Scope: Each hour of editing can be applied to cutting, sequencing, colour grading, subtitle addition, audio mixing, format conversion, asset optimisation, or any standard post-production task as directed.\n\n\u2022 Transparent Billing: Hours are logged accurately and billed at the agreed rate, with a clear scope confirmed before work begins to avoid ambiguity on deliverables.\n\nWhy This Matters to You\n\nNot every video project fits a fixed package. When you have existing footage that needs professional attention, a quick format conversion, or a standalone editing job, this hourly service provides professional quality without the overhead of a full production scope.\n\nSKU: MM-EDIT-01", "newPrice": "$60 per Hour", "newRaw": 60, "newSku": "MM-EDIT-01", "clientConcern": "No minimum billing increment stated \u2014 a client needing a 20-minute fix may dispute being billed a full hour. 'Any standard post-production task as directed' sets no boundary on what constitutes 'standard' \u2014 motion graphics, compositing, colour science work, and 3D all arguably fall under 'editing' to a non-specialist. No revision policy: if the client rejects the edit, does re-doing it count as a new billable hour or continuation of the original task? The phrase 'scope confirmed before work begins' is good intent but isn't a contractual mechanism.", "providerConcern": "At R60/hr with no minimum engagement, micro-tasks (5-minute tweaks) become admin-heavy and unprofitable. The scope confirmation step adds pre-production time that isn't billable. 'Industry-standard post-production software' \u2014 if a client requests a specific tool (DaVinci, Premiere, After Effects), can you guarantee availability? No cap on revision loops within a single engagement means a perfectionist client can burn hours on a single deliverable."}, {"id": "map_43_0", "category": "Multimedia / Video", "label": "Documentary Video", "oldName": "The Doc. Stargazer", "oldDesc": "Create a window that peeks into the world of your business. The ever popular documentary style video. Excellent for capturing testimonials, stories as well as showcasing capabilities and experience. Incl storyboarding (pre-production), media sourcing, post production, customised to your preferred marketing objectives & channels.", "oldPrice": "Custom", "oldRaw": null, "newName": "Ad hoc video edit: Per Hour Rate:", "newDesc": "A flexible, on-demand video post-production service billed by the hour, providing access to professional editing resource for projects that do not fit a fixed-scope package. Ideal for one-off edits, existing video modifications, format conversions, or overflow production work that falls outside a standing creative package.\n\n\u2022 Remote Professional Video Editing: All editing is conducted remotely by a professional video editor using industry-standard post-production software, delivering polished results without on-site resource requirements.\n\n\u2022 Flexible Scope: Each hour of editing can be applied to cutting, sequencing, colour grading, subtitle addition, audio mixing, format conversion, asset optimisation, or any standard post-production task as directed.\n\n\u2022 Transparent Billing: Hours are logged accurately and billed at the agreed rate, with a clear scope confirmed before work begins to avoid ambiguity on deliverables.\n\nWhy This Matters to You\n\nNot every video project fits a fixed package. When you have existing footage that needs professional attention, a quick format conversion, or a standalone editing job, this hourly service provides professional quality without the overhead of a full production scope.\n\nSKU: MM-EDIT-01", "newPrice": "$60 per Hour", "newRaw": 60, "newSku": "MM-EDIT-01", "clientConcern": "No minimum billing increment stated \u2014 a client needing a 20-minute fix may dispute being billed a full hour. 'Any standard post-production task as directed' sets no boundary on what constitutes 'standard' \u2014 motion graphics, compositing, colour science work, and 3D all arguably fall under 'editing' to a non-specialist. No revision policy: if the client rejects the edit, does re-doing it count as a new billable hour or continuation of the original task? The phrase 'scope confirmed before work begins' is good intent but isn't a contractual mechanism.", "providerConcern": "At R60/hr with no minimum engagement, micro-tasks (5-minute tweaks) become admin-heavy and unprofitable. The scope confirmation step adds pre-production time that isn't billable. 'Industry-standard post-production software' \u2014 if a client requests a specific tool (DaVinci, Premiere, After Effects), can you guarantee availability? No cap on revision loops within a single engagement means a perfectionist client can burn hours on a single deliverable."}, {"id": "map_9_14", "category": "CRM", "label": "CRM Setup", "oldName": "CRM Set-up and Configuration", "oldDesc": "A tailored CRM (Customer Relationship Management) infrastructure designed to capture, manage, and nurture your leads directly from your website. Diginauts doesn't just \"install\" software; we build a seamless bridge between your digital presence and your sales process. By connecting your WordPress site to your CRM via custom-mapped data fields, we ensure every visitor interaction is logged, categorised, and ready for follow-up without manual data entry.\nOur approach to CRM integration is built for efficiency and scale. We avoid heavy, bloated connection scripts that slow down your site. Instead, we implement \"lean\" integration methods that maintain your website's high-speed performance while ensuring 100% data accuracy. Whether you are capturing simple contact forms or complex multi-step lead qualifications, the data flow is secure, encrypted, and instantaneous.\nThe user experience is at the heart of our builds. We customise the lead capture journey specifically for mobile, tablet, and desktop users, ensuring that forms are easy to navigate and complete on any device. Beyond the technical setup, we configure your CRM dashboard and automated workflows \"by hand,\" tailoring the interface to match your specific business logic. You get a powerful, automated sales engine that is easy to manage and provides clear, actionable insights into your customer pipeline.", "oldPrice": "$700", "oldRaw": 700, "newName": "CRM Implementation & Lead Strategy", "newDesc": "This service builds the complete Customer Relationship Management (CRM) infrastructure required to capture, organise, and automatically follow up with every lead your website or marketing generates. Using lean integration methods that do not compromise your site's speed, it creates a seamless data bridge between your online presence and your sales process.\n\n\u2022 CRM Platform Configuration: We set up and configure your GoHighLevel CRM environment; building the pipeline structure, contact fields, tagging taxonomy, and user access configuration required to reflect your specific sales process from first enquiry through to closed deal.\n\n\u2022 Website Lead Capture Integration: Lead capture forms, chat widgets, or booking tools on your website are connected to the CRM, ensuring every submission is automatically categorised, tagged, and available in your pipeline the moment it arrives - with zero manual data entry required.\n\n\u2022 Automated Follow-Up Sequences: Initial automated response workflows are configured, ensuring that every enquiry receives an immediate, professional acknowledgement; maintaining lead interest and setting a professional standard from the first interaction.\n\n\u2022 Please Note: Complexity varies significantly between clients. Pricing reflects a base starting point; more complex CRM setups with advanced automation, integrations, or large data migrations are scoped and quoted based on specific requirements.\n\nWhy This Matters to You\n\nA CRM is the commercial nervous system of your business. Without it, leads fall through the gaps, follow-ups are forgotten, and the full value of your marketing investment is never realised. This implementation turns every enquiry your marketing generates into a properly tracked, systematically followed-up commercial opportunity.\n\nSKU: CRM-IMPL-01", "newPrice": "Custom", "newRaw": null, "newSku": "CRM-IMPL-01", "clientConcern": "Price is Custom with no stated base range \u2014 the description says 'base starting point' but never names a number. Clients will anchor to whatever was verbally quoted and consider any increase scope creep. 'Automated Follow-Up Sequences' has no limit on sequence count or step count \u2014 client may expect 10 sequences with 8 steps each. 'Complexity varies significantly between clients' is honest but doesn't protect you if the scope wasn't documented before work began.", "providerConcern": "CRM implementation is the single highest scope-risk service on the card. The gap between a simple 3-field form connected to a pipeline and a multi-sequence, multi-pipeline, API-integrated system with lead scoring is enormous \u2014 but both fall under this SKU. The 'Please Note' section tries to manage this, but in practice, scope creep happens mid-implementation when the client says 'while you're in there, can you also...' Without a fixed scope document signed before work begins, this service will consistently over-deliver against the fee. GHL platform limitations may also constrain what was promised verbally."}, {"id": "map_10_16", "category": "CRM", "label": "CRM Maintenance", "oldName": "CRM System Maintenance & Data Integrity", "oldDesc": "A CRM is only as powerful as the data within it. Our maintenance service ensures your system remains a high-performance tool, free from the \"data decay\" that typically plagues unmanaged systems. Diginauts provides a hands-on technical guardianship of your CRM environment, performing regular audits to ensure that the bridge between your website and your database remains seamless, secure, and lightning-fast.\nOur maintenance approach is proactive and precise. We don\u2019t just monitor for errors; we \"hand-clean\" your data structures, manage user permissions, and ensure that your lead-capture logic continues to function perfectly across all device types. As CRM platforms release updates and web standards evolve, we manage these transitions behind the scenes, preventing any disruption to your workflow or data loss.\n\n5 hours a month cap", "oldPrice": "$350/mo", "oldRaw": 350, "newName": "CRM Support & Data Integrity Management", "newDesc": "This monthly service keeps your CRM environment operating at its highest level of effectiveness through proactive maintenance, data hygiene management, and ongoing optimisation. It prevents the gradual deterioration of CRM data quality, known as data decay, that silently undermines automated marketing performance and sales pipeline accuracy over time.\n\n\u2022 Data Integrity Audits & Cleaning: We conduct regular structured audits of your contact database, identifying and resolving duplicate records, incomplete data fields, incorrect tags, and outdated contact information - ensuring your pipeline and marketing lists remain accurate and actionable.\n\n\u2022 Automation & Workflow Maintenance: As the GoHighLevel platform evolves and your business processes change, we proactively manage the maintenance of your automation workflows, ensuring they continue to function correctly without disruption to your lead flow or sales sequences.\n\n\u2022 CRM-to-Website Data Bridge Monitoring: The technical connection between your website lead capture and your CRM is monitored and maintained, with proactive intervention if form submissions or data flows are disrupted.\n\n\u2022 Please Note: The complexity and volume of monthly management varies by client. Pricing reflects a base starting point; more complex environments are priced based on scope.\n\nWhy This Matters to You\n\nA CRM that is not actively maintained degrades rapidly. Duplicate records, stale data, and broken automations mean your marketing emails start bouncing, your sales team works from inaccurate information, and automated workflows that were working on day one quietly stop firing. This service is the proactive management discipline that prevents that deterioration.\n\nSKU: CRM-SUPP-01", "newPrice": "Custom", "newRaw": null, "newSku": "CRM-SUPP-01", "clientConcern": "Price is Custom, frequency listed as 'once' but the service is monthly \u2014 same billing mismatch as CRM Hosting. 'Data Integrity Audits' implies Diginauts guarantees data quality \u2014 if a campaign underperforms because of dirty CRM data, the client may argue this service should have caught it. No defined SLA on response time for broken automations or data flow disruptions.", "providerConcern": "'CRM-to-Website Data Bridge Monitoring' means you're responsible for a connection that can break due to WordPress updates, plugin conflicts, hosting changes, or GHL platform updates \u2014 none of which you control. At Custom/unknown pricing, each client negotiation risks underpricing the actual monthly effort. 'Proactive intervention' is an open-ended commitment \u2014 a single broken Zap or webhook can take hours to diagnose. No stated monthly hour cap."}, {"id": "map_22_15", "category": "CRM", "label": "CRM Subscription", "oldName": "Managed CRM Subscription & Ecosystem Access", "oldDesc": "The Infrastructure: Your all-in-one license and high-speed environment.\nThis subscription provides your business with the \"keys to the kingdom.\" It covers the essential licensing and the enterprise-grade cloud infrastructure required to host your data. Unlike standard \"off-the-shelf\" software that surprises you with extra fees for storage or API usage, this is a fixed-cost gateway to a high-performance environment.\n\u2022 Software Licensing: Full access to the CRM ecosystem and WordPress-integrated tools.\n\u2022 High-Speed Hosting: Dedicated cloud resources so your system stays fast as your database grows.\n\u2022 Connectivity: Covers the \"always-on\" data bridge between your website and your sales team.\n\u2022 Security: Advanced encryption and server-side protocols to keep customer data locked down.", "oldPrice": "$50/mo", "oldRaw": 50, "newName": "CRM Platform Ecosystem & Cloud Hosting", "newDesc": "This is a fixed monthly software access fee that covers your GoHighLevel CRM platform licensing and the enterprise-grade cloud hosting infrastructure required to operate your CRM environment. It is the foundational access layer that keeps your lead capture, automation, and database infrastructure securely operational at all times.\n\n\u2022 GoHighLevel Platform License: Access to the GoHighLevel CRM platform under our agency ecosystem; providing the full suite of CRM, automation, pipeline, and communication tools without requiring you to manage a direct platform account.\n\n\u2022 Enterprise Cloud Infrastructure: The hosting resources, data security, and uptime reliability of your CRM environment are maintained at an enterprise level, ensuring your lead capture and automation systems remain operational around the clock.\n\n\u2022 Base Fee Coverage: The standard monthly fee covers most single-business CRM use cases. More complex configurations with multiple sub-accounts, advanced integrations, or significantly higher usage volumes may require an adjusted pricing arrangement.\n\n\u2022 Please Note: Pricing scales with usage complexity. Our base fee is competitive when compared to equivalent enterprise CRM platforms.\n\nWhy This Matters to You\n\nYour CRM is a live, mission-critical business system. The moment it goes down or loses access, your lead capture stops, your automations pause, and your sales team loses visibility of their pipeline. This hosting fee ensures the infrastructure behind your CRM is always available, always secure, and always managed at a professional level.\n\nSKU: CRM-HOST-01", "newPrice": "Custom", "newRaw": null, "newSku": "CRM-HOST-01", "clientConcern": "Price is Custom but frequency is listed as 'once' in the system \u2014 this is a monthly recurring fee. Invoicing confusion is guaranteed. Client may compare to raw GHL pricing ($97-$497/mo) visible on the GHL website and question the Diginauts markup. 'More complex configurations' may incur higher fees, but the thresholds aren't defined \u2014 what counts as 'complex'? Multi-user? Multi-location? API volume?", "providerConcern": "This is a margin play on GHL reselling \u2014 your cost is fixed at whatever your agency GHL plan costs, and the spread is your margin. If GHL increases their pricing (which they have done historically), your margin shrinks unless you pass the increase through. 'Enterprise Cloud Infrastructure' is strong language \u2014 make sure your actual hosting setup justifies the term. If a client's CRM goes down and they reference the 'enterprise-grade' and 'operational around the clock' promises, you're exposed."}, {"id": "map_34_45", "category": "SEO", "label": "SEO", "oldName": "SEO The Algorithmic Crawler (Per website)", "oldDesc": "Help your future customers navigate digital space by making your WordPress website more discoverable on Google\u2019s organic search results. These rankings are earned, and do not form part of Google\u2019s paid advertising rankings.\u00a0\nOrganic traffic accounts for some of the highest quality web traffic a brand or company can capture. Diginaut\u2019s SEO offer incl. superior on-page meta data structuring, in-depth keyword analysis, SEO content research, SEO content design, fine tuning SERP features to boost visibility and leveraging relevant Google apps.\nExternal link building does not form part of our service. Please inquire for more info on Diginaut\u2019s SEO service scope as there are a wide range of configuration options available.\nCost depends on requirements and scope", "oldPrice": "Custom", "oldRaw": null, "newName": "SEO Maintenance: Base", "newDesc": "This service provides the essential monthly technical maintenance required to protect and incrementally improve your website's position in organic search results. It addresses the continuous stream of on-page issues, performance signals, and content opportunities that, if left unmanaged, cause search rankings to erode over time.\n\n\u2022 SE Ranking Platform Audits: We run regular technical SEO audits using enterprise-grade software to identify crawl errors, broken links, duplicate content, missing metadata, page speed issues, and other ranking-suppressing technical faults.\n\n\u2022 On-Page Issue Remediation: Identified issues are actioned and fixed on a rolling monthly basis, ensuring your website remains technically sound and fully crawlable by Google's indexing systems.\n\n\u2022 Rank Tracking & Performance Reporting: Your target keyword positions are tracked weekly, with monthly reporting showing ranking movements, organic traffic trends, and click-through rate performance from Google Search Console data.\n\nWhy This Matters to You\n\nSEO is not a one-time project, it is an ongoing discipline. Search engines continuously re-evaluate websites, competitors regularly update their content, and technical issues accumulate over time. Without active monthly maintenance, rankings that took months to build can be lost in weeks. This service protects your existing organic investment and creates the stable foundation required for sustainable search growth.\n\nSKU: SEO-MNT-01", "newPrice": "$750/mo", "newRaw": 750, "newSku": "SEO-MNT-01", "clientConcern": "'SE Ranking Platform Audits' \u2014 naming the specific tool is transparent (good) but may concern clients who prefer Ahrefs, SEMrush, or Moz. R750/mo for ongoing SEO maintenance is competitive, but does this include any content creation or just technical fixes? If only technical, the client may feel they're paying for monitoring without improvement. 'Issue Remediation' has no cap on hours or number of fixes \u2014 but in practice, R750/mo allows limited remediation time.", "providerConcern": "Naming SE Ranking locks you into the platform \u2014 if you switch to a different tool, client may question data continuity. R750/mo needs a clearly defined scope of work: X hours of technical remediation, X pages audited, X issues addressed. Without this, demanding clients will submit unlimited fix requests. 'On-Page Issue Remediation' could mean fixing a broken link (2 minutes) or restructuring a page's schema markup (2 hours) \u2014 the range is too wide for a fixed monthly fee. Consider defining 'minor' vs 'major' issues with different handling processes."}, {"id": "map_33_44", "category": "Project Management", "label": "Project Management", "oldName": "Project Manager", "oldDesc": "Allocating your very own Diginaut to help you solve problems and assist with tasks as they relate to services that Diginauts is able to offer or support. \n\n10 hours per month 20% discount", "oldPrice": "$440/mo", "oldRaw": 440, "newName": "Project Management fee", "newDesc": "A flexible, per-hour project management service providing dedicated coordination, timeline oversight, and cross-team resource management for complex, multi-service engagements. This ensures that when multiple service lines are running simultaneously (creative, paid media, development, and data) they are all aligned, on schedule, and progressing toward your business goals in a coordinated and accountable way.\n\n\u2022 Dedicated Account Oversight: A named project manager maintains responsibility for the coordination of all active service lines within your account, acting as the single point of communication between your organisation and all execution teams.\n\n\u2022 Agile Sprint Tracking & Timeline Enforcement: Work is organised and tracked in structured sprint cycles with clear milestones, ensuring deliverables are produced to schedule and any delays or blockers are identified and escalated immediately.\n\n\u2022 Stakeholder Status Reporting: Regular structured status updates are delivered to your stakeholders; covering progress against milestones, upcoming actions, budget pacing, and any decisions requiring client input.\n\n\u2022 Quality Assurance Workflows: Before any deliverable is presented to you, it passes through a defined quality assurance process to ensure it meets the agreed brief, technical specifications, and brand standards.\n\nWhy This Matters to You\n\nComplex digital marketing programmes involve multiple disciplines, vendors, timelines, and stakeholders. Without dedicated project management, misaligned priorities, missed deadlines, and poor communication between teams quietly erode the value of every service you are investing in. This service ensures everything runs in coordination, and that you always know exactly where things stand.\n\nSKU:\u00a0AS-PROJ-01", "newPrice": "$55 per Hour/mo", "newRaw": 55, "newSku": "AS-PROJ-01", "clientConcern": "R55/hr for project management is below market rate \u2014 which is great for the client but may signal low seniority or limited availability. 'Named project manager' creates a personal relationship expectation \u2014 what happens during leave, illness, or staff turnover? 'Quality Assurance Workflows' implies every deliverable is QA'd before presentation, but if the client's brief was vague, what standards is QA measured against?", "providerConcern": "R55/hr for PM is unsustainable unless the PM is managing multiple accounts simultaneously, which reduces the 'dedicated' nature of the service. 'Agile Sprint Tracking & Timeline Enforcement' requires tooling, methodology, and team buy-in \u2014 if the rest of the agency doesn't operate in sprints, the PM is enforcing a methodology in isolation. 'Quality Assurance Workflows' commits you to a QA process that needs to be documented and consistently applied. The hourly model means the PM has a financial disincentive to be efficient \u2014 billing fewer hours means less revenue but better client experience."}, {"id": "new_2", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "AI Agent & Core Workflow Automation Setup", "newDesc": "A fixed-scope deployment of smart automated workflows and custom AI agents, designed to systematically eliminate repetitive manual tasks from your business operations. Using leading integration platforms and LLM APIs, this service maps, designs, and launches 2-3 core automation sequences - turning operational bottlenecks into autonomous, AI-powered processes.\n\n\u2022 Core Business Process Mapping (2-3 Workflows): We identify and document 2-3 repetitive operational sequences that are consuming disproportionate manual time (such as lead scoring and routing, automated content generation, customer communication workflows, or internal reporting processes) and design the automation logic for each.\n\n\u2022 Multi-Platform Workflow Automation (Make/Zapier): We build and deploy the automation sequences using industry-leading integration platforms, connecting your existing tools and data sources without requiring custom code wherever native integrations exist.\n\n\u2022 Structured Prompt Engineering: For any AI-driven steps within the workflow, we design and calibrate the prompt architectures that ensure the AI component produces consistent, accurate, and commercially appropriate outputs within the automated sequence.\n\n\u2022 Operational Team Handover & Training: We document the deployed automations clearly and conduct a structured handover session with your team, ensuring they understand how to monitor, adjust, and extend the workflows independently after delivery.\n\nWhy This Matters to You\n\nManual, repetitive processes are expensive - not just in direct time cost, but in the human error, inconsistency, and staff frustration they generate. Each automation deployed under this service continues working reliably, at scale, without those costs - freeing your team to focus on work that genuinely requires human judgement and creativity.\n\nSKU: AI-AUTO-01", "newPrice": "$1,850", "newRaw": 1850, "newSku": "AI-AUTO-01", "clientConcern": "'2-3 core automation sequences' \u2014 a client may define a single 'sequence' as a 15-step workflow with conditional branching across 4 platforms, while Diginauts may define it as a linear 3-step trigger-action chain. No definition of sequence complexity anywhere. The handover implies self-sufficiency, but if something breaks post-delivery, clients will expect support. API subscription costs (Make/Zapier plans, LLM API tokens) are not mentioned \u2014 client may assume these are included.", "providerConcern": "R1,850 for 2-3 automations is viable only if they're straightforward. One complex Make scenario with error handling, conditional paths, and API rate limit management can consume the entire budget alone. No ongoing support is included, but 'extend the workflows independently' language in the handover section creates an implicit expectation of availability for questions. If an automation breaks due to a third-party API change 2 weeks after delivery, the client will call you, not the API provider."}, {"id": "new_3", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "AIO Visibility Shield", "newDesc": "Artificial intelligence is fundamentally changing how people find information online. Tools like Google AI Overviews, ChatGPT, Perplexity, and similar platforms now answer search queries directly; often without the user ever visiting a website. This service tracks where your brand appears within those AI-generated responses and makes targeted content adjustments to improve your visibility within them.\n\n\u2022 AI Citation Tracking: Using SE Ranking's AI monitoring tools, we track whether and how your brand, content, and key topics are being cited within AI-generated search responses across major platforms; providing visibility into an entirely new category of search real estate.\n\n\u2022 AI Fragment Optimisation: We identify the specific content structures, answer formats, and authority signals that AI search engines favour when selecting sources to cite, and make targeted on-page adjustments to align your content with those patterns.\n\n\u2022 Reporting & Trend Monitoring: Monthly reporting shows changes in AI citation frequency, which topics are generating AI appearances, and how this new traffic channel is evolving, giving you early intelligence in a rapidly developing landscape.\n\nWhy This Matters to You\n\nAI-generated answers are displacing traditional search results at an accelerating pace. Brands that appear prominently within those answers gain visibility and credibility without the user needing to search further. This service ensures you are not invisible in the search environment of tomorrow.\n\nSKU: SEO-AIO-01", "newPrice": "$250/mo", "newRaw": 250, "newSku": "SEO-AIO-01", "clientConcern": "'Targeted content adjustments' is dangerously ambiguous \u2014 does this mean rewriting entire pages, adding FAQ schema, tweaking meta descriptions, or restructuring content architecture? A client paying R250/mo will interpret this as whatever they need it to be. 'AI Citation Tracking' relies on SE Ranking's AI monitoring, but the accuracy of these tools is still immature \u2014 clients may challenge the data. No baseline or KPI is established, making it hard to prove value.", "providerConcern": "The AI search landscape changes monthly \u2014 what works for AI visibility today may be irrelevant in 6 months. You're selling a service where the deliverable definition is inherently unstable. R250/mo is too low if any manual content work is involved; this only works at scale if the 'adjustments' are metadata-level, not content rewrites. Proving ROI to a sceptical client will be nearly impossible given current attribution limitations in AI search."}, {"id": "new_4", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Andromeda Hook Bolt-on", "newDesc": "Andromeda Hook Bolt-on: Alternative Visual Introduction for Existing Video\n\nThis is an add-on to an existing Andromeda Pulse Video. It produces a single new 3-second visual opening sequence for the same core video, using a completely different visual setup, scene, or graphic treatment. This allows you to run two distinct versions of the same ad and let the algorithm identify which opening performs best; without the cost of producing an entirely new video.\n\n\u2022 Unique Visual Entry Point: A fresh 3-second intro is designed and produced using a visually distinct concept from the original hook, ensuring it registers as a genuinely different creative stimulus for the audience.\n\n\u2022 Seamless Integration: The new intro is cut and delivered as a complete, standalone video; ready to upload and run as a separate creative variant alongside the original.\n\n\u2022 Algorithm-Driven Testing: Running multiple hook variations on the same body of content accelerates the algorithm's ability to identify the most efficient creative, lowering your cost-per-result over time.\n\nWhy This Matters to You\n\nThe first three seconds of a paid video determine whether the viewer stops scrolling or keeps moving. Testing multiple visual entry points on the same core message is one of the most cost-efficient optimisation strategies available. This bolt-on delivers that capability at a fraction of the cost of a full additional video.\n\nSKU: MPM -ANDR-02", "newPrice": "$125", "newRaw": 125, "newSku": "MPM -ANDR-02", "clientConcern": "Described as a 'bolt-on' but there's no stated prerequisite that an Andromeda Pulse Video must have been purchased. A client could theoretically order this standalone and then argue they need the base video too. No revision count \u2014 if the 3-second hook doesn't land, how many iterations are included? 'Completely different visual setup' \u2014 who defines what qualifies as 'completely different'?", "providerConcern": "At R125 for a 3-second creative piece, margin depends entirely on the complexity. If the client expects a fully new concept (different location, props, graphic treatment) vs. a simple re-edit of existing footage, the time investment is vastly different. No clear scope boundary on what 'visually distinct' means in practice. If ordered without the parent Pulse Video, you're producing a hook for content that may not exist yet."}, {"id": "new_5", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Andromeda Pulse Video", "newDesc": "A standalone, professionally produced 15-second video asset built specifically for performance advertising on Meta platforms. This is a purpose-built paid media creative, engineered for algorithm favourability, scroll-stopping visual impact, and conversion-oriented structure - not a general brand video repurposed for ads.\n\n\u2022 Performance-Optimised Video Production: A single 15-second video is produced to paid media best-practice specifications, including correct aspect ratios, safe-zone compliance, and platform-native design principles to maximise delivery efficiency.\n\n\u2022 Conversion-Focused Structure: The video is built around a proven performance framework (a strong visual hook in the first three seconds, a clear value proposition in the middle, and a direct call-to-action close) to drive measurable action from viewers.\n\n\u2022 Platform-Native Delivery: The final asset is delivered in the correct format, resolution, and file specification required for optimal placement across Meta's feed, story, and reel environments.\n\nWhy This Matters to You\n\nA video that performs on social media looks very different from a brand film or a general marketing video. Paid media creative must communicate value and trigger action within seconds, in a format the algorithm rewards with lower costs and wider reach. This service produces an asset built to that specific standard.\n\nSKU: MPM -ANDR-01", "newPrice": "$395", "newRaw": 395, "newSku": "MPM -ANDR-01", "clientConcern": "'Purpose-built paid media creative' but no mention of who supplies raw footage, b-roll, product shots, or brand assets. If the client assumes Diginauts shoots or sources this, R395 is absurdly cheap and expectations will be wildly misaligned. 'Single 15-second video' \u2014 client may want 30s or expect a second version for a different platform. No revision limit stated anywhere.", "providerConcern": "This is priced as post-production only, but the description reads like a full production service. If even one client per quarter assumes footage sourcing is included, the dispute resolution time alone exceeds the margin. 'Performance framework (hook, value prop, CTA)' \u2014 if the client's product doesn't lend itself to this structure, you're locked into a format that may not work. No stated minimum asset quality for supplied footage."}, {"id": "new_6", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Auto Dashboard Reporting", "newDesc": "This is a recurring software access fee that provides you with a continuously live, interactive reporting dashboard consolidating performance data from all your active marketing channels into a single, always-available view. No more requesting monthly reports or manually compiling data from multiple platforms; your numbers are live, integrated, and automatically narrated.\n\n\u2022 24/7 Secure Cloud Dashboard Access: A branded, secure reporting environment accessible from any device at any time, giving you and your team real-time visibility into marketing performance without waiting for a human to compile a report.\n\n\u2022 Native API Connections - Up to 5 Channels: Live data connections to up to five core marketing channels (e.g., Google Ads, Meta Ads, GA4, LinkedIn, Shopify) are maintained and updated automatically on a daily basis.\n\n\u2022 Automated Weekly & Monthly AI Narrative Summaries: Beyond raw data, the dashboard generates automated written performance summaries using AI, translating numbers into plain-language commentary on what is working, what has changed, and where attention is required.\n\n\u2022 Multi-Platform ROI Roll-Ups: Cross-channel return on investment is calculated and displayed in a unified view, showing not just individual channel performance but the aggregate return on your total marketing investment.\n\nWhy This Matters to You\n\nData that lives inside individual advertising platforms and requires manual extraction is data that does not inform decisions fast enough. This dashboard puts every number, from every channel, in one place (always current, always accessible) so you can identify issues and opportunities in real time rather than weeks after they occurred.\n\nSKU: DATA-DASH-01", "newPrice": "$85/mo", "newRaw": 85, "newSku": "DATA-DASH-01", "clientConcern": "'Up to 5 channels' \u2014 clients will read this as 'I get 5' not 'I get up to 5 depending on complexity'. If they have 7 channels, they'll expect all 7 or demand to know the per-channel uplift cost. 'AI Narrative Summaries' \u2014 if the AI generates an inaccurate or misleading performance commentary and the client acts on it, who bears responsibility? No human QA step is mentioned for the AI output.", "providerConcern": "R85/mo as a software access fee requires extremely low touch-time to be profitable. If clients email with questions about their dashboard weekly, the support cost exceeds the fee within the first month. The underlying dashboard tool isn't named \u2014 if you switch platforms, migration becomes your problem. AI narrative quality is unpredictable; one bad summary to a board-level stakeholder and your credibility takes a hit. Platform pricing changes flow directly to your margin."}, {"id": "new_7", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Baseline Google Ads Management Fee", "newDesc": "This is the foundational management layer required for all standalone Google Ads service lines. It covers the essential account-level technical work, ongoing health monitoring, and performance reporting that underpins every campaign in your Google Ads environment - ensuring your advertising infrastructure is always set up correctly, tracked accurately, and reported on clearly.\n\n\u2022 Technical Account Setup & Configuration: We handle the core technical establishment of your Google Ads account environment, including conversion tracking integration, audience list setup, account linking (Google Analytics 4, Merchant Center, Search Console), and billing configuration.\n\n\u2022 Pixel & Conversion Tracking Maintenance: We maintain and verify the accuracy of your conversion tracking signals; ensuring that every form submission, purchase, call, or booking is correctly attributed to the campaigns driving it.\n\n\u2022 Campaign Monitoring & Health Checks: Ongoing monitoring of account-level health metrics, budget pacing, quality score trends, and policy compliance flags, with proactive intervention when issues are identified.\n\n\u2022 Monthly Performance Reporting: A clear, structured monthly performance report covering all active campaigns, with plain-language analysis of results and forward-looking optimisation recommendations.\n\nWhy This Matters to You\n\nThe technical foundation of your Google Ads account directly determines the quality of data available for optimisation. Incorrect conversion tracking, broken audience lists, or misconfigured account settings can silently waste significant budget. This baseline management fee ensures those foundations are always sound \u2014 and that you always know how your investment is performing.\n\nSKU: GPM-MGMT-01", "newPrice": "$650/mo", "newRaw": 650, "newSku": "GPM-MGMT-01", "clientConcern": "This is a base fee that sits UNDER all Google campaign-specific services \u2014 but the description reads like a complete service. A client could reasonably interpret 'Campaign Monitoring & Health Checks' and 'Monthly Performance Reporting' as full campaign management and question why they're paying additional fees for individual campaign types. The stacking model (R650 base + R425 Search + R365 PMax etc.) needs to be explicitly shown in proposals, not discovered at invoice time.", "providerConcern": "The reporting promise appears in this base fee AND in most individual campaign items. Are you producing one consolidated report or multiple? If clients expect a separate report per campaign plus a base-level report, the reporting burden alone could exceed the fee. 'Proactive intervention when issues are identified' \u2014 this is an open-ended commitment with no scope boundary. A single billing misconfiguration investigation can consume hours."}, {"id": "new_10", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Content Gap Analysis", "newDesc": "This service identifies the specific topics, keywords, and content formats where your competitors are outranking you, and then produces a high-quality, search-optimised article specifically designed to close those gaps and claim that organic visibility for your brand.\n\n\u2022 Comprehensive Competitor Content Audit: We conduct a structured analysis of your top organic competitors, mapping the keywords they rank for that you currently do not, the content formats that are earning them traffic, and the topic areas where your website has no presence; producing a clear, prioritised opportunity report.\n\n\u2022 Authority Article Production: One fully researched, professionally written, and SEO-optimised article is produced each month targeting a high-value gap identified in the audit. Each article is structured to satisfy both human readers and search engine ranking requirements, and is formatted to compete for AI-generated search answer fragments (AI-Ready).\n\nWhy This Matters to You\n\nYour competitors' search rankings are a direct map of the revenue your website is currently missing. Every keyword they rank for and you don't represents a pool of potential customers finding them instead of you. This service systematically identifies those gaps and produces the content required to close them, turning competitor intelligence into your own organic growth.\n\nSKU: SEO-GAP-01", "newPrice": "$450/mo", "newRaw": 450, "newSku": "SEO-GAP-01", "clientConcern": "R450/mo for a competitor content audit AND a professionally written SEO article is exceptional value \u2014 suspiciously so. The article scope is uncapped: no word count range, no research depth limitation, no topic complexity boundary. 'SEO-optimised' and 'AI-Ready' are outcome promises that can't be guaranteed \u2014 if the article doesn't rank within 3-6 months, the client may challenge the service's effectiveness. No defined turnaround time for the article delivery within the month.", "providerConcern": "At R450/mo, this only works if the audit is largely automated (SE Ranking export) and the article is written efficiently (<4 hours total). If a client's industry requires deep technical knowledge (medical, legal, financial), the research and writing time per article could easily exceed profitability. 'AI-Ready' formatting is a moving target \u2014 there's no stable specification for what makes content AI-citeable. One demanding client who insists on topic approval, multiple drafts, and revisions will turn this into a loss-making service."}, {"id": "new_11", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Creative Engine: Essential", "newDesc": "This package delivers the minimum recommended volume of paid social creative assets to keep your ad campaigns active, tested, and performing. It provides a structured monthly output of video, static, and carousel formats designed to feed your advertising campaigns with fresh signal.\n\n\u2022 Short-Form Video Production: 1 x 15-second performance video produced monthly, formatted and optimised for paid social placement across Meta platforms.\n\n\u2022 Carousel Ad Assets: 1 x multi-frame carousel asset developed to guide the viewer through a product, story, or offer sequence in a single ad unit.\n\n\u2022 Static Display Ads: 4 x high-resolution static image ads, designed to perform across feed and story placements with clear visual hierarchy and call-to-action.\n\n\u2022 Hook Variations: 2 x alternative 3-second opening sequences for the core video, allowing the algorithm to identify which visual intro drives the highest engagement and lowest cost per result.\n\nWhy This Matters to You\n\nCreative is the single largest controllable variable in paid social performance. Without a regular supply of fresh assets, ad fatigue sets in, costs rise, and results decline. This package ensures your campaigns always have the minimum viable creative rotation required to maintain efficiency and generate reliable data for optimisation.\n\nSKU: MPM -CREAT-01", "newPrice": "$850/mo", "newRaw": 850, "newSku": "MPM -CREAT-01", "clientConcern": "Deliverable counts are clear (1 video, 1 carousel, 4 statics, 2 hooks) \u2014 this is good. But no revision count per asset type. 'Minimum recommended volume' language is a double-edged sword: it validates the package but also gives the client ammunition to argue they need more for their campaigns to work. No mention of who provides creative direction, brand guidelines, or photography/footage. If the client expects strategic input on messaging, this becomes a strategy service priced as a production service.", "providerConcern": "At R850/mo for 8 assets (1 video + 1 carousel + 4 statics + 2 hooks), you're looking at roughly R106 per asset. That's only viable with templatised production and minimal client revision loops. If even one asset requires a full creative concept (not just format adaptation), the economics break. 'Minimum recommended volume' framing means you're implicitly advising clients they need MORE \u2014 which either upsells them to Growth/Max or makes them question whether Essential is worth starting with."}, {"id": "new_12", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Creative Engine: Growth", "newDesc": "This package delivers a significantly elevated volume of paid social creative assets engineered for brands actively scaling their advertising investment. The increased output enables systematic creative testing across multiple audience segments, driving down cost-per-result as winning formats are identified and reinforced.\n\n\u2022 Short-Form Video Production: 2 x 15-second performance videos produced monthly, providing the volume needed to run true A/B creative tests across campaigns simultaneously.\n\n\u2022 Carousel Ad Assets: 2 x multi-frame carousel assets, allowing you to test different narrative flows, product groupings, or offer structures within the same campaign period.\n\n\u2022 Static Display Ads: 8 x high-resolution static image ads, covering multiple placement types, audience angles, and visual approaches for comprehensive feed coverage.\n\n\u2022 Hook Variations: 4 x alternative 3-second opening sequences across the core video assets, accelerating the identification of the highest-performing creative entry points.\n\nWhy This Matters to You\n\nAt growth stage, volume is strategy. The more creative signals you feed the algorithm, the faster it learns which combination of audience, message, and format generates your best return. This package provides the creative throughput needed to scale ad spend confidently without diminishing returns caused by creative saturation.\u00a0\n\nSKU: MPM -CREAT-02", "newPrice": "$1,450/mo", "newRaw": 1450, "newSku": "MPM -CREAT-02", "clientConcern": "Same revision gap as Essential. Doubled output (2 videos, 2 carousels, 8 statics, 4 hooks = 16 assets) but the price is R1,450 \u2014 that's R90/asset, cheaper per unit than Essential. Client may expect the same per-asset attention and custom creative direction at higher volume, which is unrealistic. No statement about whether assets are unique concepts or format variations of the same concept.", "providerConcern": "16 assets/month requires a production pipeline, not a designer. If your team is treating each asset as a bespoke creative piece rather than systematic variations, this package will bleed time. No cap on feedback rounds means a client who reviews each of 16 assets individually with detailed notes creates an admin burden that dwarfs production time. The jump from Essential to Growth needs to be operationally supported by templates, asset libraries, and batch workflows \u2014 otherwise margins collapse at scale."}, {"id": "new_13", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Creative Engine: Max", "newDesc": "This is the highest-tier creative production package, built for market-leading brands that require an extensive volume and variety of paid social assets. Operating on a Concept Mapping methodology, this package develops creatives across multiple distinct audience personas simultaneously, ensuring your campaigns speak directly and personally to each segment of your market.\n\n\u2022 Short-Form Video Production: 4 x 15-second performance videos produced monthly across different creative concepts, personas, or product angles to maximise campaign coverage and testing depth.\n\n\u2022 Carousel Ad Assets: 4 x multi-frame carousel assets, enabling parallel testing of entirely different narrative approaches, product ranges, or audience-specific messaging strategies.\n\n\u2022 Static Display Ads: 12 x high-resolution static image ads providing comprehensive placement coverage, from feed to story to display networks.\n\n\u2022 Hook Variations: 6 x alternative 3-second opening sequences, delivering a broad creative pool for the algorithm to continuously identify and exploit the most efficient entry points.\n\nWhy This Matters to You\n\nAt market-leader level, your advertising must simultaneously speak to multiple distinct customer types without diluting your brand message. This package generates the creative depth needed to run persona-level campaigns at scale, prevent creative fatigue across large audiences, and sustain high performance through consistent algorithmic learning and reinforcement.\n\nSKU: MPM -CREAT-03", "newPrice": "$2,500/mo", "newRaw": 2500, "newSku": "MPM -CREAT-03", "clientConcern": "'Concept Mapping methodology' is presented as proprietary but isn't defined anywhere. Client may challenge what this means in practice and whether it delivers genuine persona-level differentiation or just aesthetic variations. At R2,500/mo for 26 assets (4 videos + 4 carousels + 12 statics + 6 hooks), client expectations for quality AND strategic depth will be very high \u2014 this is positioned as the market-leader tier.", "providerConcern": "26 assets/month at R2,500 is R96/asset \u2014 similar economics to Growth but with significantly higher quality expectations. 'Persona-level campaigns' implies strategic segmentation work that isn't priced separately. If the client has 5 personas, are you producing 5 distinct creative directions per month? The 'Concept Mapping' methodology needs to be documented and operationalised \u2014 otherwise it's a marketing promise without a delivery framework. Margin depends entirely on systematised production."}, {"id": "new_17", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Custom AI Integration & Automation: Ad-hoc / Hourly", "newDesc": "Specialist AI engineering billed by the hour, covering the development and embedding of large language models (LLMs), AI agents, and intelligent automated workflows into your software systems or internal business operations. This service is for organisations that want to leverage the commercial value of AI beyond off-the-shelf tools; building bespoke integrations tailored to their specific data, workflows, and operational context.\n\n\u2022 AI System Consulting & Architecture: We begin with a consultative architecture review, identifying where AI integration creates genuine operational leverage for your specific business model and designing a technical approach that is proportionate to the problem being solved.\n\n\u2022 API Configuration & LLM Integration: We configure and integrate leading AI platform APIs (including OpenAI, Anthropic, and equivalents) connecting their capabilities to your specific application, data sources, and workflow requirements.\n\n\u2022 Vector Store Setup & Retrieval Systems: For applications requiring AI to reason over your own data (documents, knowledge bases, product catalogues) we implement vector databases (Pinecone, Chroma, Weaviate) and retrieval-augmented generation (RAG) architectures that allow AI systems to access and reference your information accurately.\n\n\u2022 Prompt Engineering & Performance Calibration: AI outputs are only as good as the prompts and context structures that drive them. We design, test, and calibrate the prompt architectures that determine how your AI system behaves, ensuring consistent, reliable, and commercially useful outputs.\n\nWhy This Matters to You\n\nGeneric AI tools are available to everyone, and therefore provide no competitive advantage to anyone. Custom AI integration, built around your specific data, processes, and customer interactions, creates a capability that is genuinely proprietary and difficult for competitors to replicate.\n\nSKU: AI-INT-01", "newPrice": "$120 per Hour", "newRaw": 120, "newSku": "AI-INT-01", "clientConcern": "R120/hr with no minimum hours or engagement estimate. A client may book 1-2 hours expecting a complete AI chatbot or RAG system. The description lists advanced capabilities (vector stores, Pinecone, Chroma, RAG architectures) that create enterprise-level expectations at an hourly rate well below market for this skill level. No IP ownership clause \u2014 who owns the custom prompts, integrations, and architectures built? No mention of ongoing maintenance or monitoring after handover.", "providerConcern": "R120/hr for AI engineering is significantly below market rate (comparable services typically run R300-600/hr or more). This risks attracting clients with champagne expectations on a beer budget. Vector store setup and RAG implementation are not 1-2 hour tasks \u2014 you need to set minimum engagement expectations or risk constant scoping conversations that are themselves unbillable. If a client's AI integration produces a harmful or inaccurate output in production, the liability question is entirely unaddressed."}, {"id": "new_18", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Custom Web Application Development: Ad-hoc / Hourly", "newDesc": "Full-stack custom web application development billed by the hour, providing access to senior engineering capability for projects that require bespoke software solutions beyond the scope of standard website or e-commerce builds. This covers custom frontend and backend development, API design, database architecture, and technical problem-solving for specific business workflow requirements.\n\n\u2022 Full-Stack Engineering: Both frontend (user interface, user experience, interactive components) and backend (server logic, database, API endpoints, authentication) development are covered within the hourly scope; providing complete engineering resource from a single engagement.\n\n\u2022 Technical Architecture & Code Review: Where required, we provide architectural scoping, technical specification documentation, and code review services alongside active development, ensuring the solution being built is scalable, maintainable, and correctly structured.\n\n\u2022 Database Design & Setup: Relational and non-relational database architecture is designed and implemented to match the specific data requirements of your application's workflows.\n\nWhy This Matters to You\n\nOff-the-shelf software does not solve every business problem. When your operational requirements demand a custom solution (a specific internal tool, a bespoke customer-facing application, or a unique workflow automation) this service provides the engineering capability to build it correctly, without the overhead of a fixed-scope retainer.\n\nSKU: APP-DEV-01", "newPrice": "$120 per Hour", "newRaw": 120, "newSku": "APP-DEV-01", "clientConcern": "Same rate as AI Integration (R120/hr) despite being described as 'senior engineering capability'. No minimum hours, no scoping requirement, no estimate range. A client could request 3 hours of 'full-stack development' and expect a functional application. 'Database Design & Setup' at this rate suggests a level of engineering depth that R120/hr may not sustain. No post-delivery support, hosting, or maintenance mentioned.", "providerConcern": "R120/hr for full-stack development is a race-to-the-bottom rate. At this price point, you'll attract clients who need custom apps but have startup budgets \u2014 these clients typically have the most demanding requirements and the least tolerance for scope boundaries. No project scoping step means the first hour of every engagement is unpaid discovery. If the client's requirements are genuinely complex (authentication, payment processing, third-party integrations), the hourly rate won't cover senior-level talent costs."}, {"id": "new_19", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Data Architect: Advanced", "newDesc": "This is the most advanced data and analytics service available, designed for high-volume businesses that need their marketing data to reflect the complete commercial reality of their operation, not just website clicks, but actual revenue, profit margins, and offline outcomes. It connects your CRM, your advertising platforms, and your reporting tools into a single, integrated data ecosystem.\n\n\u2022 Offline CRM Data Import: We establish automated pipelines that import closed deal data, actual revenue, and offline sales outcomes from your CRM back into Google Ads and Meta. This allows the advertising algorithms to optimise toward your most profitable customer types, not just the cheapest leads.\n\n\u2022 Profit-Margin Tagging: Conversion values within your advertising platforms are enhanced with actual profit margin data, enabling campaign optimisation toward real profit contribution rather than raw revenue or volume; a critical capability for businesses with variable margins across products or services.\n\n\u2022 Custom Reporting Dashboards: We design and build bespoke performance dashboards that consolidate data from all your marketing channels, CRM, and financial systems into a single, executive-ready reporting environment with the metrics that matter most to your business.\n\nWhy This Matters to You\n\nStandard marketing analytics tells you how many clicks and conversions you received. Advanced data engineering tells you which campaigns are actually making your business money. For high-volume operations, the difference between optimising toward volume and optimising toward profit can represent a significant swing in marketing ROI.\n\nSKU: DATA-ARCH-03", "newPrice": "$950", "newRaw": 950, "newSku": "DATA-ARCH-03", "clientConcern": "R950 once-off for 'the most advanced data and analytics service available' creates a value expectation that's almost impossible to satisfy at that price. 'Offline CRM Data Import' and 'Profit-Margin Tagging' require the client to provide structured financial data \u2014 if they can't or won't, the service stalls but they'll still expect results. 'Custom Reporting Dashboards' could mean a Looker Studio template or a fully bespoke BI tool \u2014 the range is enormous.", "providerConcern": "This is priced as a once-off but the work described (CRM data pipelines, profit-margin tagging, dashboard builds) is setup + ongoing maintenance. After the R950 setup, who maintains the data pipeline when the CRM schema changes or the ad platform updates its API? The description says 'automated pipelines' but automation requires monitoring and maintenance. If the client's CRM data is messy (it usually is), the data import alone could consume the entire budget."}, {"id": "new_20", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "Demand Gen Campaign Management", "newDesc": "Demand Gen campaigns are Google's most visually immersive advertising format, placing your brand across YouTube, YouTube Shorts, Gmail, and Google Discover - the environments where people consume content, not just search for it. This service manages a Demand Gen campaign designed to build brand consideration and engage high-quality lookalike audiences before they reach the purchase decision stage.\n\n\u2022 Immersive Ad Format Management: We manage rich visual ad formats specifically designed for Google's content-consumption surfaces, ensuring your creative is appropriately formatted and optimised for each placement environment.\n\n\u2022 Audience Segmentation & Lookalike Targeting: We build and refine targeted audience segments based on interest signals, browsing behaviour, and lookalike modelling from your existing customer base, ensuring your ads reach prospects most likely to convert.\n\n\u2022 Creative Rotation & Performance Monitoring: All creative assets are rotated on a monthly basis with weekly performance monitoring, allowing underperforming elements to be identified and replaced promptly.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount, enquire for pricing based on your complete service combination.\n\nWhy This Matters to You\n\nNot every future customer is ready to search for you today. Demand Gen reaches them earlier in the journey, on the platforms they use for entertainment and discovery, building familiarity and intent before they reach the search stage. It is the bridge between pure brand awareness and high-intent conversion campaigns.\n\nSKU: GPM-DGEN-01", "newPrice": "$295/mo", "newRaw": 295, "newSku": "GPM-DGEN-01", "clientConcern": "'Sliding Scale Discount' is the first of four mentions across the Google Ads card but is never quantified. Clients will ask what the discount is and expect a definitive answer. 'Creative Rotation & Performance Monitoring' doesn't state whether Diginauts supplies the creative assets or whether the client must provide them \u2014 this ambiguity will surface at campaign launch. 'Enquire for pricing' language may frustrate clients who expected transparent pricing from the card.", "providerConcern": "R295/mo for Demand Gen campaign management is low for a format that requires visual/video creative. If the client expects creative production within this fee, it's massively underpriced. If creative is separate, you need to manage the expectation and ensure the client has assets ready before campaign launch \u2014 otherwise you're being paid to manage a campaign that can't run. The 'Sliding Scale' discount needs to be formalised into a published table or removed \u2014 vague discount promises create negotiation overhead on every deal."}, {"id": "new_22", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "E-Comm Stack: Launch", "newDesc": "This package provides essential Google Ads visibility for e-commerce businesses at the launch phase. It combines Google Shopping and Performance Max to ensure your products appear prominently in Google's shopping results from day one, capturing buyers who are actively searching to purchase.\n\n\u2022 Google Shopping Campaign (via CSS): Your products are listed in Google's Shopping results with images, prices, and ratings visible before the user even clicks. We manage your Shopping campaign through a Comparison Shopping Service (CSS) partner, which reduces your cost-per-click and extends your budget further than a standard shopping setup.\n\n\u2022 Performance Max Campaign: Google's flagship campaign type automatically serves your product ads across Search, Shopping, Display, YouTube, Gmail, and Maps simultaneously, using machine learning to find the combinations that drive purchases most efficiently.\n\n\u2022 Product Feed Connection: We establish and manage the link between your product catalogue and Google Merchant Center, ensuring your listings are approved, accurate, and eligible to serve.\n\nWhy This Matters to You\n\nFor a new e-commerce store, visibility is everything. Google Shopping puts your products directly in front of buyers who are already searching for them, with pricing and imagery visible before they even visit your site. This stack ensures you are present at the most commercially valuable moment in the buyer's journey from the moment you launch.\n\nSKU: GPM-ECOM-01", "newPrice": "$1,200/mo", "newRaw": 1200, "newSku": "GPM-ECOM-01", "clientConcern": "'CSS partner' claim reduces CPC \u2014 client may demand proof of the specific discount percentage or question whether the CSS benefit is real vs. marketing. 'Product Feed Connection' is listed as included, but Product Upload (SHPF-UP-01 at R75/product) is a separate paid item \u2014 the client may assume their products are fully loaded and ready to sell as part of this R1,200/mo package. At this price point, ROI expectations will be immediate and high.", "providerConcern": "R1,200/mo for Shopping + PMax management is competitive but leaves limited room for the feed management, creative refresh, and reporting time these campaign types demand. The CSS benefit is a real differentiator but if the partner relationship changes or the CSS discount decreases, your value proposition weakens. Feed issues (disapprovals, policy violations) from Merchant Center are time-consuming to resolve and unpredictable \u2014 a single feed rejection can consume a full day's work."}, {"id": "new_23", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "E-Comm Stack: Leader", "newDesc": "This is the most comprehensive Google Ads package available for e-commerce brands, designed for established stores that want to dominate their category. It deploys Shopping, Performance Max, YouTube Shopping, and Display campaigns simultaneously, ensuring complete market coverage across every stage of the buyer's decision journey.\n\n\u2022 Google Shopping & Performance Max: Full management of both Shopping and PMax campaigns to capture high-intent purchase traffic at scale, with continuous optimisation across all Google-owned surfaces.\n\n\u2022 YouTube Shopping Integration: Your products appear directly within YouTube video content as shoppable cards, reaching buyers while they're actively engaged with related content, an increasingly powerful e-commerce channel.\n\n\u2022 Display Remarketing: Targeted display ads re-engage previous site visitors and add-to-cart abandoners across Google's partner network, recovering high-intent prospects who didn't complete their purchase.\n\n\u2022 Advanced Attribution & Reporting: Cross-channel attribution modelling connects all four campaign types to your revenue data, providing a clear picture of how each channel contributes to overall e-commerce performance.\n\nWhy This Matters to You\n\nAt market-leader level, a single campaign type is not enough to maintain category dominance. Competitors are investing across multiple channels simultaneously. This stack ensures your brand is visible, persuasive, and converting at every touchpoint; from the first YouTube discovery through to the final Google Search that triggers purchase.\n\nSKU: GPM-ECOM-02", "newPrice": "$2,500/mo", "newRaw": 2500, "newSku": "GPM-ECOM-02", "clientConcern": "At R2,500/mo this is the premium Google Ads package \u2014 client expectations for performance, reporting depth, and strategic input will be proportionally high. 'YouTube Shopping Integration' requires a functional Merchant Center feed \u2014 if the client's feed isn't ready or compliant, this component can't deliver but the fee is still charged. 'Advanced Attribution & Reporting' promises cross-channel attribution, which is genuinely complex and may not match the client's understanding of how attribution works.", "providerConcern": "Managing Shopping + PMax + YouTube Shopping + Display simultaneously across multiple surfaces is operationally intensive. At R2,500/mo (plus R650 base = R3,150/mo total), the time allocation per campaign type is limited. YouTube Shopping is still a relatively new format with limited optimisation levers \u2014 if performance is poor, you have few tools to fix it. The attribution promise is the highest-risk element: cross-channel attribution modelling requires clean data, consistent tracking, and realistic expectations \u2014 all of which are client-dependent."}, {"id": "new_25", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "newName": "GEO-Grid Optimizer", "newDesc": "This service is designed for businesses that need to rank prominently in local search results and on Google Maps. Using a geo-grid tracking system, it provides a visual, data-driven view of exactly where in your target area you are visible on Google Maps, and then takes targeted action to improve that visibility through strategic Google Business Profile management.\n\n\u2022 Google Maps Geo-Grid Tracking: We deploy SE Ranking's geo-grid tool to generate a geographic map of your Google Maps ranking positions across your target city, town, or service area. This reveals precisely where you rank strongly and where competitors are outranking you, at a street-by-street level.\n\n\u2022 Google Business Profile (GBP) Management: 3 x monthly GBP updates keep your profile active, accurate, and algorithmically favoured. Updates include post publishing, offer creation, Q&A management, and attribute optimisation - all signals that Google's local ranking algorithm rewards.\n\n\u2022 Local Visibility Reporting: Monthly reporting shows geo-grid movement, profile engagement metrics (views, direction requests, calls), and keyword ranking shifts within your local search area.\n\nWhy This Matters to You\n\nFor any business serving a local or regional customer base, Google Maps is frequently the first point of discovery. A well-optimised Google Business Profile consistently outranks websites in local search results, and a geo-grid approach ensures you're targeting the specific locations where your customers are actually searching, not just your own postcode.\"\n\nSKU: SEO-GEO-01", "newPrice": "$190/mo", "newRaw": 190, "newSku": "SEO-GEO-01", "clientConcern": "'3 x monthly GBP updates' \u2014 a client may expect daily posting or weekly updates, not 3 per month. 'Street-by-street level' geo-grid tracking is a strong claim \u2014 the actual granularity depends on the SE Ranking tool's coverage in the client's specific region, which may be limited outside major metros. Limited to Google Maps \u2014 a client may assume Apple Maps, Waze, or Bing Maps coverage is included.", "providerConcern": "R190/mo for geo-grid tracking + 3 GBP updates + monthly reporting is viable only if the GBP updates are quick (post publishing, not content creation) and the reporting is largely automated. If a client wants GBP posts with custom graphics and copy, the production time exceeds the fee. SE Ranking's geo-grid coverage varies by region \u2014 verify it works reliably in your client's specific service areas before promising 'street-by-street' precision."}, {"id": "new_30", "category": "New Items \u2014 No Old Equivalent", "label": "", "oldName": null, "oldDesc": null, "oldPrice": null, "oldRaw": null, "
