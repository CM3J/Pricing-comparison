<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #d8dce8; line-height: 1.5; }
.top-bar { position: sticky; top: 0; z-index: 10; background: #0a0a1a; border-bottom: 1px solid #1a1a3a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

.top-bar-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.status { font-size: 11px; padding: 4px 10px; border-radius: 12px; display: flex; align-items: center; gap: 6px; }
.status.connected { background: rgba(30,168,122,0.15); color: #4ecdc4; }
.status.disconnected { background: rgba(255,100,100,0.15); color: #ff6b6b; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; }
.status.connected .status-dot { background: #4ecdc4; }
.status.disconnected .status-dot { background: #ff6b6b; }
.btn { border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.btn-primary { background: #1913A9; color: #ECF0FC; }
.btn-primary:hover { background: #2520c7; }
.btn-secondary { background: #16163a; color: #8e93b0; border: 1px solid #2a2a5a; }
.btn-secondary:hover { background: #1e1e4a; color: #c0c4e0; }
.btn-active { background: #1913A9; color: #ECF0FC; border-color: #1913A9; }
.btn svg { width: 14px; height: 14px; }
/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid #1a1a3a; background: #0d0d22; }
.tab { padding: 12px 24px; cursor: pointer; font-size: 13px; font-weight: 600; color: #5a5e80; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab:hover { color: #9b9fd0; }
.tab.active { color: #ECF0FC; border-bottom-color: #1913A9; }
/* Filters */
.filters { padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #1a1a3a; background: #0d0d22; }
.content { padding: 0 24px 40px; }
.page { display: none; }
.page.active { display: block; }
/* Category header + RACI */
.cat-header { margin-top: 24px; padding: 10px 16px; background: #1913A9; border-radius: 6px 6px 0 0; font-weight: 700; font-size: 14px; color: #ECF0FC; }
.raci-bar { background: #12123a; border: 1px solid #1a1a3a; border-top: none; border-radius: 0 0 6px 6px; padding: 8px 16px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 4px; }
.raci-field { display: flex; align-items: center; gap: 4px; font-size: 11px; }
.raci-label { color: #5a5e80; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; min-width: 22px; }
.raci-input { background: #0a0a1a; border: 1px solid #2a2a5a; border-radius: 4px; padding: 3px 8px; color: #d8dce8; font-size: 11px; width: 120px; outline: none; }
.raci-input:focus { border-color: #1913A9; }
.raci-input::placeholder { color: #3a3a5a; }
/* Column header */
.col-header { display: grid; grid-template-columns: 1fr auto 30px auto 1fr auto auto auto; gap: 8px; padding: 8px 8px; margin-top: 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: #5a5e80; font-weight: 600; border-bottom: 1px solid #1a1a3a; }
/* Rows */
.row { border-bottom: 1px solid #1a1a3a; padding: 12px 0; transition: background 0.15s; }
.row:hover { background: #111130; }
.row-main { display: grid; grid-template-columns: 1fr auto 30px auto 1fr auto auto auto; align-items: center; gap: 8px; padding: 0 8px; }
.item-name { font-weight: 600; font-size: 13px; }
.old-name { color: #b0a8d8; }
.new-name { color: #a0e8cc; }
.price { font-weight: 700; white-space: nowrap; font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 13px; text-align: right; }
.old-price { color: #b0a8d8; }
.new-price { color: #a0e8cc; }
.arrow { color: #3a3a6a; text-align: center; font-size: 14px; }
.delta { font-weight: 700; font-size: 11px; padding: 2px 8px; border-radius: 4px; text-align: center; font-family: 'SF Mono', monospace; }
.delta.up { color: #ff6b6b; background: rgba(255,80,80,0.1); }
.delta.down { color: #4ecdc4; background: rgba(78,205,196,0.1); }
.delta.same { color: #5a5a8a; }
.delta.na { color: #5a5a8a; font-style: italic; font-weight: 400; font-family: inherit; }
.delta.new-tag { color: #f0a040; background: rgba(240,160,64,0.1); }
.sku { font-family: 'SF Mono', monospace; font-size: 11px; color: #7a80a0; white-space: nowrap; }
.updated-price-input { width: 100px; padding: 4px 8px; background: #12123a; border: 1px solid #2a2a5a; border-radius: 4px; color: #ECF0FC; font-family: 'SF Mono', monospace; font-size: 12px; text-align: right; outline: none; }
.updated-price-input:focus { border-color: #1913A9; }
.updated-price-input::placeholder { color: #3a3a5a; }
.no-match { color: #f0a040; font-style: italic; font-weight: 400; }
.no-match-cell { color: #2a2a4a; }
.label-tag { font-size: 10px; color: #5a5e80; font-style: italic; margin-left: 8px; }
/* Action buttons row */
.row-actions { padding: 0 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toggle-btn { background: none; border: none; color: #5a5e80; font-size: 11px; cursor: pointer; padding: 4px 8px; margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; }
.toggle-btn:hover { color: #9b9fd0; }
.toggle-btn .dot { width: 6px; height: 6px; border-radius: 50%; }
.dot.has { background: #f0a040; }
.dot.empty { background: #2a2a4a; }
.dot.finding { background: #ff6b6b; }
.dot.client-dot { background: #e8a060; }
.dot.provider-dot { background: #6080e8; }
/* Finding panels */
.concern-panel { display: none; margin: 8px 8px 0; border-radius: 6px; font-size: 12px; line-height: 1.6; }
.concern-panel.open { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.concern-col { padding: 12px 14px; }
.concern-col.client-col { background: rgba(232,160,96,0.06); border: 1px solid rgba(232,160,96,0.15); border-radius: 6px 0 0 6px; color: #e8b888; }
.concern-col.provider-col { background: rgba(96,128,232,0.06); border: 1px solid rgba(96,128,232,0.15); border-radius: 0 6px 6px 0; border-left: none; color: #88a8e8; }
.concern-col h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
.concern-col.client-col h4 { color: #e8a060; }
.concern-col.provider-col h4 { color: #6080e8; }
/* Editable areas */
.edit-area { margin: 8px 8px 0; display: none; }
.edit-area.open { display: block; }
.edit-area textarea { width: 100%; min-height: 60px; padding: 10px 12px; background: #12123a; border: 1px solid #2a2a5a; border-radius: 6px; color: #d8dce8; font-family: inherit; font-size: 12px; resize: vertical; outline: none; }
.edit-area textarea:focus { border-color: #1913A9; }
.edit-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
.edit-btn { padding: 4px 14px; border-radius: 4px; font-size: 11px; cursor: pointer; border: none; }
.edit-btn.save { background: #1913A9; color: #ECF0FC; }
.edit-btn.save:hover { background: #2520c7; }
.edit-btn.cancel { background: #1a1a3a; color: #8e93b0; }
.edit-btn.delete { background: rgba(255,80,80,0.15); color: #ff6b6b; }
.preview-text { font-size: 11px; margin: 4px 8px 0; white-space: pre-wrap; max-height: 40px; overflow: hidden; }
.preview-comment { color: #f0a040; }
.preview-note { color: #80c8b0; }
/* Desc panel */
.desc-toggle { background: none; border: none; color: #5a5e80; font-size: 11px; cursor: pointer; padding: 2px 8px; text-decoration: underline; }
.desc-toggle:hover { color: #9b9fd0; }
.desc-panel { display: none; margin: 8px 8px 0; padding: 12px; background: #0d0d22; border-radius: 6px; font-size: 11.5px; color: #8e93b0; }
.desc-panel.open { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.desc-col h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #5a5e80; margin-bottom: 6px; }
.desc-text { white-space: pre-wrap; line-height: 1.5; }
/* Summary page */
.summary-content { padding: 24px; max-width: 900px; }
.summary-section { margin-bottom: 32px; }
.summary-section h2 { color: #ECF0FC; font-size: 16px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1a1a3a; }
.summary-section h3 { color: #9b9fd0; font-size: 13px; font-weight: 600; margin: 16px 0 8px; }
.summary-text { color: #8e93b0; font-size: 13px; line-height: 1.7; margin-bottom: 12px; }
.summary-textarea { width: 100%; min-height: 120px; padding: 12px 14px; background: #12123a; border: 1px solid #2a2a5a; border-radius: 6px; color: #d8dce8; font-family: inherit; font-size: 13px; resize: vertical; outline: none; line-height: 1.6; }
.summary-textarea:focus { border-color: #1913A9; }
.summary-save { margin-top: 8px; }
.theme-card { background: #12123a; border: 1px solid #1a1a3a; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.theme-card h4 { color: #ECF0FC; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.theme-card p { color: #8e93b0; font-size: 12px; line-height: 1.6; }
.theme-card .affected { color: #5a5e80; font-size: 11px; margin-top: 6px; font-style: italic; }

.rec-panel { display: none; margin: 8px 8px 0; padding: 14px 16px; background: rgba(30,168,122,0.06); border: 1px solid rgba(30,168,122,0.2); border-radius: 6px; font-size: 12px; line-height: 1.7; color: #a0e8cc; }
.rec-panel.open { display: block; }
.rec-panel h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #1ea87a; margin-bottom: 8px; font-weight: 600; }
.rec-item { margin-bottom: 8px; padding-left: 12px; border-left: 2px solid rgba(30,168,122,0.3); }
.rec-action { color: #4ecdc4; font-weight: 600; font-size: 11px; }

.rewrite-panel { display: none; margin: 8px 8px 0; padding: 14px 16px; background: rgba(150,80,220,0.06); border: 1px solid rgba(150,80,220,0.2); border-radius: 6px; font-size: 12px; line-height: 1.7; color: #c8a8e8; }
.rewrite-panel.open { display: block; }
.rewrite-panel h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #9060d8; margin-bottom: 8px; font-weight: 600; }
.rewrite-text { white-space: pre-wrap; }
/* Toast */
.save-indicator { position: fixed; bottom: 20px; right: 20px; background: #1913A9; color: #ECF0FC; padding: 8px 16px; border-radius: 8px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.save-indicator.show { opacity: 1; }
</style>

<script>
const DATA = [{"id": "map_2_52", "category": "Website Design", "label": "Website: Mini/Standard", "oldName": "5 Page Bundle the Exoplanet (mini website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "\u20ac2,500", "oldRaw": 2500, "newName": "Standard Website", "newDesc": "A complete, professionally designed and developed website built for businesses that need a credible, high-quality digital home. This package delivers up to 5 x pages with a custom user interface, a strong user experience architecture, and an SEO-optimised launch configuration, giving your brand the online presence it needs to earn customer trust and generate enquiries.\n\n\u2022 Custom UI/UX Design: Every page is designed from a bespoke starting point aligned to your brand identity, not a template applied without thought. Visual hierarchy, navigation flow, and content structure are all considered from the perspective of your target customer's journey.\n\n\u2022 Up to 5 Core Pages: Includes the essential pages for a professional brand presence; typically Homepage, About, Services, and Contact, plus one additional page relevant to your business.\n\n\u2022 SEO Launch Configuration: On-page SEO foundations are correctly configured at launch (page titles, meta descriptions, heading structures, image alt text, sitemap submission, and Google Search Console connection) giving your new site the strongest possible start in organic search.\n\nWhy This Matters to You\n\nYour website is your most permanent and controllable marketing asset. It works around the clock, operates in every market you serve, and is the destination every other marketing channel points toward. A professionally built website that earns trust, communicates clearly, and converts visitors is not a cost, it is the foundation of your digital revenue.\n\nSKU: WEB-STD-01", "newPrice": "\u20ac3,000", "newRaw": 3000, "newSku": "WEB-STD-01", "clientConcern": "'Custom UI/UX Design' with 'not a template' claim is strong. If the process involves modifying a Webflow template, a savvy client may challenge this. 'Up to 5 Core Pages' has counting ambiguity. \u20ac3,000 for a custom website is competitive for Europe but the 'custom' promise creates bespoke expectations.", "providerConcern": "\u20ac3,000 for a custom 5-page website is competitive in the European market. The 'not a template' claim needs to be defensible \u2014 document your design process. If you use Webflow's designer tool (which starts from a blank canvas but can use pre-built components), this is genuinely custom and defensible. Require content delivery as a gate before development begins to prevent timeline slippage.", "recommendation": "ADD: 'Custom UI/UX Design means every page is designed from a blank canvas within Webflow's visual design environment, tailored to your brand identity. Pre-built themes or generic templates are not used as a starting point.' | ADD same page counting definition as other web packages. | ADD: 'Content (copy, images, brand assets) must be supplied before development begins. Project timelines are paused during content-pending periods.' | ADD: '2 rounds of design revisions included.'", "rewrittenDesc": "A complete, professionally designed website built for businesses needing a credible, high-quality digital home. Up to 5 pages with custom UI/UX \u2014 every page designed from a blank canvas within our design environment, tailored to your brand identity. Pre-built themes or generic templates are not used as a starting point.\n\n\u2022 Up to 5 Core Pages: Typically Homepage, About, Services, Contact, plus one additional. Pages defined as unique designed content pages.\n\n\u2022 SEO Launch Configuration: On-page SEO foundations correctly configured at launch.\n\n\u2022 Content Requirement: Content (copy, images, brand assets) must be supplied before development begins. Project timelines are paused during content-pending periods.\n\n\u2022 Revisions: 2 rounds of design revisions included.\n\nWhy This Matters to You\n\nYour website is your most permanent and controllable marketing asset. A professionally built website that earns trust and converts visitors is the foundation of your digital revenue.\n\nSKU: WEB-STD-01"}, {"id": "map_0_28", "category": "Website Design", "label": "Website: Small/Growth", "oldName": "10 Page Bundle The Protoplanet (small website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "\u20ac3,850", "oldRaw": 3850, "newName": "Growth Website", "newDesc": "This package delivers a comprehensive, strategically architected website for growing businesses that require more depth, more content surface area, and a more sophisticated information architecture than a standard site can provide. With up to ten pages and an advanced lead generation structure, it is built to support a business that is actively scaling its digital presence and marketing investment.\n\n\u2022 Up to 10 Pages with Advanced Information Architecture: A full content and navigation strategy is designed before a single page is built, ensuring your site structure supports both user journeys and search engine crawlability; with logical groupings, clear service hierarchies, and scalable page templates.\n\n\u2022 Lead Generation Mapping: Key conversion touchpoints are identified and implemented throughout the site (strategically placed contact forms, lead magnets, call-to-action blocks, and enquiry pathways) ensuring every section of the site is working toward a commercial objective.\n\n\u2022 Expanded SEO Foundation: A broader SEO architecture covers the full 10 page structure with correct keyword-intent alignment, internal linking strategy, and schema markup where appropriate, providing a stronger launch position in organic search.\n\nWhy This Matters to You\n\nA growth-stage business needs a website that works as hard as its sales team. A site with a shallow page structure limits both search visibility and the number of customer personas and services you can speak to directly. This package builds the digital infrastructure required to support a maturing marketing strategy, not just a presence, but a system.\n\nSKU: WEB-GRW-01", "newPrice": "\u20ac5,500", "newRaw": 5500, "newSku": "WEB-GRW-01", "clientConcern": "'Lead Generation Mapping' promises strategic conversion infrastructure \u2014 client may interpret this as Diginauts guaranteeing leads. 'Up to 10 Pages' has counting ambiguity. 'Expanded SEO Foundation' may set an expectation of ongoing ranking performance from a once-off build.", "providerConcern": "\u20ac5,500 for a 10-page website with advanced IA, lead gen mapping, and expanded SEO is well-priced for the European market. The IA strategy and lead gen mapping add significant pre-build planning time. Manage expectations: the SEO foundation helps launch position but doesn't guarantee sustained rankings without ongoing SEO maintenance (a separate service). Make this explicit in the proposal.", "recommendation": "ADD: 'Lead Generation Mapping establishes the strategic placement of conversion touchpoints throughout the site. It does not guarantee a specific volume of leads \u2014 lead generation outcomes depend on traffic volume, traffic quality, and offer strength.' | ADD: 'SEO Foundation provides a strong launch configuration but does not replace ongoing SEO maintenance. For sustained organic growth, see SEO Maintenance (SEO-MNT-01).' | CLARIFY page counting: same definition as other web packages.", "rewrittenDesc": "A comprehensive website for growing businesses \u2014 up to 10 pages with advanced lead generation structure.\n\n\u2022 Up to 10 Pages with Advanced Information Architecture: Full content and navigation strategy designed before build. Pages defined as unique designed content pages (same definition as all web packages).\n\n\u2022 Lead Generation Mapping: Strategic placement of conversion touchpoints throughout the site (forms, lead magnets, CTAs, enquiry pathways). This establishes conversion infrastructure \u2014 it does not guarantee a specific volume of leads. Lead outcomes depend on traffic volume, quality, and offer strength.\n\n\u2022 Expanded SEO Foundation: Broader SEO architecture with keyword-intent alignment, internal linking, and schema markup. This provides a strong launch position \u2014 sustained organic growth requires ongoing SEO maintenance (see SEO-MNT-01).\n\nWhy This Matters to You\n\nA growth-stage business needs a website that works as hard as its sales team. This package builds the digital infrastructure to support a maturing marketing strategy.\n\nSKU: WEB-GRW-01"}, {"id": "map_1_24", "category": "Website Design", "label": "Website: Medium/Enterprise", "oldName": "25 Page Bundle The Eccentric Jupiter (medium website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "\u20ac8,385", "oldRaw": 8385, "newName": "Enterprise Website", "newDesc": "This is the most comprehensive website build package available, designed for organisations that require an extensive, authority-level digital presence with a complex content architecture, custom CMS structures, and a full platform migration if required. Up to twenty-five pages are designed, developed, and launched, with the depth and technical sophistication expected of an enterprise-level brand.\n\n\u2022 Up to 25 x Custom Pages with Custom CMS Structures: Beyond standard page templates, this package includes the development of custom content management structures, repeatable, editable components and content types that allow your team to add, edit, and manage complex content independently after handover, without relying on a developer for every change.\n\n\u2022 Full Platform Migration: If transitioning from an existing website on another platform, a complete content migration is included; ensuring no existing content, SEO equity, or page authority is lost during the transition.\n\n\u2022 Enterprise Information Architecture: A comprehensive IA strategy is developed prior to build, mapping the full site structure across all user personas, service lines, and content categories; ensuring the site scales logically as your organisation grows.\n\nWhy This Matters to You\n\nAn enterprise organisation cannot afford a website that constrains its content, limits its editorial independence, or loses its hard-earned search authority during a platform transition. This package delivers the scope, structure, and technical foundation required for a complex brand to communicate at scale (across multiple service areas, audiences, and markets)\u2014 from a single, professionally managed digital platform.\n\nSKU: WEB-ENT-01", "newPrice": "\u20ac11,500", "newRaw": 11500, "newSku": "WEB-ENT-01", "clientConcern": "'Up to 25 pages' \u2014 client may count every URL (blog posts, utility pages) toward the count. 'Full Platform Migration' includes no caveat on source site size. 'Custom CMS Structures' could be interpreted as 'build me a custom web application'.", "providerConcern": "\u20ac11,500 for an enterprise website with up to 25 custom pages, full migration, and enterprise IA is competitive for the European market. However, the migration component alone can consume 30\u201350% of the budget if the source site is large. This package needs a very detailed scope document before any work begins \u2014 define what counts as a 'page', cap the migration scope (e.g., 'migration of up to X pages of content'), and clarify the boundaries of 'Custom CMS Structures'.", "recommendation": "ADD: 'Pages are defined as unique, designed content pages (e.g., Homepage, About, Services, Contact, individual service pages). Blog posts, utility pages (404, search results, privacy policy), and auto-generated archive pages are not counted toward the 25-page allocation.' | ADD: 'Platform migration covers the transfer of up to 25 pages of content from the existing site. Sites with more than 25 pages of content to migrate are assessed and quoted individually.' | ADD: 'Custom CMS Structures refers to configurable content management components within Webflow or WordPress \u2014 not custom web application development.'", "rewrittenDesc": "The most comprehensive website build \u2014 up to 25 custom-designed pages with enterprise information architecture and full platform migration.\n\n\u2022 Up to 25 Custom Pages: Pages are defined as unique, designed content pages (Homepage, About, Services, etc.). Blog posts, utility pages (404, privacy policy), and auto-generated archives are not counted.\n\n\u2022 Full Platform Migration: Content migration from your existing site covering up to 25 pages of content. Sites with more content are assessed and quoted individually.\n\n\u2022 Custom CMS Structures: Configurable content management components within Webflow or WordPress, allowing independent content management post-handover. This refers to CMS collections and editable modules, not custom web application development.\n\n\u2022 Enterprise Information Architecture: Comprehensive IA strategy mapping all user personas, service lines, and content categories.\n\nWhy This Matters to You\n\nAn enterprise organisation cannot afford a website that constrains its content or loses search authority during a platform transition. This package delivers the scope, structure, and foundation required to communicate at scale.\n\nSKU: WEB-ENT-01"}, {"id": "map_38_32", "category": "Website Design", "label": "Single Page", "oldName": "Standard Display Page The Full Moon", "oldDesc": "A single WordPress webpage that can be used as a standalone page or as part of a website. Diginauts uses advanced design tools, allowing us to achieve complete custom design outcomes for you, affordably and fast. Our pages and websites are completed on staging domains for your convenience and then seamlessly moved over to your main domain, where we host your new webpage or website on world-class WordPress optimised hosting solutions.\nOur approach to using WordPress is best in class. Our websites are typically not reliant on many plugins, keeping WordPress infrastructure light yet robust, secure and fast loading. Essentially you get all the incredible benefits of using WordPress without the standard downsides i.e. a slow website with a cumbersome and rigid design theme. Diginauts does not use design teams, we design all our WordPress websites \u201cby hand\u201d, completely customised for you.\nWebsites developed by Diginauts are customised specifically for mobile, tablet and desktop viewing experiences. We do not simply rely on auto resizing to do our job. Our designers take the time to design specific elements for various screen sizes and perform sizing optimisation on each page element.\nCost per page", "oldPrice": "\u20ac550", "oldRaw": 550, "newName": "Landing Page Sprint", "newDesc": "A focused, fast-delivery service that designs and builds a single, purpose-built landing page optimised specifically for converting ad traffic or campaign visitors into leads, enquiries, or purchases. Unlike a full website page, a dedicated landing page is engineered with one sole objective: getting the visitor to take a specific action.\n\n\u2022 Conversion-Focused Design: The page is structured around proven CRO principles (a compelling headline, clear value proposition, social proof elements, friction-reducing form design, and a prominent, singular call-to-action) all designed to maximise the percentage of visitors who convert.\n\n\u2022 Development & Technical Build: Full design and development delivered on Webflow or WordPress, including mobile responsiveness, correct technical formatting for ad platform landing page requirements, and basic on-page SEO configuration.\n\n\u2022 Tracking & Analytics Integration: GA4 event tracking and conversion goal setup ensure that every lead or action generated by the page is correctly attributed and measurable from day one.\n\nWhy This Matters to You\n\nSending paid ad traffic to your homepage or a general website page significantly wastes your advertising budget. Dedicated landing pages (built around a single offer, with no distracting navigation or competing messages) consistently convert at two to five times the rate of standard website pages. This sprint gives you that asset quickly and correctly.\n\nSKU: WEB-SPRINT-01", "newPrice": "\u20ac1,250", "newRaw": 1250, "newSku": "WEB-SPRINT-01", "clientConcern": "\u20ac1,250 for a single page may prompt comparison to full website pricing (\u20ac3,000 for 5 pages). 'Two to five times the conversion rate' is a statistical claim \u2014 if the page underperforms, the client has a basis to challenge. No A/B testing or ongoing optimisation is included.", "providerConcern": "\u20ac1,250 for a conversion-optimised landing page is well-priced for the European market. The conversion rate claim is the highest-risk promise \u2014 landing page performance depends on traffic quality, offer strength, and audience targeting, none of which you control. Consider softening the language to 'designed using principles that typically achieve higher conversion rates than standard pages' rather than stating a specific multiplier.", "recommendation": "CHANGE: 'two to five times the rate' to 'significantly higher conversion rates than standard website pages, based on established CRO principles.' | ADD: 'This is a design-and-build service. Ongoing A/B testing, conversion optimisation, and performance monitoring are not included.' | ADD: 'Conversion performance depends on traffic quality, offer strength, and audience targeting \u2014 factors outside the scope of this service.' | ADD: '2 rounds of design revisions included.'", "rewrittenDesc": "A single, purpose-built landing page optimised for converting ad traffic into leads, enquiries, or purchases.\n\n\u2022 Conversion-Focused Design: Structured around established CRO principles \u2014 compelling headline, clear value proposition, social proof, friction-reducing form design, and singular call-to-action. Designed using principles that typically achieve significantly higher conversion rates than standard website pages.\n\n\u2022 Development & Technical Build: Full design and development on Webflow or WordPress, including mobile responsiveness and ad platform requirements.\n\n\u2022 Tracking & Analytics Integration: GA4 event tracking and conversion goal setup.\n\n\u2022 Revisions: 2 rounds of design revisions included.\n\n\u2022 Scope: This is a design-and-build service. Ongoing A/B testing, conversion optimisation, and performance monitoring are not included. Conversion performance depends on traffic quality, offer strength, and audience targeting \u2014 factors outside the scope of this service.\n\nWhy This Matters to You\n\nSending paid traffic to a general website page significantly wastes ad budget. Dedicated landing pages consistently convert at higher rates. This sprint gives you that asset quickly and correctly.\n\nSKU: WEB-SPRINT-01"}, {"id": "map_11_56", "category": "Website Design", "label": "Website Maintenance", "oldName": "Design & Management for WordPress website (1x Website)", "oldDesc": "We estimate 5 hours per month minimum to make required design updates and optimise the site where necessary. Should more time be required some months, we can simply let Brainboss know beforehand and quote accordingly.\u00a0\nWe believe this option will adequately cover the below areas:\n\u2022 Monthly website technical analysis and maintenance.\n\n\u2022 Updating the website design with new content.\n\n\u2022 Adding customer testimonials and possible blog / newsletter content", "oldPrice": "\u20ac375/mo", "oldRaw": 375, "newName": "Web Maintenance", "newDesc": "This monthly retainer provides the ongoing technical maintenance that every website requires to remain secure, fast, and functional. Without regular maintenance, websites accumulate plugin vulnerabilities, outdated software, broken functionality, and performance degradation; all of which harm both user experience and search engine rankings.\n\n\u2022 Theme & Plugin Updates: We apply all available theme and plugin/extension updates on a monthly basis, testing for conflicts before deploying to ensure updates do not break existing functionality.\n\n\u2022 Automated Daily Backups: Your complete website is backed up automatically every day, with a rolling retention window; ensuring rapid recovery is possible in the event of a security incident, accidental deletion, or update failure.\n\n\u2022 Small Fixes & Minor Amendments: Routine minor fixes (broken links, small layout issues, form malfunctions, or display errors) are addressed within this maintenance scope without additional charge.\n\n\u2022 Monthly Health Report: A brief monthly summary confirms the updates applied, backup status, and any issues identified and resolved during the month.\n\nWhy This Matters to You\n\nA website that is not actively maintained is a security liability and a revenue risk. Outdated plugins are the primary vector for website hacks. Slow, broken, or insecure sites lose both customers and search rankings. This maintenance retainer is the minimum investment required to protect the website asset you have built.\n\nSKU: WEB-MNT-02", "newPrice": "\u20ac150/mo", "newRaw": 150, "newSku": "WEB-MNT-02", "clientConcern": "'Small Fixes & Minor Amendments' \u2014 'minor' is subjective. A client considers a new page section a 'small fix'; a developer considers it a feature request. Without a definition, every month involves negotiation. \u20ac150/mo is affordable but creates a support expectation.", "providerConcern": "\u20ac150/mo is lean for the European market but viable if the client's site is stable and well-built. Define 'minor' explicitly (e.g., 'changes completable within 30 minutes'). One significant WordPress issue (plugin conflict, security vulnerability) can consume 2\u20134 hours \u2014 exceeding the monthly fee. Consider a tiered approach: \u20ac150/mo for monitoring + minor fixes, with a defined escalation path and hourly rate for larger issues.", "recommendation": "**CONSIDER SPLITTING: Create Web Maintenance: Monitor (plugin updates + backups + health report only, \u20ac100/mo) and Web Maintenance: Active (monitoring + up to 1 hour minor amendments, \u20ac200/mo). This creates a clear tier for clients who only need security maintenance vs. those who need ongoing small changes.** | ADD: 'Minor amendments are defined as changes completable within 30 minutes (e.g., text updates, image replacements, broken link fixes, form field adjustments). Requests exceeding 30 minutes (new page sections, layout changes, feature additions) are quoted separately at the hourly development rate.' | ADD: 'Plugin and theme updates are applied after conflict testing. Updates to custom-developed functionality may require additional development time outside this maintenance scope.' | CONSIDER: Increase to \u20ac200/mo and add: 'Includes up to 1 hour of minor amendment time per month.'", "rewrittenDesc": "Monthly technical maintenance keeping your website secure, fast, and functional.\n\n\u2022 Theme & Plugin Updates: Applied monthly after conflict testing.\n\n\u2022 Automated Daily Backups: Complete website backed up daily with rolling retention.\n\n\u2022 Minor Amendments: Changes completable within 30 minutes (text updates, image replacements, broken links, form fixes). Requests exceeding 30 minutes (new sections, layout changes, feature additions) are quoted separately at the hourly development rate.\n\n\u2022 Monthly Health Report: Summary of updates applied, backup status, and issues resolved.\n\nWhy This Matters to You\n\nA website that is not maintained is a security liability and revenue risk. This retainer is the minimum investment required to protect your website asset.\n\nSKU: WEB-MNT-02"}, {"id": "map_23_21", "category": "E-Commerce / Online Store", "label": "E-Commerce Core", "oldName": "Online Store Functionality.", "oldDesc": "Adding fundamental e-commerce functionality to your website", "oldPrice": "\u20ac385", "oldRaw": 385, "newName": "E-Comm Integration", "newDesc": "This service adds a fully functional online shop to an existing or new Webflow or WordPress website, enabling you to sell products or services directly through your web presence without migrating to a dedicated e-commerce platform. It covers complete WooCommerce (WordPress) or Webflow Commerce setup, with initial products configured and payments enabled.\n\n\u2022 WooCommerce or Webflow Shop Setup: Full installation and configuration of the appropriate e-commerce framework for your platform; including product catalogue structure, checkout flow, cart functionality, and order management backend setup.\n\n\u2022 Initial Product Configuration - 5 x Products: 5 x products are built and published as part of the integration, establishing the template and structure for your full catalogue.\n\n\u2022 Payment Gateway Integration: A payment gateway is connected and tested to enable live transactions, covering card payment processing, and additional payment methods as supported by your platform and region.\n\nWhy This Matters to You\n\nAdding e-commerce to your existing website avoids the complexity and cost of migrating to an entirely separate platform, while keeping your brand's digital presence unified under one domain and design system. This integration turns your website from a marketing tool into a revenue-generating asset.\n\nSKU: WEB-ECOM-01", "newPrice": "\u20ac1,500", "newRaw": 1500, "newSku": "WEB-ECOM-01", "clientConcern": "'Initial Product Configuration \u2014 5 x Products' may set the expectation that the store launches with 5 products ready, but a client with 50+ SKUs will expect all products included. 'Payment Gateway Integration' doesn't specify which gateways or how many. E-commerce on WordPress/Webflow has inherent limitations compared to Shopify \u2014 client may not understand the trade-offs.", "providerConcern": "\u20ac1,500 for WooCommerce or Webflow Commerce setup + 5 products + payment gateway is reasonable for the European market. However, WooCommerce is plugin-dependent \u2014 each additional feature adds complexity not priced here. State clearly: 'Additional products beyond the initial 5 are charged at \u20ac75/product via the Product Upload service (SHPF-UP-01).' Manage platform trade-off expectations during the sales process.", "recommendation": "ADD: 'Initial setup includes configuration and upload of up to 5 products. Additional products are uploaded via our Product Upload service (SHPF-UP-01) at \u20ac75/product.' | ADD: 'Payment gateway integration covers 1 primary gateway (e.g., Stripe, PayFast). Additional gateways are configured at \u20ac150 each.' | ADD: 'WordPress/Webflow e-commerce is best suited for catalogues under 50 products. For larger catalogues or complex inventory management, we recommend our Shopify Launch Sprint (SHPF-SPRNT-01).'", "rewrittenDesc": "Adds a fully functional online shop to an existing or new Webflow or WordPress website.\n\n\u2022 WooCommerce or Webflow Shop Setup: Full e-commerce framework installation and configuration.\n\n\u2022 Initial Product Configuration \u2014 5 Products: 5 products built and published, establishing the template for your catalogue. Additional products are uploaded via Product Upload (SHPF-UP-01) at \u20ac75/product.\n\n\u2022 Payment Gateway Integration: 1 primary payment gateway connected and tested. Additional gateways configured at \u20ac150 each.\n\n\u2022 Platform Guidance: WordPress/Webflow e-commerce is best suited for catalogues under 50 products. For larger catalogues or complex inventory, we recommend Shopify Launch Sprint (SHPF-SPRNT-01).\n\nWhy This Matters to You\n\nAdding e-commerce to your existing website avoids the complexity of migrating to a separate platform, turning your website from a marketing tool into a revenue-generating asset.\n\nSKU: WEB-ECOM-01"}, {"id": "map_7_46", "category": "E-Commerce / Online Store", "label": "Store Build / Launch", "oldName": "Checkout pages.", "oldDesc": "Pages dedicated to user checkout journey and order payment finalisation.", "oldPrice": "\u20ac525", "oldRaw": 525, "newName": "Shopify Launch Sprint", "newDesc": "This is a complete, end-to-end Shopify store launch service, taking you from a blank platform to a fully operational, branded online store ready to receive customers and process transactions. It covers every technical and design element required to get your e-commerce business live and trading.\n\n\u2022 Theme Selection & Brand Application: We select, install, and configure a Shopify theme appropriate to your product category and brand identity, then apply your logo, colour palette, typography, and visual language throughout the entire store to create a cohesive, professional storefront.\n\n\u2022 Core Page Build - 5 Pages: We design and build the 5 x essential store pages: Homepage, Collection/Category page, Product page, About page, and Contact page (each structured for both conversion and SEO).\n\n\u2022 Technical Configuration: Payment gateway integration, shipping zone setup, tax configuration, domain connection, and all standard Shopify administrative settings are configured correctly for your market and operational requirements.\n\n\u2022 Launch Readiness Review: A final pre-launch technical check confirms the store is functional, mobile-responsive, loading efficiently, and free from critical errors before your store goes live.\n\nWhy This Matters to You\n\nA professional, technically sound Shopify store is the difference between a business that earns customer trust at first visit and one that loses sales before the checkout. This sprint delivers the complete, launch-ready foundation your e-commerce operation needs; built correctly from the start so you're not fixing problems under trading conditions.\n\nSKU:\u00a0 SHPF-SPRNT-01", "newPrice": "\u20ac3,500", "newRaw": 3500, "newSku": "SHPF-SPRNT-01", "clientConcern": "'Theme Selection & Brand Application' \u2014 client may expect fully custom design, not a configured theme. \u20ac3,500 for a complete Shopify store is competitive for Europe. '5 x essential pages' may feel limiting. No mention of product upload count \u2014 that's a separate service.", "providerConcern": "\u20ac3,500 for a full Shopify store launch is competitive in the European market. Ensure proposals clearly state: 'Product uploads are not included in this package \u2014 see Product Upload service (SHPF-UP-01) at \u20ac75/product.' The theme-based approach is efficient and appropriate at this price point \u2014 but manage the 'custom design' expectation during the sales process.", "recommendation": "ADD: 'This is a theme-based build with professional brand application \u2014 not a fully custom-coded design. For bespoke custom-designed websites, see our Standard or Growth Website packages.' | ADD: 'Product uploads are not included. Products are uploaded via our Product Upload service (SHPF-UP-01) at \u20ac75/product.' | ADD: '2 rounds of design revisions included during the build process.'", "rewrittenDesc": "Complete end-to-end Shopify store launch \u2014 blank platform to fully operational, branded online store.\n\n\u2022 Theme Selection & Brand Application: This is a theme-based build with professional brand application \u2014 not a fully custom-coded design. For bespoke custom websites, see Standard or Growth Website packages.\n\n\u2022 Core Page Build \u2014 5 Pages: Homepage, Collection, Product, About, and Contact pages.\n\n\u2022 Technical Configuration: Payment gateway, shipping, tax, domain, and admin settings.\n\n\u2022 Launch Readiness Review: Final pre-launch technical check.\n\n\u2022 Product Uploads: Not included. Products uploaded via Product Upload (SHPF-UP-01) at \u20ac75/product.\n\n\u2022 Revisions: 2 rounds of design revisions during the build process.\n\nWhy This Matters to You\n\nA professional Shopify store is the difference between earning trust at first visit and losing sales before checkout. This sprint delivers the complete foundation your e-commerce operation needs.\n\nSKU: SHPF-SPRNT-01"}, {"id": "map_32_43", "category": "E-Commerce / Online Store", "label": "Product Pages", "oldName": "Product Page Design.", "oldDesc": "One product page designed to spec and ready for client replication.", "oldPrice": "\u20ac140", "oldRaw": 140, "newName": "Product Upload", "newDesc": "This is a per-unit service for the professional manual creation of individual product and category pages within your Shopify store. Each product is built to a consistent, commercially optimised standard, ensuring your catalogue is presented accurately, completely, and in a format that supports both customer conversion and search engine indexing.\n\n\u2022 Per-Product Page Build: Each unit covers the manual creation of a single product listing, including product title formatting, description population, variant configuration (sizes, colours, quantities), pricing setup, image upload and sequencing, and SEO metadata entry.\n\n\u2022 Category Page Association: Products are correctly assigned to the appropriate collection and category structure within your store, ensuring logical navigation and product discoverability.\n\n\u2022 Quality & Consistency Standards: Every product is built to a defined template standard, ensuring a uniform presentation across your entire catalogue regardless of the volume of products uploaded.\n\nWhy This Matters to You\n\nA product catalogue that is incomplete, inconsistently formatted, or poorly structured costs you sales. Customers who cannot find the information they need (sizing, variants, clear imagery, accurate descriptions) will abandon their purchase. This service ensures every product in your store is presented to the standard required to convert a browser into a buyer.\n\nSKU: SHPF-UP-01", "newPrice": "\u20ac75 per Products", "newRaw": 75, "newSku": "SHPF-UP-01", "clientConcern": "\u20ac75 per product is clear. But no minimum order stated \u2014 client could send 1 product at a time. 'SEO metadata entry' \u2014 does Diginauts write the product descriptions, or does the client supply copy? Ambiguous.", "providerConcern": "\u20ac75/product is reasonable for the European market for professional product uploads. Set a minimum batch size (e.g., 10 products) to ensure operational efficiency. Clarify: 'Client supplies product titles, descriptions, and images. Diginauts handles formatting, variant configuration, SEO metadata optimisation, and category assignment.' This defines the division of labour.", "recommendation": "ADD: 'Minimum order: 10 products per batch. Orders under 10 products incur a \u20ac150 minimum order fee.' | CLARIFY: 'Client supplies: product titles, descriptions, images, pricing, and variant details. Diginauts handles: formatting, variant configuration, collection assignment, SEO metadata optimisation, and quality assurance.' | ADD: 'Products with more than 10 variants (e.g., size \u00d7 colour combinations) may require additional time \u2014 contact us for complex catalogue pricing.'", "rewrittenDesc": "Per-unit professional product upload service for Shopify stores.\n\n\u2022 Per-Product Page Build: Product title, description, variants, pricing, images, and SEO metadata.\n\n\u2022 Category Page Association: Products assigned to correct collections for logical navigation.\n\n\u2022 Quality & Consistency Standards: Every product built to a defined template standard.\n\n\u2022 Client Responsibilities: Client supplies product titles, descriptions, images, pricing, and variant details. Diginauts handles formatting, variant configuration, collection assignment, and SEO metadata optimisation.\n\n\u2022 Minimum Order: 10 products per batch. Orders under 10 incur a \u20ac150 minimum order fee.\n\n\u2022 Complex Products: Products with more than 10 variants may require additional time \u2014 contact us for complex catalogue pricing.\n\nWhy This Matters to You\n\nA product catalogue that is incomplete or inconsistently formatted costs you sales. This service ensures every product is presented to the standard required to convert.\n\nSKU: SHPF-UP-01"}, {"id": "map_31_29", "category": "E-Commerce / Online Store", "label": "Category / Collection Pages", "oldName": "Product Category Page.", "oldDesc": "One category page designed to spec and ready for client replication.", "oldPrice": "\u20ac250", "oldRaw": 250, "newName": "High-Converter Package", "newDesc": "This service redesigns the most commercially critical pages in your Shopify store (product pages and category/collection pages) applying conversion rate optimisation (CRO) principles to increase the percentage of visitors who add to cart and complete a purchase. It is a targeted design intervention, not a full-store rebuild.\n\n\u2022 Custom Product Page Design: We redesign your product page layout using UX best practices (optimised image presentation, social proof placement, trust signal positioning, urgency mechanisms, and clear, prominent call-to-action placement) to remove friction between browse and purchase.\n\n\u2022 Custom Category Page Design: Collection pages are restructured to improve product discovery, filtering logic, and visual hierarchy, guiding shoppers more effectively toward the products most likely to convert for your specific catalogue.\n\n\u2022 Mobile-First Optimisation: All designs are built and tested for mobile performance first, ensuring conversion rates are not suppressed by layout issues on the devices your customers are most likely using.\n\nWhy This Matters to You\n\nYour product and category pages are where buying decisions are made. Small improvements in how these pages are designed (clearer CTAs, better image layouts, stronger trust signals) can produce significant increases in revenue without requiring any more traffic. This service directly targets the pages that have the highest commercial impact on your store's performance.\n\nSKU:\u00a0SHPF-CONV-01", "newPrice": "\u20ac1,200", "newRaw": 1200, "newSku": "SHPF-CONV-01", "clientConcern": "'Targeted design intervention, not a full-store rebuild' \u2014 important caveat but may be overlooked in sales. Client may expect ALL product and category pages redesigned, not just the template. 'Mobile-First Optimisation' \u2014 if the current theme doesn't support the design changes, this becomes a theme replacement.", "providerConcern": "\u20ac1,200 for product + category page redesign is reasonable for the European market. Clarify that you're designing a template that the client replicates across products, not individually designing each page. 'CRO principles' implies a conversion improvement outcome \u2014 if rates don't improve, the client will question the investment. Consider adding a pre/post conversion comparison report to demonstrate value.", "recommendation": "ADD: 'This service redesigns the product page template and up to 2 collection page layouts. The redesigned templates are then applied consistently across the store. Individual product-by-product redesign is not included.' | ADD: 'Mobile-first designs are implemented within the capabilities of your current Shopify theme. If theme limitations prevent the proposed design, a theme change will be recommended and quoted separately.' | ADD: '1 round of revisions included.'", "rewrittenDesc": "Redesigns the most commercially critical pages in your Shopify store \u2014 product pages and category/collection pages \u2014 applying CRO principles.\n\n\u2022 Custom Product Page Template Design: UX best practices applied to optimise image presentation, trust signals, and CTA placement. This designs a reusable product page template \u2014 not individual redesign of every product. The template is then applied consistently across your store.\n\n\u2022 Custom Category Page Design: Up to 2 collection page layouts restructured for improved product discovery and visual hierarchy.\n\n\u2022 Mobile-First Optimisation: Designs built and tested mobile-first, within the capabilities of your current Shopify theme. If theme limitations prevent the proposed design, a theme change will be recommended and quoted separately.\n\n\u2022 Revisions: 1 round of revisions included.\n\nWhy This Matters to You\n\nSmall improvements in how product pages are designed can produce significant revenue increases without requiring more traffic. This service targets the pages with the highest commercial impact.\n\nSKU: SHPF-CONV-01"}, {"id": "map_36_29", "category": "E-Commerce / Online Store", "label": "Category Design", "oldName": "Simple Product Category Design.", "oldDesc": "Designing product categories for easy user navigation, product scale and effective admin management. Will include a mix of WP, WooCommerce and Custom Fields.", "oldPrice": "\u20ac360", "oldRaw": 360, "newName": "High-Converter Package", "newDesc": "This service redesigns the most commercially critical pages in your Shopify store (product pages and category/collection pages) applying conversion rate optimisation (CRO) principles to increase the percentage of visitors who add to cart and complete a purchase. It is a targeted design intervention, not a full-store rebuild.\n\n\u2022 Custom Product Page Design: We redesign your product page layout using UX best practices (optimised image presentation, social proof placement, trust signal positioning, urgency mechanisms, and clear, prominent call-to-action placement) to remove friction between browse and purchase.\n\n\u2022 Custom Category Page Design: Collection pages are restructured to improve product discovery, filtering logic, and visual hierarchy, guiding shoppers more effectively toward the products most likely to convert for your specific catalogue.\n\n\u2022 Mobile-First Op  null, "providerConcern": null, "recommendation": "", "rewrittenDesc": ""}, {"id": "map_16_26", "category": "Google Paid Media", "label": "Google Search: Single", "oldName": "Google Search Campaign (1x campaign)", "oldDesc": "Google search ads constitute some of the highest performing ad clicks that money can buy. There is a science behind well run Google Search Ads. Unlock the gravitational potential offered by Google Search Ads coupled with Diginaut\u2019s rocket fuel ad formulas, designed in our low earth orbit laboratory to be super efficient and cost effective.\nService incl. 47 point optimisation checklist by renowned Google Ads legend, Aaron Young. Specific campaign elements are optimised every 72 hours, others every month or quarter. A continuous cycle to ensure optimal performance over the long run. Ads that are not managed, degrade overtime, leading to a rise in ad costs & poor performance.\nAd spend not included", "oldPrice": "\u20ac170/mo", "oldRaw": 170, "newName": "Google Search: Individual", "newDesc": "This standalone service provides dedicated management of a single Google Search campaign for brands that need precision targeting of high-intent keyword traffic without a full multi-channel package. It is ideal as an add-on to an existing campaign structure or as a focused service for a specific product line, location, or audience segment.\n\n\u2022 Keyword Research & Strategy: We identify and organise the specific search terms your target audience uses when they are ready to purchase or enquire, building a keyword architecture that captures intent without wasting budget on irrelevant traffic.\n\n\u2022 Ad Copy Creation & Testing: We write and test multiple ad variations, continuously refining headlines and descriptions to improve click-through rates and relevance scores, which directly lowers your cost-per-click.\n\n\u2022 Bid Management & Budget Optimisation: Active bid strategy management ensures your budget is allocated to the keywords and time periods that deliver the strongest results for your specific conversion objectives.\n\nWhy This Matters to You\n\nGoogle Search is the most direct route to capturing people who are actively looking for exactly what you offer. A well-managed search campaign intercepts your ideal customer at the highest-intent moment in their buying journey. This service ensures that moment is never missed due to poor targeting, weak ad copy, or mismanaged bids.\n\nSKU:\u00a0 GPM-SRCH-01", "newPrice": "\u20ac425/mo", "newRaw": 425, "newSku": "GPM-SRCH-01", "clientConcern": "Client may not realise they ALSO need the Baseline Google Ads Management Fee (GPM-MGMT-01, \u20ac650/mo). That makes a single search campaign \u20ac1,075/mo, not \u20ac425/mo. This stacking must be crystal clear in proposals.", "providerConcern": "At \u20ac425/mo for single campaign management on top of the \u20ac650 base, the combined \u20ac1,075/mo is reasonable for the European market for a well-managed search campaign. However, the stacking structure must be communicated transparently \u2014 every proposal should show base + campaign = total. The sliding scale discount (undefined) adds negotiation complexity.", "recommendation": "ADD prominent note: 'This campaign management fee is charged in addition to the Baseline Google Ads Management Fee (GPM-MGMT-01, \u20ac650/mo). Your total monthly investment for a single managed search campaign is \u20ac1,075/mo (\u20ac650 base + \u20ac425 campaign management).' | ADD same sliding scale resolution as other Google items.", "rewrittenDesc": "Dedicated management of a single Google Search campaign for precision targeting of high-intent keyword traffic.\n\n\u2022 Keyword Research & Strategy: Search terms identified and organised to capture purchase/enquiry intent.\n\n\u2022 Ad Copy Creation & Testing: Multiple ad variations tested and refined to improve click-through rates.\n\n\u2022 Bid Management & Budget Optimisation: Active bid strategy management ensuring budget is allocated to the strongest-performing keywords.\n\n\u2022 Important \u2014 Fee Stacking: This campaign management fee is charged in addition to the Baseline Google Ads Management Fee (GPM-MGMT-01, \u20ac650/mo). Total monthly investment for a single managed search campaign: \u20ac1,075/mo.\n\n\u2022 Volume Discount: Clients running 2+ Google Ads services receive a 10% discount on campaign fees. 3+ services: 15%.\n\nWhy This Matters to You\n\nGoogle Search is the most direct route to capturing people actively looking for what you offer. This service ensures that moment is never missed.\n\nSKU: GPM-SRCH-01"}, {"id": "map_17_34", "category": "Google Paid Media", "label": "Google Search: Multi", "oldName": "Google Search Campaign the Doppler Tier  (3x campaigns)", "oldDesc": "Engage two additional search campaigns and save. \n\nAd spend not included", "oldPrice": "\u20ac415/mo", "oldRaw": 415, "newName": "Lead Gen Stack: Starter", "newDesc": "This entry-level Google Ads package is designed for service-based businesses that need to capture high-intent leads from Google Search. It targets people who are actively searching for the specific services you offer, driving them to your website or lead form at the precise moment they are ready to enquire.\n\n\u2022 Search Campaign Setup & Management: We build and manage targeted Google Search campaigns using carefully selected keywords aligned to your services and geographic market. Ads appear when prospects are actively searching, ensuring your budget reaches the most motivated audience.\n\n\u2022 Basic Remarketing: A foundational remarketing layer re-engages users who visited your website but did not convert, keeping your brand visible as they continue browsing - a cost-efficient way to recover warm prospects.\n\n\u2022 Conversion Tracking Configuration: We ensure your campaigns are correctly connected to measurable outcomes (form submissions, phone calls, or bookings) so performance data is accurate and optimisation is evidence-based.\n\nWhy This Matters to You\n\nSearch advertising targets people who are already looking for what you offer. This is the highest-intent traffic available and, when managed correctly, consistently delivers among the lowest cost-per-lead of any digital channel. This starter stack puts your business in front of the right people at exactly the right moment.\n\nSKU: GPM-LDGN-01", "newPrice": "\u20ac750/mo", "newRaw": 750, "newSku": "GPM-LDGN-01", "clientConcern": "'Entry-level' positioning at \u20ac750/mo, but with base fee (\u20ac650) the actual cost is \u20ac1,400/mo. 'Basic Remarketing' is included but doesn't specify who creates the display creative. 'Conversion Tracking Configuration' is also covered in the base fee \u2014 potential overlap.", "providerConcern": "\u20ac1,400/mo total is competitive for entry-level Google Ads management in Europe. There's a genuine feature overlap with the base fee \u2014 both promise conversion tracking and reporting. Clarify what each layer delivers distinctly. The 'Starter' label may deter higher-value clients \u2014 consider whether 'Core' or 'Foundation' positions better.", "recommendation": "ADD: 'Baseline Google Ads Management Fee (GPM-MGMT-01, \u20ac650/mo) is required alongside this package. Total monthly investment: \u20ac1,400/mo.' | CLARIFY: 'Conversion tracking in this package covers campaign-level goal configuration. Account-level tracking setup is handled under the Baseline Management Fee.' | ADD: 'Basic Remarketing uses text and responsive display ads generated within Google Ads. Custom display creative design is available via our Creative Engine packages.'", "rewrittenDesc": "Entry-level Google Ads package for service businesses capturing high-intent leads from Search.\n\n\u2022 Search Campaign Setup & Management: Targeted campaigns using selected keywords.\n\n\u2022 Basic Remarketing: Foundational remarketing using text and responsive display ads generated within Google Ads. Custom display creative design is available via Creative Engine packages.\n\n\u2022 Conversion Tracking: Campaign-level goal configuration (account-level tracking handled under Baseline Management Fee).\n\n\u2022 Baseline Fee Required: GPM-MGMT-01 (\u20ac650/mo) applies in addition. Total monthly investment: \u20ac1,400/mo.\n\n\u2022 Volume Discount: 2+ Google Ads services: 10% off campaign fees. 3+: 15%.\n\nWhy This Matters to You\n\nSearch advertising targets people already looking for what you offer \u2014 consistently delivering among the lowest cost-per-lead of any digital channel.\n\nSKU: GPM-LDGN-01"}, {"id": "map_18_33", "category": "Google Paid Media", "label": "Google Search: Scale", "oldName": "Google Search Campaign The Dynamo Tier  (5x campaigns)", "oldDesc": "Engage four additional search campaigns and save. \n\nAd spend not included", "oldPrice": "\u20ac605/mo", "oldRaw": 605, "newName": "Lead Gen Stack: Scaler", "newDesc": "This advanced Google Ads package delivers a comprehensive multi-channel lead generation system for brands that are ready to scale their pipeline aggressively. By combining Search, Performance Max, and Video Action Campaigns, it targets prospects at every stage of the buyer journey - from first discovery to final conversion decision.\n\n\u2022 Search Campaign Management: Precision keyword targeting captures high-intent prospects actively searching for your services, delivering enquiries from the most motivated segment of your market.\n\n\u2022 Performance Max for Lead Generation: Google's most advanced campaign type uses machine learning to serve your ads across every Google-owned surface (Search, Display, Gmail, YouTube, and Maps) optimising in real time for your specific lead generation goals.\n\n\u2022 Video Action Campaigns: Targeted video ads on YouTube engage prospects earlier in their decision-making process, building awareness and trust with audiences before they reach the search stage.\n\n\u2022 Unified Conversion Strategy: All campaign types are connected to a cohesive conversion tracking framework, allowing cross-channel attribution and holistic optimisation across the full funnel.\n\nWhy This Matters to You\n\nA single-channel approach to lead generation leaves significant revenue on the table. Prospects today research across multiple touchpoints before making contact. This stack ensures your brand is present and persuasive at every stage of that journey, from initial awareness through to the moment of enquiry.\n\nSKU: GPM-LDGN-02", "newPrice": "\u20ac1,800/mo", "newRaw": 1800, "newSku": "GPM-LDGN-02", "clientConcern": "\u20ac1,800/mo for Search + PMax + Video Action is significant, but stacking with the base fee (\u20ac650) brings total to \u20ac2,450/mo. 'Video Action Campaigns' require video creative \u2014 the description doesn't state who supplies it. If the client doesn't have video assets, an entire campaign type can't run despite being paid for.", "providerConcern": "\u20ac2,450/mo total is well-priced for multi-channel lead gen in the European market. However, Video Action Campaigns are entirely dependent on creative quality \u2014 add a prerequisite: 'Client must supply video creative meeting platform specifications. Video production can be sourced via our Andromeda or Performance Video Ad Pack services.' This both protects scope and creates an upsell path.", "recommendation": "ADD: 'Video Action Campaigns require video creative assets supplied by the client. If you do not have video assets, these can be produced via our Andromeda Pulse Video (MPM-ANDR-01) or Performance Video Ad Pack (MM-ADPK-01) services.' | ADD: 'Baseline Google Ads Management Fee (GPM-MGMT-01, \u20ac650/mo) is required alongside this package. Total monthly investment: \u20ac2,450/mo.'", "rewrittenDesc": "Advanced multi-channel lead generation combining Search, Performance Max, and Video Action campaigns.\n\n\u2022 Search Campaign Management: Precision keyword targeting capturing high-intent prospects.\n\n\u2022 Performance Max for Lead Generation: Machine learning across all Google surfaces.\n\n\u2022 Video Action Campaigns: Targeted YouTube video ads. Client must supply video creative meeting platform specifications \u2014 video production available via Andromeda Pulse (MPM-ANDR-01) or Performance Video Ad Pack (MM-ADPK-01).\n\n\u2022 Unified Conversion Strategy: Cross-funnel attribution and optimisation.\n\n\u2022 Baseline Fee Required: GPM-MGMT-01 (\u20ac650/mo) applies in addition. Total monthly investment: \u20ac2,450/mo.\n\n\u2022 Volume Discount: 2+ Google Ads services: 10% off campaign fees. 3+: 15%.\n\nWhy This Matters to You\n\nA single-channel approach leaves revenue on the table. This stack ensures your brand is present at every stage of the buyer journey.\n\nSKU: GPM-LDGN-02"}, {"id": "map_12_37", "category": "Google Paid Media", "label": "PMax: Single", "oldName": "Google PMax Campaign (1x campaign)", "oldDesc": "Google\u2019s No. 1 advertising solution. Performance Max campaigns allow advertisers to achieve incredible results by mixing search, display and video into one dynamic and algorithmic ecosystem. Google is able to access big datasets, trends and insights to trigger ads of all various forms to your prospective clients at the most ideal times and locations along the customer purchasing journey.\nService incl. 47 point checklist across search, display and video elements, campaign display artwork, refreshed monthly.\u00a0Recommended with Media Shower.\u00a0\nAd spend not included", "oldPrice": "\u20ac265/mo", "oldRaw": 265, "newName": "Performance Max Campaign Management", "newDesc": "Performance Max is Google's most powerful and intelligent campaign type, using machine learning to serve your ads across every Google-owned platform (Search, Shopping, Display, YouTube, Gmail, and Google Maps) from a single, unified campaign. This service provides expert management of that campaign to maximise the quality of the signals fed to the algorithm and ensure it is continuously optimised toward your actual business goals.\n\n\u2022 Full Campaign Architecture & Asset Management: We structure and populate your Performance Max campaign with all required creative elements (images, headlines, descriptions, and logos) rotated and refreshed on a monthly basis to prevent creative fatigue and maintain algorithmic engagement.\n\n\u2022 47-Point Optimisation Checklist: Each optimisation cycle follows a structured, comprehensive review process covering audience signals, asset performance, budget pacing, conversion goals, and exclusion lists to ensure no performance lever is overlooked.\n\n\u2022 Audience Signal Configuration: We build and continuously refine the audience signal inputs that guide the machine learning model toward your best-converting customer profiles, accelerating the algorithm's learning phase.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount structure, enquire for specific pricing based on your service combination.\n\nWhy This Matters to You\n\nPerformance Max gives Google's AI access to your entire advertising budget across all its platforms simultaneously. Without expert management, the algorithm will optimise for whatever it finds easiest to achieve, not necessarily what is most valuable to your business. Professional management ensures the machine is pointed at the right objectives and that your creative assets remain strong enough to keep it performing.\n\nSKU: GPM-PMAX-01", "newPrice": "\u20ac365/mo", "newRaw": 365, "newSku": "GPM-PMAX-01", "clientConcern": "'47-Point Optimisation Checklist' \u2014 any savvy client will request the checklist and hold you to every point monthly. 'Sliding Scale Discount' mentioned again without definition. At \u20ac365/mo + \u20ac650 base = \u20ac1,015/mo total \u2014 stacking needs to be explicit.", "providerConcern": "The 47-point checklist is a strong differentiator \u2014 document it, version-control it, and ensure every PMax manager follows
