const DATA = [{"id": "map_2_52", "category": "Website Design", "label": "Website: Mini/Standard", "oldName": "5 Page Bundle the Exoplanet (mini website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "$2,500", "oldRaw": 2500, "newName": "Standard Website", "newDesc": "A complete, professionally designed and developed website built for businesses that need a credible, high-quality digital home. This package delivers up to 5 x pages with a custom user interface, a strong user experience architecture, and an SEO-optimised launch configuration, giving your brand the online presence it needs to earn customer trust and generate enquiries.\n\n\u2022 Custom UI/UX Design: Every page is designed from a bespoke starting point aligned to your brand identity, not a template applied without thought. Visual hierarchy, navigation flow, and content structure are all considered from the perspective of your target customer's journey.\n\n\u2022 Up to 5 Core Pages: Includes the essential pages for a professional brand presence; typically Homepage, About, Services, and Contact, plus one additional page relevant to your business.\n\n\u2022 SEO Launch Configuration: On-page SEO foundations are correctly configured at launch (page titles, meta descriptions, heading structures, image alt text, sitemap submission, and Google Search Console connection) giving your new site the strongest possible start in organic search.\n\nWhy This Matters to You\n\nYour website is your most permanent and controllable marketing asset. It works around the clock, operates in every market you serve, and is the destination every other marketing channel points toward. A professionally built website that earns trust, communicates clearly, and converts visitors is not a cost, it is the foundation of your digital revenue.\n\nSKU: WEB-STD-01", "newPrice": "$3,000", "newRaw": 3000, "newSku": "WEB-STD-01"}, {"id": "map_0_28", "category": "Website Design", "label": "Website: Small/Growth", "oldName": "10 Page Bundle The Protoplanet (small website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "$3,850", "oldRaw": 3850, "newName": "Growth Website", "newDesc": "This package delivers a comprehensive, strategically architected website for growing businesses that require more depth, more content surface area, and a more sophisticated information architecture than a standard site can provide. With up to ten pages and an advanced lead generation structure, it is built to support a business that is actively scaling its digital presence and marketing investment.\n\n\u2022 Up to 10 Pages with Advanced Information Architecture: A full content and navigation strategy is designed before a single page is built, ensuring your site structure supports both user journeys and search engine crawlability; with logical groupings, clear service hierarchies, and scalable page templates.\n\n\u2022 Lead Generation Mapping: Key conversion touchpoints are identified and implemented throughout the site (strategically placed contact forms, lead magnets, call-to-action blocks, and enquiry pathways) ensuring every section of the site is working toward a commercial objective.\n\n\u2022 Expanded SEO Foundation: A broader SEO architecture covers the full 10 page structure with correct keyword-intent alignment, internal linking strategy, and schema markup where appropriate, providing a stronger launch position in organic search.\n\nWhy This Matters to You\n\nA growth-stage business needs a website that works as hard as its sales team. A site with a shallow page structure limits both search visibility and the number of customer personas and services you can speak to directly. This package builds the digital infrastructure required to support a maturing marketing strategy, not just a presence, but a system.\n\nSKU: WEB-GRW-01", "newPrice": "$5,500", "newRaw": 5500, "newSku": "WEB-GRW-01"}, {"id": "map_1_24", "category": "Website Design", "label": "Website: Medium/Enterprise", "oldName": "25 Page Bundle The Eccentric Jupiter (medium website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "$8,385", "oldRaw": 8385, "newName": "Enterprise Website", "newDesc": "This is the most comprehensive website build package available, designed for organisations that require an extensive, authority-level digital presence with a complex content architecture, custom CMS structures, and a full platform migration if required. Up to twenty-five pages are designed, developed, and launched, with the depth and technical sophistication expected of an enterprise-level brand.\n\n\u2022 Up to 25 x Custom Pages with Custom CMS Structures: Beyond standard page templates, this package includes the development of custom content management structures, repeatable, editable components and content types that allow your team to add, edit, and manage complex content independently after handover, without relying on a developer for every change.\n\n\u2022 Full Platform Migration: If transitioning from an existing website on another platform, a complete content migration is included; ensuring no existing content, SEO equity, or page authority is lost during the transition.\n\n\u2022 Enterprise Information Architecture: A comprehensive IA strategy is developed prior to build, mapping the full site structure across all user personas, service lines, and content categories; ensuring the site scales logically as your organisation grows.\n\nWhy This Matters to You\n\nAn enterprise organisation cannot afford a website that constrains its content, limits its editorial independence, or loses its hard-earned search authority during a platform transition. This package delivers the scope, structure, and technical foundation required for a complex brand to communicate at scale (across multiple service areas, audiences, and markets)\u2014 from a single, professionally managed digital platform.\n\nSKU: WEB-ENT-01", "newPrice": "$11,500", "newRaw": 11500, "newSku": "WEB-ENT-01"}, {"id": "map_38_32", "category": "Website Design", "label": "Single Page", "oldName": "Standard Display Page The Full Moon", "oldDesc": "A single WordPress webpage that can be used as a standalone page or as part of a website. Diginauts uses advanced design tools, allowing us to achieve complete custom design outcomes for you, affordably and fast. Our pages and websites are completed on staging domains for your convenience and then seamlessly moved over to your main domain, where we host your new webpage or website on world-class WordPress optimised hosting solutions.\nOur approach to using WordPress is best in class. Our websites are typically not reliant on many plugins, keeping WordPress infrastructure light yet robust, secure and fast loading. Essentially you get all the incredible benefits of using WordPress without the standard downsides i.e. a slow website with a cumbersome and rigid design theme. Diginauts does not use design teams, we design all our WordPress websites \u201cby hand\u201d, completely customised for you.\nWebsites developed by Diginauts are customised specifically for mobile, tablet and desktop viewing experiences. We do not simply rely on auto resizing to do our job. Our designers take the time to design specific elements for various screen sizes and perform sizing optimisation on each page element.\nCost per page", "oldPrice": "$550", "oldRaw": 550, "newName": "Landing Page Sprint", "newDesc": "A focused, fast-delivery service that designs and builds a single, purpose-built landing page optimised specifically for converting ad traffic or campaign visitors into leads, enquiries, or purchases. Unlike a full website page, a dedicated landing page is engineered with one sole objective: getting the visitor to take a specific action.\n\n\u2022 Conversion-Focused Design: The page is structured around proven CRO principles (a compelling headline, clear value proposition, social proof elements, friction-reducing form design, and a prominent, singular call-to-action) all designed to maximise the percentage of visitors who convert.\n\n\u2022 Development & Technical Build: Full design and development delivered on Webflow or WordPress, including mobile responsiveness, correct technical formatting for ad platform landing page requirements, and basic on-page SEO configuration.\n\n\u2022 Tracking & Analytics Integration: GA4 event tracking and conversion goal setup ensure that every lead or action generated by the page is correctly attributed and measurable from day one.\n\nWhy This Matters to You\n\nSending paid ad traffic to your homepage or a general website page significantly wastes your advertising budget. Dedicated landing pages (built around a single offer, with no distracting navigation or competing messages) consistently convert at two to five times the rate of standard website pages. This sprint gives you that asset quickly and correctly.\n\nSKU: WEB-SPRINT-01", "newPrice": "$1,250", "newRaw": 1250, "newSku": "WEB-SPRINT-01"}, {"id": "map_11_56", "category": "Website Design", "label": "Website Maintenance", "oldName": "Design & Management for WordPress website (1x Website)", "oldDesc": "We estimate 5 hours per month minimum to make required design updates and optimise the site where necessary. Should more time be required some months, we can simply let Brainboss know beforehand and quote accordingly.\u00a0\nWe believe this option will adequately cover the below areas:\n\u2022 Monthly website technical analysis and maintenance.\n\n\u2022 Updating the website design with new content.\n\n\u2022 Adding customer testimonials and possible blog / newsletter content", "oldPrice": "$375/mo", "oldRaw": 375, "newName": "Web Maintenance", "newDesc": "This monthly retainer provides the ongoing technical maintenance that every website requires to remain secure, fast, and functional. Without regular maintenance, websites accumulate plugin vulnerabilities, outdated software, broken functionality, and performance degradation; all of which harm both user experience and search engine rankings.\n\n\u2022 Theme & Plugin Updates: We apply all available theme and plugin/extension updates on a monthly basis, testing for conflicts before deploying to ensure updates do not break existing functionality.\n\n\u2022 Automated Daily Backups: Your complete website is backed up automatically every day, with a rolling retention window; ensuring rapid recovery is possible in the event of a security incident, accidental deletion, or update failure.\n\n\u2022 Small Fixes & Minor Amendments: Routine minor fixes (broken links, small layout issues, form malfunctions, or display errors) are addressed within this maintenance scope without additional charge.\n\n\u2022 Monthly Health Report: A brief monthly summary confirms the updates applied, backup status, and any issues identified and resolved during the month.\n\nWhy This Matters to You\n\nA website that is not actively maintained is a security liability and a revenue risk. Outdated plugins are the primary vector for website hacks. Slow, broken, or insecure sites lose both customers and search rankings. This maintenance retainer is the minimum investment required to protect the website asset you have built.\n\nSKU: WEB-MNT-02", "newPrice": "$150/mo", "newRaw": 150, "newSku": "WEB-MNT-02"}, {"id": "map_23_21", "category": "E-Commerce / Online Store", "label": "E-Commerce Core", "oldName": "Online Store Functionality.", "oldDesc": "Adding fundamental e-commerce functionality to your website", "oldPrice": "$385", "oldRaw": 385, "newName": "E-Comm Integration", "newDesc": "This service adds a fully functional online shop to an existing or new Webflow or WordPress website, enabling you to sell products or services directly through your web presence without migrating to a dedicated e-commerce platform. It covers complete WooCommerce (WordPress) or Webflow Commerce setup, with initial products configured and payments enabled.\n\n\u2022 WooCommerce or Webflow Shop Setup: Full installation and configuration of the appropriate e-commerce framework for your platform; including product catalogue structure, checkout flow, cart functionality, and order management backend setup.\n\n\u2022 Initial Product Configuration - 5 x Products: 5 x products are built and published as part of the integration, establishing the template and structure for your full catalogue.\n\n\u2022 Payment Gateway Integration: A payment gateway is connected and tested to enable live transactions, covering card payment processing, and additional payment methods as supported by your platform and region.\n\nWhy This Matters to You\n\nAdding e-commerce to your existing website avoids the complexity and cost of migrating to an entirely separate platform, while keeping your brand's digital presence unified under one domain and design system. This integration turns your website from a marketing tool into a revenue-generating asset.\n\nSKU: WEB-ECOM-01", "newPrice": "$1,500", "newRaw": 1500, "newSku": "WEB-ECOM-01"}, {"id": "map_7_46", "category": "E-Commerce / Online Store", "label": "Store Build / Launch", "oldName": "Checkout pages.", "oldDesc": "Pages dedicated to user checkout journey and order payment finalisation.", "oldPrice": "$525", "oldRaw": 525, "newName": "Shopify Launch Sprint", "newDesc": "This is a complete, end-to-end Shopify store launch service, taking you from a blank platform to a fully operational, branded online store ready to receive customers and process transactions. It covers every technical and design element required to get your e-commerce business live and trading.\n\n\u2022 Theme Selection & Brand Application: We select, install, and configure a Shopify theme appropriate to your product category and brand identity, then apply your logo, colour palette, typography, and visual language throughout the entire store to create a cohesive, professional storefront.\n\n\u2022 Core Page Build - 5 Pages: We design and build the 5 x essential store pages: Homepage, Collection/Category page, Product page, About page, and Contact page (each structured for both conversion and SEO).\n\n\u2022 Technical Configuration: Payment gateway integration, shipping zone setup, tax configuration, domain connection, and all standard Shopify administrative settings are configured correctly for your market and operational requirements.\n\n\u2022 Launch Readiness Review: A final pre-launch technical check confirms the store is functional, mobile-responsive, loading efficiently, and free from critical errors before your store goes live.\n\nWhy This Matters to You\n\nA professional, technically sound Shopify store is the difference between a business that earns customer trust at first visit and one that loses sales before the checkout. This sprint delivers the complete, launch-ready foundation your e-commerce operation needs; built correctly from the start so you're not fixing problems under trading conditions.\n\nSKU:\u00a0 SHPF-SPRNT-01", "newPrice": "$3,500", "newRaw": 3500, "newSku": "SHPF-SPRNT-01"}, {"id": "map_32_43", "category": "E-Commerce / Online Store", "label": "Product Pages", "oldName": "Product Page Design.", "oldDesc": "One product page designed to spec and ready for client replication.", "oldPrice": "$140", "oldRaw": 140, "newName": "Product Upload", "newDesc": "This is a per-unit service for the professional manual creation of individual product and category pages within your Shopify store. Each product is built to a consistent, commercially optimised standard, ensuring your catalogue is presented accurately, completely, and in a format that supports both customer conversion and search engine indexing.\n\n\u2022 Per-Product Page Build: Each unit covers the manual creation a, and broken automations mean your marketing emails start bouncing, your sales team works from inaccurate information, and automated workflows that were working on day one quietly stop firing. This service is the proactive management discipline that prevents that deterioration.\n\nSKU: CRM-SUPP-01", "newPrice": "Custom", "newRaw": null, "newSku": "CRM-SUPP-01"}, {"id": "map_22_15", "category": "CRM", "label": "CRM Subscription", "oldName": "Managed CRM Subscription & Ecosystem Access", "oldDesc": "The Infrastructure: Your all-in-one license and high-speed environment.\nThis subscription provides your business with the \"keys to the kingdom.\" It covers the essential licensing and the enterprise-grade cloud infrastructure required to host your data. Unlike standard \"off-the-shelf\" software that surprises you with extra fees for storage or API usage, this is a fixed-cost gateway to a high-performance environment.\n\u2022 Software Licensing: Full access to the CRM ecosystem and WordPress-integrated tools.\n\u2022 High-Speed Hosting: Dedicated cloud resources so your system stays fast as your database grows.\n\u2022 Connectivity: Covers the \"always-on\" data bridge between your website and your sales team.\n\u2022 Security: Advanced encryption and server-side protocols to keep customer data locked down.", "oldPrice": "$50/mo", "oldRaw": 50, "newName": "CRM Platform Ecosystem & Cloud Hosting", "newDesc": "This is a fixed monthly software access fee that covers your GoHighLevel CRM platform licensing and the enterprise-grade cloud hosting infrastructure required to operate your CRM environment. It is the foundational access layer that keeps your lead capture, automation, and database infrastructure securely operational at all times.\n\n\u2022 GoHighLevel Platform License: Access to the GoHighLevel CRM platform under our agency ecosystem; providing the full suite of CRM, automation, pipeline, and communication tools without requiring you to manage a direct platform acc const firebaseConfig = {
  apiKey: "AIzaSyAQq8i3WfQcvTqU9WY3advQtc230kRqvY0",
  authDomain: "price-card-comparison.firebaseapp.com",
  projectId: "price-card-comparison",
  storageBucket: "price-card-comparison.firebasestorage.app",
  messagingSenderId: "713225858215",
  appId: "1:713225858215:web:b52676584321cd9f073f82"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const notesRef = db.collection('notes');
const pricesRef = db.collection('updatedPrices');

let notes = {};
let updatedPrices = {};
let activeFilter = 'All';

async function loadNotes() {
  try {
    const [noteSnap, priceSnap] = await Promise.all([notesRef.get(), pricesRef.get()]);
    noteSnap.forEach(doc => { notes[doc.id] = doc.data().text; });
    priceSnap.forEach(doc => { updatedPrices[doc.id] = doc.data().price; });
    document.getElementById('fbStatus').className = 'status connected';
    document.getElementById('fbStatus').querySelector('span').textContent = 'Firebase connected';
    render();
  } catch(e) {
    console.error('Firebase error:', e);
    document.getElementById('fbStatus').className = 'status disconnected';
    document.getElementById('fbStatus').querySelector('span').textContent = 'Offline mode';
    render();
  }
}

async function saveNote(id, text) {
  notes[id] = text;
  try {
    await notesRef.doc(id).set({ text, updatedAt: new Date().toISOString() });
    flashSave();
  } catch(e) { console.error('Save failed:', e); }
  render();
}

async function deleteNote(id) {
  delete notes[id];
  try { await notesRef.doc(id).delete(); flashSave(); } catch(e) {}
  render();
}

async function saveUpdatedPrice(id, price) {
  updatedPrices[id] = price;
  try {
    if (price) {
      await pricesRef.doc(id).set({ price, updatedAt: new Date().toISOString() });
    } else {
      delete updatedPrices[id];
      await pricesRef.doc(id).delete();
    }
    flashSave();
  } catch(e) { console.error('Price save failed:', e); }
}

function flashSave() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// Download XLS
function downloadXLS() {
  const rows = DATA.map(row => ({
    'Category': row.category,
    'Match Label': row.label,
    'Old Item': row.oldName || '',
    'Old Price': row.oldPrice || '',
    'New Item': row.newName || '',
    'New SKU': row.newSku || '',
    'New Price': row.newPrice || '',
    'Delta': (() => {
      if (row.oldRaw === null || row.newRaw === null) return '';
      const d = row.newRaw - row.oldRaw;
      return d > 0 ? `+$${d.toLocaleString()}` : d < 0 ? `-$${Math.abs(d).toLocaleString()}` : 'Same';
    })(),
    'Updated Price': updatedPrices[row.id] || '',
    'Note': notes[row.id] || '',
  }));

  const ws = XLSX.utils.json_to_sheet(rows);
  // Set column widths
  ws['!cols'] = [
    {wch: 28}, {wch: 22}, {wch: 36}, {wch: 14},
    {wch: 36}, {wch: 16}, {wch: 14}, {wch: 12}, {wch: 14}, {wch: 40}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Price Card Comparison');
  XLSX.writeFile(wb, 'diginauts-price-card-comparison.xlsx');
}

const categories = [...new Set(DATA.map(r => r.category))];

function buildFilters() {
  const el = document.getElementById('filters');
  const all = document.createElement('button');
  all.className = 'filter-btn active';
  all.textContent = 'All';
  all.onclick = () => { activeFilter = 'All'; render(); };
  el.appendChild(all);
  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.textContent = cat;
    btn.onclick = () => { activeFilter = cat; render(); };
    el.appendChild(btn);
  });
}

function getDelta(row) {
  if (row.oldRaw === null || row.newRaw === null) return { html: '<span class="delta na">n/a</span>' };
  const diff = row.newRaw - row.oldRaw;
  if (diff > 0) return { html: `<span class="delta up">+$${diff.toLocaleString()}</span>` };
  if (diff < 0) return { html: `<span class="delta down">\u2212$${Math.abs(diff).toLocaleString()}</span>` };
  return { html: '<span class="delta same">\u2014</span>' };
}

function render() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent === activeFilter);
  });

  const filtered = activeFilter === 'All' ? DATA : DATA.filter(r => r.category === activeFilter);
  const el = document.getElementById('content');

  let lastCat = '';

    const isNew = !row.oldName;

    div.innerHTML = `
      <div class="row-main">

          <span class="item-name old-name">${isNew ? '<span class="no-match-cell">\u2014</span>' : esc(row.oldName)}</span>

        </div>
        <span class="price old-price">${isNew ? '' : esc(row.oldPrice)}</span>
        <span class="arrow">${noMatch ? '' : '\u2192'}</span>
        <span class="item-name new-name">${noMatch ? '<span class="no-match">No comparison</span>' : esc(row.newName)}</span>
        <span class="price new-price">${noMatch ? '' : esc(row.newPrice)}</span>
        <span class="sku">${row.newSku ? esc(row.newSku) : ''}</span>
        <span>${delta}</span>
        <input class="updated-price-input" data-id="${row.id}" placeholder="\u2014" value="${updatedPrices[row.id] || ''}" />
      </div>
      <div style="padding: 0 8px; display: flex; gap: 8px; align-items: center;">
        <button class="note-toggle" data-id="${row.id}">
          <span class="dot ${notes[row.id] ? 'has-note' : 'no-note'}"></span>
          ${notes[row.id] ? 'Edit note' : 'Add note'}
        </button>
        ${(row.oldDesc || row.newDesc) ? '<button class="desc-toggle" data-id="desc-' + row.id + '">Descriptions</button>' : ''}
      </div>
      ${notes[row.id] ? '<div class="note-preview">' + esc(notes[row.id]) + '</div>' : ''}
      <div class="note-area" id="note-${row.id}">
        <textarea placeholder="Add a note...">${notes[row.id] || ''}</textarea>
        <div class="note-actions">
          ${notes[row.id] ? '<button class="note-btn delete" data-id="' + row.id + '">Delete</button>' : ''}
          <button class="note-btn cancel" data-id="${row.id}">Cancel</button>
          <button class="note-btn save" data-id="${row.id}">Save</button>
        </div>
      </div>
      <div class="desc-panel" id="desc-${row.id}">
        <div class="desc-col old-col">
          <h4>Old Description</h4>
          <div class="desc-text">${row.oldDesc ? esc(row.oldDesc) : '\u2014'}</div>
        </div>
        <div class="desc-col new-col">
          <h4>New Description</h4>
          <div class="desc-text">${row.newDesc ? esc(row.newDesc) : '\u2014'}</div>
        </div>
      </div>
    `;
    el.appendChild(div);
  });

  // Bind events
  document.querySelectorAll('.note-toggle').forEach(btn => {
    btn.onclick = () => {
      const area = document.getElementById('note-' + btn.dataset.id);
      area.classList.toggle('open');
    };
  });
  document.querySelectorAll('.desc-toggle').forEach(btn => {
    btn.onclick = () => {
      const panel = document.getElementById(btn.dataset.id);
      panel.classList.toggle('open');
    };
  });
  document.querySelectorAll('.note-btn.save').forEach(btn => {
    btn.onclick = () => {
      const area = document.getElementById('note-' + btn.dataset.id);
      const text = area.querySelector('textarea').value.trim();
      if (text) saveNote(btn.dataset.id, text);
    };
  });
  document.querySelectorAll('.note-btn.cancel').forEach(btn => {
    btn.onclick = () => {
      document.getElementById('note-' + btn.dataset.id).classList.remove('open');
    };
  });
  document.querySelectorAll('.note-btn.delete').forEach(btn => {
    btn.onclick = () => deleteNote(btn.dataset.id);
  });
  document.querySelectorAll('.updated-price-input').forEach(input => {
    input.onblur = () => saveUpdatedPrice(input.dataset.id, input.value.trim());
    input.onkeydown = (e) => { if (e.key === 'Enter') input.blur(); };
  });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

buildFilters();
loadNotes();
</script>
</body>
