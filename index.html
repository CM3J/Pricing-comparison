<style>

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #d8dce8; line-height: 1.5; }
.top-bar { position: sticky; top: 0; z-index: 10; background: #0a0a1a; border-bottom: 1px solid #1a1a3a; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

.status.disconnected { background: rgba(255,100,100,0.15); color: #ff6b6b; }

.status.connected .status-dot { background: #4ecdc4; }
.status.disconnected .status-dot { background: #ff6b6b; }
.btn { border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.btn-primary { background: #1913A9; color: #ECF0FC; }
.btn-primary:hover { background: #2520c7; }
.btn-secondary { background: #16163a; color: #8e93b0; border: 1px solid #2a2a5a; }
.btn-secondary:hover { background: #1e1e4a; color: #c0c4e0; }
.btn-active { background: #1913A9; color: #ECF0FC; border-color: #1913A9; }
.btn svg { width: 14px; height: 14px; }
/* Tabs */
.tabs { display: flex; gap: 0; border-bottom: 1px solid #1a1a3a; background: #0d0d22; }
.tab { padding: 12px 24px; cursor: pointer; font-size: 13px; font-weight: 600; color: #5a5e80; border-bottom: 2px solid transparent; transition: all 0.15s; }
.tab:hover { color: #9b9fd0; }
.tab.active { color: #ECF0FC; border-bottom-color: #1913A9; }
/* Filters */
.filters { padding: 12px 24px; display: flex; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #1a1a3a; background: #0d0d22; }
.content { padding: 0 24px 40px; }
.page { display: none; }
.page.active { display: block; }
/* Category header + RACI */
.cat-header { margin-top: 24px; padding: 10px 16px; background: #1913A9; border-radius: 6px 6px 0 0; font-weight: 700; font-size: 14px; color: #ECF0FC; }
.raci-bar { background: #12123a; border: 1px solid #1a1a3a; border-top: none; border-radius: 0 0 6px 6px; padding: 8px 16px; display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin-bottom: 4px; }

.raci-input { background: #0a0a1a; border: 1px solid #2a2a5a; border-radius: 4px; padding: 3px 8px; color: #d8dce8; font-size: 11px; width: 120px; outline: none; }
.raci-input:focus { border-color: #1913A9; }
.raci-input::placeholder { color: #3a3a5a; }
/* Column header */
.col-header { display: grid; grid-template-columns: 1fr auto 30px auto 1fr auto auto auto; gap: 8px; padding: 8px 8px; margin-top: 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: #5a5e80; font-weight: 600; border-bottom: 1px solid #1a1a3a; }
/* Rows */
.row { border-bottom: 1px solid #1a1a3a; padding: 12px 0; transition: background 0.15s; }
.row:hover { background: #111130; }
.row-main { display: grid; grid-template-columns: 1fr auto 30px auto 1fr auto auto auto; align-items: center; gap: 8px; padding: 0 8px; }
.item-name { font-weight: 600; font-size: 13px; }
.old-name { color: #b0a8d8; }

.price { font-weight: 700; white-space: nowrap; font-family: 'SF Mono', 'Cascadia Code', monospace; font-size: 13px; text-align: right; }
.old-price { color: #b0a8d8; }
.new-price { color: #a0e8cc; }

.delta.up { color: #ff6b6b; background: rgba(255,80,80,0.1); }
.delta.down { color: #4ecdc4; background: rgba(78,205,196,0.1); }

.row-actions { padding: 0 8px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.toggle-btn { background: none; border: none; color: #5a5e80; font-size: 11px; cursor: pointer; padding: 4px 8px; margin-top: 4px; display: inline-flex; align-items: center; gap: 4px; }
.toggle-btn:hover { color: #9b9fd0; }
.toggle-btn .dot { width: 6px; height: 6px; border-radius: 50%; }
.dot.has { background: #f0a040; }
.dot.empty { background: #2a2a4a; }

.dot.client-dot { background: #e8a060; }
.dot.provider-dot { background: #6080e8; }
/* Finding panels */
.concern-panel { display: none; margin: 8px 8px 0; border-radius: 6px; font-size: 12px; line-height: 1.6; }
.concern-panel.open { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.concern-col { padding: 12px 14px; }

.concern-col.provider-col { background: rgba(96,128,232,0.06); border: 1px solid rgba(96,128,232,0.15); border-radius: 0 6px 6px 0; border-left: none; color: #88a8e8; }
.concern-col h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 600; }
.concern-col.client-col h4 { color: #e8a060; }
.concern-col.provider-col h4 { color: #6080e8; }
/* Editable areas */
.edit-area { margin: 8px 8px 0; display: none; }
.edit-area.open { display: block; }
.edit-area textarea { width: 100%; min-height: 60px; padding: 10px 12px; background: #12123a; border: 1px solid #2a2a5a; border-radius: 6px; color: #d8dce8; font-family: inherit; font-size: 12px; resize: vertical; outline: none; }
.edit-area textarea:focus { border-color: #1913A9; }
.edit-actions { display: flex; gap: 8px; margin-top: 6px; justify-content: flex-end; }
.edit-btn { padding: 4px 14px; border-radius: 4px; font-size: 11px; cursor: pointer; border: none; }
.edit-btn.save { background: #1913A9; color: #ECF0FC; }
.edit-btn.save:hover { background: #2520c7; }
.edit-btn.cancel { background: #1a1a3a; color: #8e93b0; }
.edit-btn.delete { background: rgba(255,80,80,0.15); color: #ff6b6b; }
.preview-text { font-size: 11px; margin: 4px 8px 0; white-space: pre-wrap; max-height: 40px; overflow: hidden; }
.preview-comment { color: #f0a040; }
.preview-note { color: #80c8b0; }
/* Desc panel */
.desc-toggle { background: none; border: none; color: #5a5e80; font-size: 11px; cursor: pointer; padding: 2px 8px; text-decoration: underline; }
.desc-toggle:hover { color: #9b9fd0; }
.desc-panel { display: none; margin: 8px 8px 0; padding: 12px; background: #0d0d22; border-radius: 6px; font-size: 11.5px; color: #8e93b0; }
.desc-panel.open { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.desc-col h4 { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: #5a5e80; margin-bottom: 6px; }
.desc-text { white-space: pre-wrap; line-height: 1.5; }
/* Summary page */
.summary-content { padding: 24px; max-width: 900px; }
.summary-section { margin-bottom: 32px; }
.summary-section h2 { color: #ECF0FC; font-size: 16px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #1a1a3a; }
.summary-section h3 { color: #9b9fd0; font-size: 13px; font-weight: 600; margin: 16px 0 8px; }
.summary-text { color: #8e93b0; font-size: 13px; line-height: 1.7; margin-bottom: 12px; }
.summary-textarea { width: 100%; min-height: 120px; padding: 12px 14px; background: #12123a; border: 1px solid #2a2a5a; border-radius: 6px; color: #d8dce8; font-family: inherit; font-size: 13px; resize: vertical; outline: none; line-height: 1.6; }
.summary-textarea:focus { border-color: #1913A9; }
.summary-save { margin-top: 8px; }
.theme-card { background: #12123a; border: 1px solid #1a1a3a; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.theme-card h4 { color: #ECF0FC; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
.theme-card p { color: #8e93b0; font-size: 12px; line-height: 1.6; }
.theme-card .affected { color: #5a5e80; font-size: 11px; margin-top: 6px; font-style: italic; }
/* Toast */
.save-indicator { position: fixed; bottom: 20px; right: 20px; background: #1913A9; color: #ECF0FC; padding: 8px 16px; border-radius: 8px; font-size: 12px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.save-indicator.show { opacity: 1; }

<script>
const DATA = [{"id": "map_2_52", "category": "Website Design", "label": "Website: Mini/Standard", "oldName": "5 Page Bundle the Exoplanet (mini website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "$2,500", "oldRaw": 2500, "newName": "Standard Website", "newDesc": "A complete, professionally designed and developed website built for businesses that need a credible, high-quality digital home. This package delivers up to 5 x pages with a custom user interface, a strong user experience architecture, and an SEO-optimised launch configuration, giving your brand the online presence it needs to earn customer trust and generate enquiries.\n\n\u2022 Custom UI/UX Design: Every page is designed from a bespoke starting point aligned to your brand identity, not a template applied without thought. Visual hierarchy, navigation flow, and content structure are all considered from the perspective of your target customer's journey.\n\n\u2022 Up to 5 Core Pages: Includes the essential pages for a professional brand presence; typically Homepage, About, Services, and Contact, plus one additional page relevant to your business.\n\n\u2022 SEO Launch Configuration: On-page SEO foundations are correctly configured at launch (page titles, meta descriptions, heading structures, image alt text, sitemap submission, and Google Search Console connection) giving your new site the strongest possible start in organic search.\n\nWhy This Matters to You\n\nYour website is your most permanent and controllable marketing asset. It works around the clock, operates in every market you serve, and is the destination every other marketing channel points toward. A professionally built website that earns trust, communicates clearly, and converts visitors is not a cost, it is the foundation of your digital revenue.\n\nSKU: WEB-STD-01", "newPrice": "$3,000", "newRaw": 3000, "newSku": "WEB-STD-01", "clientConcern": "'Custom UI/UX Design' with the explicit claim 'not a template applied without thought' is a strong positioning statement. If the actual process involves selecting and modifying a Webflow template (common and legitimate practice), a savvy client may challenge this claim. 'Up to 5 Core Pages' \u2014 same counting issue as other web packages. R3,000 for a custom 5-page website is competitive but the 'custom' promise creates expectations of bespoke design from scratch.", "providerConcern": "R3,000 for a fully custom 5-page website with bespoke UI/UX is very tight margins for true custom design work. The 'not a template' claim needs to be defensible \u2014 document your design process to show how each site is approached individually. 'SEO Launch Configuration' adds a technical SEO setup step that requires specialist input beyond the designer/developer. If the client's content isn't ready at build time, the project stalls but timeline expectations don't adjust. Consider requiring content delivery as a gate before development begins."}, {"id": "map_0_28", "category": "Website Design", "label": "Website: Small/Growth", "oldName": "10 Page Bundle The Protoplanet (small website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "$3,850", "oldRaw": 3850, "newName": "Growth Website", "newDesc": "This package delivers a comprehensive, strategically architected website for growing businesses that require more depth, more content surface area, and a more sophisticated information architecture than a standard site can provide. With up to ten pages and an advanced lead generation structure, it is built to support a business that is actively scaling its digital presence and marketing investment.\n\n\u2022 Up to 10 Pages with Advanced Information Architecture: A full content and navigation strategy is designed before a single page is built, ensuring your site structure supports both user journeys and search engine crawlability; with logical groupings, clear service hierarchies, and scalable page templates.\n\n\u2022 Lead Generation Mapping: Key conversion touchpoints are identified and implemented throughout the site (strategically placed contact forms, lead magnets, call-to-action blocks, and enquiry pathways) ensuring every section of the site is working toward a commercial objective.\n\n\u2022 Expanded SEO Foundation: A broader SEO architecture covers the full 10 page structure with correct keyword-intent alignment, internal linking strategy, and schema markup where appropriate, providing a stronger launch position in organic search.\n\nWhy This Matters to You\n\nA growth-stage business needs a website that works as hard as its sales team. A site with a shallow page structure limits both search visibility and the number of customer personas and services you can speak to directly. This package builds the digital infrastructure required to support a maturing marketing strategy, not just a presence, but a system.\n\nSKU: WEB-GRW-01", "newPrice": "$5,500", "newRaw": 5500, "newSku": "WEB-GRW-01", "clientConcern": "'Lead Generation Mapping' promises strategic conversion infrastructure \u2014 a client may interpret this as Diginauts guaranteeing leads, not just placing forms. 'Up to 10 Pages' has the same counting ambiguity as other web packages. 'Expanded SEO Foundation' may set an expectation of ongoing organic ranking performance from a once-off build \u2014 the SEO setup helps launch position but doesn't guarantee sustained rankings without ongoing SEO maintenance (a separate service).", "providerConcern": "R5,500 for a 10-page website with advanced IA, lead gen mapping, and expanded SEO is competitive but tight. The IA strategy, lead gen mapping, and SEO configuration add significant pre-build planning time that cheaper agencies skip. If the client has a complex service offering (multiple service lines, multiple locations, multiple customer personas), the IA alone could consume a disproportionate share of the budget. The 'Expanded SEO Foundation' promise means your SEO team needs to be involved in the build process \u2014 coordination cost."}, {"id": "map_1_24", "category": "Website Design", "label": "Website: Medium/Enterprise", "oldName": "25 Page Bundle The Eccentric Jupiter (medium website)", "oldDesc": "Standard display pages only. No advanced animation or multimedia incl. No e-commerce or dynamic web functionality incl.", "oldPrice": "$8,385", "oldRaw": 8385, "newName": "Enterprise Website", "newDesc": "This is the most comprehensive website build package available, designed for organisations that require an extensive, authority-level digital presence with a complex content architecture, custom CMS structures, and a full platform migration if required. Up to twenty-five pages are designed, developed, and launched, with the depth and technical sophistication expected of an enterprise-level brand.\n\n\u2022 Up to 25 x Custom Pages with Custom CMS Structures: Beyond standard page templates, this package includes the development of custom content management structures, repeatable, editable components and content types that allow your team to add, edit, and manage complex content independently after handover, without relying on a developer for every change.\n\n\u2022 Full Platform Migration: If transitioning from an existing website on another platform, a complete content migration is included; ensuring no existing content, SEO equity, or page authority is lost during the transition.\n\n\u2022 Enterprise Information Architecture: A comprehensive IA strategy is developed prior to build, mapping the full site structure across all user personas, service lines, and content categories; ensuring the site scales logically as your organisation grows.\n\nWhy This Matters to You\n\nAn enterprise organisation cannot afford a website that constrains its content, limits its editorial independence, or loses its hard-earned search authority during a platform transition. This package delivers the scope, structure, and technical foundation required for a complex brand to communicate at scale (across multiple service areas, audiences, and markets)\u2014 from a single, professionally managed digital platform.\n\nSKU: WEB-ENT-01", "newPrice": "$11,500", "newRaw": 11500, "newSku": "WEB-ENT-01", "clientConcern": "'Up to 25 pages' \u2014 client may count every URL (blog posts, category pages, utility pages, 404 pages) toward the 25-page count. 'Full Platform Migration' includes no caveat on the size of the existing site \u2014 migrating a 200-page WordPress site with 50 blog posts, custom post types, and legacy URL structures is radically different from migrating a 25-page site. 'Custom CMS Structures' is a powerful promise that could be interpreted as 'build me a custom web application'.", "providerConcern": "R11,500 for an enterprise website with up to 25 custom pages, full migration, custom CMS structures, and enterprise IA is extremely competitive. The migration component alone can consume 30-50% of the budget if the source site is large or poorly structured. 'Custom CMS Structures' in Webflow means building CMS collections, which have platform-specific limitations (reference fields, list limits, nested content) that may not match what the client expects. This package needs a very detailed scope document before any work begins \u2014 otherwise it's the highest-risk item on the entire card."}, {"id": "map_38_32", "category": "Website Design", "label": "Single Page", "oldName": "Standard Display Page The Full Moon", "oldDesc": "A single WordPress webpage that can be used as a standalone page or as part of a website. Diginauts uses advanced design tools, allowing us to achieve complete custom design outcomes for you, affordably and fast. Our pages and websites are completed on staging domains for your convenience and then seamlessly moved over to your main domain, where we host your new webpage or website on world-class WordPress optimised hosting solutions.\nOur approach to using WordPress is best in class. Our websites are typically not reliant on many plugins, keeping WordPress infrastructure light yet robust, secure and fast loading. Essentially you get all the incredible benefits of using WordPress without the standard downsides i.e. a slow website with a cumbersome and rigid design theme. Diginauts does not use design teams, we design all our WordPress websites \u201cby hand\u201d, completely customised for you.\nWebsites developed by Diginauts are customised specifically for mobile, tablet and desktop viewing experiences. We do not simply rely on auto resizing to do our job. Our designers take the time to design specific elements for various screen sizes and perform sizing optimisation on each page element.\nCost per page", "oldPrice": "$550", "oldRaw": 550, "newName": "Landing Page Sprint", "newDesc": "A focused, fast-delivery service that designs and builds a single, purpose-built landing page optimised specifically for converting ad traffic or campaign visitors into leads, enquiries, or purchases. Unlike a full website page, a dedicated landing page is engineered with one sole objective: getting the visitor to take a specific action.\n\n\u2022 Conversion-Focused Design: The page is structured around proven CRO principles (a compelling headline, clear value proposition, social proof elements, friction-reducing form design, and a prominent, singular call-to-action) all designed to maximise the percentage of visitors who convert.\n\n\u2022 Development & Technical Build: Full design and development delivered on Webflow or WordPress, including mobile responsiveness, correct technical formatting for ad platform landing page requirements, and basic on-page SEO configuration.\n\n\u2022 Tracking & Analytics Integration: GA4 event tracking and conversion goal setup ensure that every lead or action generated by the page is correctly attributed and measurable from day one.\n\nWhy This Matters to You\n\nSending paid ad traffic to your homepage or a general website page significantly wastes your advertising budget. Dedicated landing pages (built around a single offer, with no distracting navigation or competing messages) consistently convert at two to five times the rate of standard website pages. This sprint gives you that asset quickly and correctly.\n\nSKU: WEB-SPRINT-01", "newPrice": "$1,250", "newRaw": 1250, "newSku": "WEB-SPRINT-01", "clientConcern": "R1,250 for a single page may prompt comparison to full website pricing (R3,000 for 5 pages) and create a perceived value mismatch. 'Two to five times the conversion rate' is a statistical claim \u2014 if the page underperforms this benchmark, the client has a legitimate basis to challenge the deliverable's effectiveness. No A/B testing, ongoing optimisation, or performance monitoring is included \u2014 this is a build-and-deliver service, but the description implies performance outcomes.", "providerConcern": "The conversion rate claim is the highest-risk promise on this item. Landing page performance depends on traffic quality, offer strength, market conditions, and audience targeting \u2014 none of which Diginauts controls. If the page converts poorly because the client's offer is weak or their ad targeting is off, they'll blame the page. Consider removing the specific conversion multiplier claim or adding a clear caveat. The 'Sprint' positioning implies fast delivery \u2014 define the turnaround time or the word loses meaning."}, {"id": "map_11_56", "category": "Website Design", "label": "Website Maintenance", "oldName": "Design & Management for WordPress website (1x Website)", "oldDesc": "We estimate 5 hours per month minimum to make required design updates and optimise the site where necessary. Should more time be required some months, we can simply let Brainboss know beforehand and quote accordingly.\u00a0\nWe believe this option will adequately cover the below areas:\n\u2022 Monthly website technical analysis and maintenance.\n\n\u2022 Updating the website design with new content.\n\n\u2022 Adding customer testimonials and possible blog / newsletter content", "oldPrice": "$375/mo", "oldRaw": 375, "newName": "Web Maintenance", "newDesc": "This monthly retainer provides the ongoing technical maintenance that every website requires to remain secure, fast, and functional. Without regular maintenance, websites accumulate plugin vulnerabilities, outdated software, broken functionality, and performance degradation; all of which harm both user experience and search engine rankings.\n\n\u2022 Theme & Plugin Updates: We apply all available theme and plugin/extension updates on a monthly basis, testing for conflicts before deploying to ensure updates do not break existing functionality.\n\n\u2022 Automated Daily Backups: Your complete website is backed up automatically every day, with a rolling retention window; ensuring rapid recovery is possible in the event of a security incident, accidental deletion, or update failure.\n\n\u2022 Small Fixes & Minor Amendments: Routine minor fixes (broken links, small layout issues, form malfunctions, or display errors) are addressed within this maintenance scope without additional charge.\n\n\u2022 Monthly Health Report: A brief monthly summary confirms the updates applied, backup status, and any issues identified and resolved during the month.\n\nWhy This Matters to You\n\nA website that is not actively maintained is a security liability and a revenue risk. Outdated plugins are the primary vector for website hacks. Slow, broken, or insecure sites lose both customers and search rankings. This maintenance retainer is the minimum investment required to protect the website asset you have built.\n\nSKU: WEB-MNT-02", "newPrice": "$150/mo", "newRaw": 150, "newSku": "WEB-MNT-02", "clientConcern": "'Small Fixes & Minor Amendments' \u2014 'minor' is entirely subjective. A client considers a new page section a 'small fix'; a developer considers it a feature request. Without a definition (e.g., 'changes completable in under 30 minutes'), every month will involve a negotiation about what's in-scope. R150/mo is affordable but creates a support expectation that the fee may not cover. 'Monthly Health Report' \u2014 the client will expect this to be proactive, not just a list of updates applied.", "providerConcern": "R150/mo is the thinnest margin on the card. One significant WordPress issue (plugin conflict, security vulnerability, broken functionality) can consume 2-4 hours of developer time \u2014 far exceeding the fee for that month. 'Small Fixes' is a scope trap: define it explicitly or you'll spend more time debating what qualifies than actually doing the fixes. 'Automated Daily Backups' requires infrastructure setup and monitoring \u2014 who checks that backups are actually running and restorable? The 'Monthly Health Report' adds a documentation/communication task to an already lean fee."}, {"id": "map_23_21", "category": "E-Commerce / Online Store", "label": "E-Commerce Core", "oldName": "Online Store Functionality.", "oldDesc": "Adding fundamental e-commerce functionality to your website", "oldPrice": "$385", "oldRaw": 385, "newName": "E-Comm Integration", "newDesc": "This service adds a fully functional online shop to an existing or new Webflow or WordPress website, enabling you to sell products or services directly through your web presence without migrating to a dedicated e-commerce platform. It covers complete WooCommerce (WordPress) or Webflow Commerce setup, with initial products configured and payments enabled.\n\n\u2022 WooCommerce or Webflow Shop Setup: Full installation and configuration of the appropriate e-commerce framework for your platform; including product catalogue structure, checkout flow, cart functionality, and order management backend setup.\n\n\u2022 Initial Product Configuration - 5 x Products: 5 x products are built and published as part of the integration, establishing the template and structure for your full catalogue.\n\n\u2022 Payment Gateway Integration: A payment gateway is connected and tested to enable live transactions, covering card payment processing, and additional payment methods as supported by your platform and region.\n\nWhy This Matters to You\n\nAdding e-commerce to your existing website avoids the complexity and cost of migrating to an entirely separate platform, while keeping your brand's digital presence unified under one domain and design system. This integration turns your website from a marketing tool into a revenue-generating asset.\n\nSKU: WEB-ECOM-01", "newPrice": "$1,500", "newRaw": 1500, "newSku": "WEB-ECOM-01", "clientConcern": "'Initial Product Configuration \u2014 5 x Products' may set the expectation that the store launches with 5 products ready, but a client with 50+ SKUs will expect all products included. 'Payment Gateway Integration' doesn't specify which gateways or how many \u2014 a client may need Stripe + PayFast + manual EFT, and assume all three are included. E-commerce on WordPress/Webflow has inherent limitations compared to Shopify (inventory management, variant handling, checkout experience) \u2014 the client may not understand these trade-offs.", "providerConcern": "R1,500 for WooCommerce or Webflow Commerce setup + 5 products + payment gateway is tight if the client's product catalogue has variants, custom fields, or complex pricing (wholesale tiers, subscriptions). WooCommerce specifically is plugin-dependent \u2014 each additional feature (abandoned cart, wishlists, stock management) adds complexity that isn't priced. If the client later wants to migrate to Shopify because of WooCommerce limitations, they may blame the original recommendation."}, {"id": "map_7_46", "category": "E-Commerce / Online Store", "label": "Store Build / Launch", "oldName": "Checkout pages.", "oldDesc": "Pages dedicated to user checkout journey and order payment finalisation.", "oldPrice": "$525", "oldRaw": 525, "newName": "Shopify Launch Sprint", "newDesc": "This is a complete, end-to-end Shopify store launch service, taking you from a blank platform to a fully operational, branded online store ready to receive customers and process transactions. It covers every technical and design element required to get your e-commerce business live and trading.\n\n\u2022 Theme Selection & Brand Application: We select, install, and configure a Shopify theme appropriate to your product category and brand identity, then apply your logo, colour palette, typography, and visual language throughout the entire store to create a cohesive, professional storefront.\n\n\u2022 Core Page Build - 5 Pages: We design and build the 5 x essential store pages: Homepage, Collection/Category page, Product page, About page, and Contact page (each structured for both conversion and SEO).\n\n\u2022 Technical Configuration: Payment gateway integration, shipping zone setup, tax configuration, domain connection, and all standard Shopify administrative settings are configured correctly for your market and operational requirements.\n\n\u2022 Launch Readiness Review: A final pre-launch technical check confirms the store is functional, mobile-responsive, loading efficiently, and free from critical errors before your store goes live.\n\nWhy This Matters to You\n\nA professional, technically sound Shopify store is the difference between a business that earns customer trust at first visit and one that loses sales before the checkout. This sprint delivers the complete, launch-ready foundation your e-commerce operation needs; built correctly from the start so you're not fixing problems under trading conditions.\n\nSKU:\u00a0 SHPF-SPRNT-01", "newPrice": "$3,500", "newRaw": 3500, "newSku": "SHPF-SPRNT-01", "clientConcern": "'Theme Selection & Brand Application' \u2014 client may expect a fully custom design, not a configured Shopify theme. The distinction between 'theme-based with brand application' and 'custom design' is significant but may not be clear to the client. R3,500 for a complete Shopify store is competitive, but '5 x essential pages' may feel limiting if the client needs more. No mention of how many products are uploaded \u2014 product upload is a separate service (SHPF-UP-01, R75/product).", "providerConcern": "R3,500 for a full Shopify store launch is tight if the client has complex requirements (custom functionality, non-standard checkout flows, multiple sales channels). Theme-based builds are efficient but theme limitations can surface mid-project ('we want the menu to work differently'). The 'Launch Readiness Review' is good practice but adds time. If the client expects products to be uploaded as part of the R3,500, there's a scope gap that needs to be addressed at the proposal stage. Pre-launch technical checks can uncover issues that delay launch and frustrate the client."}, {"id": "map_32_43", "category": "E-Commerce / Online Store", "label": "Product Pages", "oldName": "Product Page Design.", "oldDesc": "One product page designed to spec and ready for client replication.", "oldPrice": "$140", "oldRaw": 140, "newName": "Product Upload", "newDesc": "This is a per-unit service for the professional manual creation of individual product and category pages within your Shopify store. Each product is built to a consistent, commercially optimised standard, ensuring your catalogue is presented accurately, completely, and in a format that supports both customer conversion and search engine indexing.\n\n\u2022 Per-Product Page Build: Each unit covers the manual creation of a single product listing, including product title formatting, description population, variant configuration (sizes, colours, quantities), pricing setup, image upload and sequencing, and SEO metadata entry.\n\n\u2022 Category Page Association: Products are correctly assigned to the appropriate collection and category structure within your store, ensuring logical navigation and product discoverability.\n\n\u2022 Quality & Consistency Standards: Every product is built to a defined template standard, ensuring a uniform presentation across your entire catalogue regardless of the volume of products uploaded.\n\nWhy This Matters to You\n\nA product catalogue that is incomplete, inconsistently formatted, or poorly structured costs you sales. Customers who cannot find the information they need (sizing, variants, clear imagery, accurate descriptions) will abandon their purchase. This service ensures every product in your store is presented to the standard required to convert a browser into a buyer.\n\nSKU: SHPF-UP-01", "newPrice": "$75 per Products", "newRaw": 75, "newSku": "SHPF-UP-01", "clientConcern": "R75 per product is clear unit pricing, but there's no minimum order stated. A client could send 1 product at a time, creating disproportionate admin overhead per request. 'SEO metadata entry' implies Diginauts writes the product descriptions and meta data \u2014 or does the client supply copy? This is ambiguous and will cause friction at delivery time. 'Quality & Consistency Standards' references a 'defined template standard' that isn't provided to the client upfront.", "providerConcern": "At R75/product, this only works in batches. Processing individual product uploads one at a time destroys profitability through admin overhead (receiving assets, confirming details, uploading, QA). Set a minimum batch size (10+ products) or add a minimum order fee. If the client expects Diginauts to write product descriptions (not just format them), the time per product increases significantly. Variant-heavy products (e.g., clothing with 5 sizes \u00d7 4 colours = 20 variants) take much longer to configure than simple single-variant products \u2014 but the fee is the same."}, {"id": "map_31_29", "category": "E-Commerce / Online Store", "label": "Category / Collection Pages", "oldName": "Product Category Page.", "oldDesc": "One category page designed to spec and ready for client replication.", "oldPrice": "$250", "oldRaw": 250, "newName": "High-Converter Package", "newDesc": "This service redesigns the most commercially critical pages in your Shopify store (product pages and category/collection pages) applying conversion rate optimisation (CRO) principles to increase the percentage of visitors who add to cart and complete a purchase. It is a targeted design intervention, not a full-store rebuild.\n\n\u2022 Custom Product Page Design: We redesign your product page layout using UX best practices (optimised image presentation, social proof placement, trust signal positioning, urgency mechanisms, and clear, prominent call-to-action placement) to remove friction between browse and purchase.\n\n\u2022 Custom Category Page Design: Collection pages are restructured to improve product discovery, filtering logic, and visual hierarchy, guiding shoppers more effectively toward the products most likely to convert for your specific catalogue.\n\n\u2022 Mobile-First Optimisation: All designs are built and tested for mobile performance first, ensuring conversion rates are not suppressed by layout issues on the devices your customers are most likely using.\n\nWhy This Matters to You\n\nYour product and category pages are where buying decisions are made. Small improvements in how these pages are designed (clearer CTAs, better image layouts, stronger trust signals) can produce significant increases in revenue without requiring any more traffic. This service directly targets the pages that have the highest commercial impact on your store's performance.\n\nSKU:\u00a0SHPF-CONV-01", "newPrice": "$1,200", "newRaw": 1200, "newSku": "SHPF-CONV-01", "clientConcern": "'Targeted design intervention, not a full-store rebuild' \u2014 this caveat is important but may be overlooked in the sales process. Client may expect ALL product pages and ALL category pages redesigned, not just the template/design. If the store has 20 product categories, they may expect 20 unique category page designs. 'Mobile-First Optimisation' \u2014 if the current Shopify theme doesn't support the proposed design changes, this becomes a theme replacement, not a design intervention.", "providerConcern": "R1,200 for product page + category page redesign is viable only if you're designing a template that the client replicates across products, not individually designing each product page. The description doesn't make this distinction clearly. If the client's Shopify theme is heavily customised or outdated, implementing the new design may require theme-level code changes that aren't scoped. 'CRO principles' implies you're promising conversion improvement \u2014 if conversion rate doesn't improve post-redesign, the client will question the investment."}, {"id": "map_36_29", "category": "E-Commerce / Online Store", "label": "Category Design", "oldName": "Simple Product Category Design.", "oldDesc": "Designing product categories for easy user navigation, product scale and effective admin management. Will include a mix of WP, WooCommerce and Custom Fields.", "oldPrice": "$360", "oldRaw": 360, "newName": "High-Converter Package", "newDesc": "This service redesigns the most commercially critical pages in your Shopify store (product pages and category/collection pages) applying conversion rate optimisation (CRO) principles to increase the percentage of visitors who add to cart and complete a purchase. It is a targeted design intervention, not a full-store rebuild.\n\n\u2022 Custom Product Page Design: We redesign your product page layout using UX best practices (optimised image presentation, social proof placement, trust signal positioning, urgency mechanisms, and clear, prominent call-to-action placement) to remove friction between browse and purchase.\n\n\u2022 Custom Category Page Design: Collection pages are restructured to improve product discovery, filtering logic, and visual hierarchy, guiding shoppers more effectively toward the products most likely to convert for your specific catalogue.\n\n\u2022 Mobile-First Optimisation: All designs are built and tested for mobile performance first, ensuring conversion rates are not suppressed by layout issues on the devices your customers are most likely using.\n\nWhy This Matters to You\n\nYour product and category pages are where buying decisions are made. Small improvements in how these pages are designed (clearer CTAs, better image layouts, stronger trust signals) can produce significant increases in revenue without requiring any more traffic. This service directly targets the pages that have the highest commercial impact on your store's performance.\n\nSKU:\u00a0SHPF-CONV-01", "newPrice": "$1,200", "newRaw": 1200, "newSku": "SHPF-CONV-01", "clientConcern": "'Targeted design intervention, not a full-store rebuild' \u2014 this caveat is important but may be overlooked in the sales process. Client may expect ALL product pages and ALL category pages redesigned, not just the template/design. If the store has 20 product categories, they may expect 20 unique category page designs. 'Mobile-First Optimisation' \u2014 if the current Shopify theme doesn't support the proposed design changes, this becomes a theme replacement, not a design intervention.", "providerConcern": "R1,200 for product page + category page redesign is viable only if you're designing a template that the client replicates across products, not individually designing each product page. The description doesn't make this distinction clearly. If the client's Shopify theme is heavily customised or outdated, implementing the new design may require theme-level code changes that aren't scoped. 'CRO principles' implies you're promising conversion improvement \u2014 if conversion rate doesn't improve post-redesign, the client will question the investment."}, {"id": "map_4_29", "category": "E-Commerce / Online Store", "label": "Advanced Category Design", "oldName": "Advance  Product Category Design.", xpect ALL product pages and ALL category pages redesigned, not just the template/design. If the store has 20 product categories, they may expect 20 unique category page designs. 'Mobile-First Optimisation' \u2014 if the current Shopify theme doesn't support the proposed design changes, this becomes a theme replacement, not a design intervention.", "providerConcern": "R1,200 for product page + category page redesign is viable only if you're designing a template that the client replicates across products, not individually designing each product page. The description doesn't make this distinction clearly. If the client's Shopify theme is heavily customised or outdated, implementing the new design may require theme-level code changes that aren't scoped. 'CRO principles' implies you're promising conversion improvement \u2014 if conversion rate doesn't improve post-redesign, the client will question the investment."}, {"id": "map_30_31", "category": "E-Commerce / Online Store", "label": "Payment / Integration", "oldName": "Payment Gateway.", "oldDesc": "Selecting, installing and configuring one or more payment gateways to give users access to purchasing products for multiple regions.", "oldPrice": "$305", "oldRaw": 305, "newName": "Integration Hub", "newDesc": "This service handles the technical integration of your Shopify store with external advertising platforms, analytics tools, and data systems. It establishes the data pipelines and feed connections that allow your store, your marketing platforms, and your reporting tools to communicate with each other accurately and automatically.\n\n\u2022 Product Feed Setup (Google & Meta): We configure and validate XML product feeds for Google Merchant Center and Meta Commerce Manager, ensuring your product catalogue is correctly formatted, approved, and eligible to power Shopping and social commerce campaigns.\n\n\u2022 API Connections & Platform Integrations: We manage the technical connection of third-party tools (analytics platforms, CRM systems, email marketing tools, inventory management systems, or fulfilment platforms) to your Shopify store via native API integrations or middleware platforms.\n\n\u2022 Integration Testing & Validation: Each connection is tested end-to-end to confirm data is flowing correctly, product information is being accurately transmitted, and no data is being lost or misattributed between systems.\n\nWhy This Matters to You\n\nYour Shopify store generates valuable data every second, but that data is only useful if it reaches the right platforms automatically and accurately. Broken or misconfigured integrations silently corrupt your advertising signals, damage your product feed eligibility, and leave your analytics data unreliable. This service builds and validates those connections properly from the start.\n\nSKU: SHPF-INT-01", "newPrice": "$750", "newRaw": 750, "newSku": "SHPF-INT-01", "clientConcern": "'API Connections & Platform Integrations' is extremely broad \u2014 a client reading this may expect CRM, ERP, accounting, email marketing, inventory, AND fulfilment all integrated for R750. The description lists these as examples but doesn't cap the number of integrations. 'Integration Testing & Validation' \u2014 if a third-party API changes post-delivery and breaks the integration, who fixes it? Not stated. Client will assume it's covered.", "providerConcern": "R750 for potentially multiple platform integrations is risky \u2014 a single complex API integration (e.g., connecting to an ERP or custom fulfilment system) can take 10-20 hours. The testing and validation promise is good practice but adds time. Post-delivery support is unaddressed: when Shopify pushes an update that breaks a custom integration, the client will call you. Feed setup for both Google and Meta Merchant Center adds significant compliance management that isn't priced separately."}, {"id": "map_3_31", "category": "E-Commerce / Online Store", "label": "Accounting Integration", "oldName": "Ac tly'). The 'Launch Readiness Review' is good practice but adds time. If the client expects products to be uploaded as part of the R3,500, there's a scope gap that needs to be addressed at the proposal stage. Pre-launch technical checks can uncover issues that delay launch and frustrate the client."}, {"id": "map_21_None", "category": "E-Commerce / Online Store", "label": "LMS Platform", "oldName": "LMS Platform.", "oldDesc": "Build your own learning management system to provide online courses and learning experiences for a one time fee or subscription based model.\nFunctions include: Student Dashboard \u00b7 Collaborative Learning \u00b7 Gamification \u00b7 Microlearning \u00b7 Lesson Unlocks \u00b7 Quizzes & Surveys \u00b7 Certificates \u00b7 Translations \u00b7 Notifications \u00b7 Payments\nSoftware licences sold separately", "oldPrice": "$4,250", "oldRaw": 4250, "newName": null, "newDesc": null, "newPrice": null, "newRaw": null, "newSku": null, "clientConcern": null, "providerConcern": null}, {"id": "map_8_None", "category": "E-Commerce / Online Store", "label": "Community Platform", "oldName": "Community & Social Media Platform.", "oldDesc": "Build a private or public social network with your own features, no restrictions and no algorithms. You can also seamlessly connect your social / business community platform to your LMS and vice versa.\n\nFunctions include: Community Dashboard \u00b7 Profiles \u00b7 Posts \u00b7 Friends & Followers \u00b7 Comments & Likes \u00b7 Direct Messages \u00b7 @Mentions \u00b7 Activity Feeds \u00b7 Notifications \u00b7 Groups \u00b7 Social Search \u00b7 Groups Events \u00b7 Job Boards \u00b7 Online Store \n\nSoftware licences sold separately", "oldPrice": "$6,870", "oldRaw": 6870, "newName": null, "newDesc": null, "newPrice": null, "newRaw": null, "newSku": null, "clientConcern": null, "providerConcern": null}, {"id": "map_6_None", "category": "E-Commerce / Online Store", "label": "B2B Portal", "oldName": "B2B Ordering Portal.", "oldDesc": "Optimise online ordering for your B2B customers.", "oldPrice": "Custom", "oldRaw": null, "newName": null, "newDesc": null, "newPrice": null, "newRaw": null, "newSku": null, "clientConcern": null, "providerConcern": null}, {"id": "map_16_26", "category": "Google Paid Media", "label": "Google Search: Single", "oldName": "Google Search Campaign (1x campaign)", "oldDesc": "Google search ads constitute some of the highest performing ad clicks that money can buy. There is a science behind well run Google Search Ads. Unlock the gravitational potential offered by Google Search Ads coupled with Diginaut\u2019s rocket fuel ad formulas, designed in our low earth orbit laboratory to be super efficient and cost effective.\nService incl. 47 point optimisation checklist by renowned Google Ads legend, Aaron Young. Specific campaign elements are optimised every 72 hours, others every month or quarter. A continuous cycle to ensure optimal performance over the long run. Ads that are not managed, degrade overtime, leading to a rise in ad costs & poor performance.\nAd spend not included", "oldPrice": "$170/mo", "oldRaw": 170, "newName": "Google Search: Individual", "newDesc": "This standalone service provides dedicated management of a single Google Search campaign for brands that need precision targeting of high-intent keyword traffic without a full multi-channel package. It is ideal as an add-on to an existing campaign structure or as a focused service for a specific product line, location, or audience segment.\n\n\u2022 Keyword Research & Strategy: We identify and organise the specific search terms your target audience uses when they are ready to purchase or enquire, building a keyword architecture that captures intent without wasting budget on irrelevant traffic.\n\n\u2022 Ad Copy Creation & Testing: We write and test multiple ad variations, continuously refining headlines and descriptions to improve click-through rates and relevance scores, which directly lowers your cost-per-click.\n\n\u2022 Bid Management & Budget Optimisation: Active bid strategy management ensures your budget is allocated to the keywords and time periods that deliver the strongest results for your specific conversion objectives.\n\nWhy This Matters to You\n\nGoogle Search is the most direct route to capturing people who are actively looking for exactly what you offer. A well-managed search campaign intercepts your ideal customer at the highest-intent moment in their buying journey. This service ensures that moment is never missed due to poor targeting, weak ad copy, or mismanaged bids.\n\nSKU:\u00a0 GPM-SRCH-01", "newPrice": "$425/mo", "newRaw": 425, "newSku": "GPM-SRCH-01", "clientConcern": "This is a standalone campaign service \u2014 but the client may not realise they ALSO need the Baseline Google Ads Management Fee (GPM-MGMT-01, R650/mo). That makes a single search campaign R1,075/mo, not R425/mo. This stacking must be crystal clear in proposals and quotes. The description makes this sound like a complete service, but it explicitly is not \u2014 it depends on the base fee for account setup, tracking, and reporting.", "providerConcern": "At R425/mo for single campaign management, the time allocation is limited. If the campaign requires significant keyword research, negative keyword management, ad copy testing, and bid strategy refinement, the hourly economics deteriorate quickly. The sliding scale discount (undefined) adds negotiation complexity. If a client signs up for just this + base fee and expects the same service depth as the Lead Gen Starter package, you'll under-deliver."}, {"id": "map_17_34", "category": "Google Paid Media", "label": "Google Search: Multi", "oldName": "Google Search Campaign the Doppler Tier  (3x campaigns)", "oldDesc": "Engage two additional search campaigns and save. \n\nAd spend not included", "oldPrice": "$415/mo", "oldRaw": 415, "newName": "Lead Gen Stack: Starter", "newDesc": "This entry-level Google Ads package is designed for service-based businesses that need to capture high-intent leads from Google Search. It targets people who are actively searching for the specific services you offer, driving them to your website or lead form at the precise moment they are ready to enquire.\n\n\u2022 Search Campaign Setup & Management: We build and manage targeted Google Search campaigns using carefully selected keywords aligned to your services and geographic market. Ads appear when prospects are actively searching, ensuring your budget reaches the most motivated audience.\n\n\u2022 Basic Remarketing: A foundational remarketing layer re-engages users who visited your website but did not convert, keeping your brand visible as they continue browsing - a cost-efficient way to recover warm prospects.\n\n\u2022 Conversion Tracking Configuration: We ensure your campaigns are correctly connected to measurable outcomes (form submissions, phone calls, or bookings) so performance data is accurate and optimisation is evidence-based.\n\nWhy This Matters to You\n\nSearch advertising targets people who are already looking for what you offer. This is the highest-intent traffic available and, when managed correctly, consistently delivers among the lowest cost-per-lead of any digital channel. This starter stack puts your business in front of the right people at exactly the right moment.\n\nSKU: GPM-LDGN-01", "newPrice": "$750/mo", "newRaw": 750, "newSku": "GPM-LDGN-01", "clientConcern": "'Entry-level' positioning at R750/mo, but with the base fee (R650) the actual cost is R1,400/mo \u2014 a significant monthly commitment for an 'entry-level' service. 'Basic Remarketing' is included but doesn't specify who creates the display remarketing creative \u2014 if the client must supply display ads, they may not have them. 'Conversion Tracking Configuration' is also covered in the base fee \u2014 the client may perceive they're paying twice for the same thing.", "providerConcern": "There's a genuine feature overlap between this package and the base fee \u2014 both promise conversion tracking configuration and reporting. Clarify what each layer delivers distinctly. 'Basic Remarketing' as an included add-on creates creative production questions: if you're supplying display banners, that's a design cost not priced into R750/mo. If the client must supply creative, the remarketing campaign may sit dormant while waiting for assets. The 'Starter' label may deter higher-value clients who don't want to self-identify as entry-level."}, {"id": "map_18_33", "category": "Google Paid Media", "label": "Google Search: Scale", "oldName": "Google Search Campaign The Dynamo Tier  (5x campaigns)", "oldDesc": "Engage four additional search campaigns and save. \n\nAd spend not included", "oldPrice": "$605/mo", "oldRaw": 605, "newName": "Lead Gen Stack: Scaler", "newDesc": "This advanced Google Ads package delivers a comprehensive multi-channel lead generation system for brands that are ready to scale their pipeline aggressively. By combining Search, Performance Max, and Video Action Campaigns, it targets prospects at every stage of the buyer journey - from first discovery to final conversion decision.\n\n\u2022 Search Campaign Management: Precision keyword targeting captures high-intent prospects actively searching for your services, delivering enquiries from the most motivated segment of your market.\n\n\u2022 Performance Max for Lead Generation: Google's most advanced campaign type uses machine learning to serve your ads across every Google-owned surface (Search, Display, Gmail, YouTube, and Maps) optimising in real time for your specific lead generation goals.\n\n\u2022 Video Action Campaigns: Targeted video ads on YouTube engage prospects earlier in their decision-making process, building awareness and trust with audiences before they reach the search stage.\n\n\u2022 Unified Conversion Strategy: All campaign types are connected to a cohesive conversion tracking framework, allowing cross-channel attribution and holistic optimisation across the full funnel.\n\nWhy This Matters to You\n\nA single-channel approach to lead generation leaves significant revenue on the table. Prospects today research across multiple touchpoints before making contact. This stack ensures your brand is present and persuasive at every stage of that journey, from initial awareness through to the moment of enquiry.\n\nSKU: GPM-LDGN-02", "newPrice": "$1,800/mo", "newRaw": 1800, "newSku": "GPM-LDGN-02", "clientConcern": "R1,800/mo for Search + PMax + Video Action is a significant investment, but stacking with the base fee (R650) brings the total to R2,450/mo. 'Video Action Campaigns' require video creative \u2014 but the description doesn't state who supplies it. If the client doesn't have video assets, an entire campaign type can't run despite being part of the package they're paying for. 'Unified Conversion Strategy' promises cross-funnel attribution, which may not match the client's GA4 setup capabilities.", "providerConcern": "Managing three distinct campaign types simultaneously is operationally intensive. At R2,450/mo total (with base fee), the per-campaign time allocation is limited. Video Action Campaigns are particularly dependent on creative quality \u2014 if the client supplies poor video, the campaign will underperform and they'll blame management, not creative. The 'Scaler' positioning implies aggressive growth \u2014 if lead volume doesn't increase proportionally to the fee increase vs. Starter, the client will question the upgrade."}, {"id": "map_12_37", "category": "Google Paid Media", "label": "PMax: Single", "oldName": "Google PMax Campaign (1x campaign)", "oldDesc": "Google\u2019s No. 1 advertising solution. Performance Max campaigns allow advertisers to achieve incredible results by mixing search, display and video into one dynamic and algorithmic ecosystem. Google is able to access big datasets, trends and insights to trigger ads of all various forms to your prospective clients at the most ideal times and locations along the customer purchasing journey.\nService incl. 47 point checklist across search, display and video elements, campaign display artwork, refreshed monthly.\u00a0Recommended with Media Shower.\u00a0\nAd spend not included", "oldPrice": "$265/mo", "oldRaw": 265, "newName": "Performance Max Campaign Management", "newDesc": "Performance Max is Google's most powerful and intelligent campaign type, using machine learning to serve your ads across every Google-owned platform (Search, Shopping, Display, YouTube, Gmail, and Google Maps) from a single, unified campaign. This service provides expert management of that campaign to maximise the quality of the signals fed to the algorithm and ensure it is continuously optimised toward your actual business goals.\n\n\u2022 Full Campaign Architecture & Asset Management: We structure and populate your Performance Max campaign with all required creative elements (images, headlines, descriptions, and logos) rotated and refreshed on a monthly basis to prevent creative fatigue and maintain algorithmic engagement.\n\n\u2022 47-Point Optimisation Checklist: Each optimisation cycle follows a structured, comprehensive review process covering audience signals, asset performance, budget pacing, conversion goals, and exclusion lists to ensure no performance lever is overlooked.\n\n\u2022 Audience Signal Configuration: We build and continuously refine the audience signal inputs that guide the machine learning model toward your best-converting customer profiles, accelerating the algorithm's learning phase.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount structure, enquire for specific pricing based on your service combination.\n\nWhy This Matters to You\n\nPerformance Max gives Google's AI access to your entire advertising budget across all its platforms simultaneously. Without expert management, the algorithm will optimise for whatever it finds easiest to achieve, not necessarily what is most valuable to your business. Professional management ensures the machine is pointed at the right objectives and that your creative assets remain strong enough to keep it performing.\n\nSKU: GPM-PMAX-01", "newPrice": "$365/mo", "newRaw": 365, "newSku": "GPM-PMAX-01", "clientConcern": "'47-Point Optimisation Checklist' is a strong, specific claim \u2014 any savvy client will request the checklist and hold you accountable to every point monthly. 'Sliding Scale Discount' is mentioned again without definition \u2014 the 4th occurrence across Google Ads items. At R365/mo + R650 base = R1,015/mo total for a single PMax campaign, the stacking needs to be explicit in every proposal.", "providerConcern": "The 47-point checklist is a differentiator but also a liability \u2014 document it, version-control it, and make sure every PMax manager follows it consistently. If one team member skips steps, you're exposed. PMax campaigns have limited manual optimisation levers compared to Search \u2014 much of the 'management' is asset refresh and signal tuning, which clients may not perceive as high-value work. The undefined sliding scale discount creates negotiation overhead on every multi-service deal."}, {"id": "map_14_37", "category": "Google Paid Media", "label": "PMax: Multi", "oldName": "Google PMax Campaign the Multi Moon Tier  (3x campaigns)", "oldDesc": "Engage two additional PMax campaigns and save 10% on costs.\nRecommended with Media Shower. Ad spend not included", "oldPrice": "$605/mo", "oldRaw": 605, "newName": "Performance Max Campaign Management", "newDesc": "Performance Max is Google's most powerful and intelligent campaign type, using machine learning to serve your ads across every Google-owned platform (Search, Shopping, Display, YouTube, Gmail, and Google Maps) from a single, unified campaign. This service provides expert management of that campaign to maximise the quality of the signals fed to the algorithm and ensure it is continuously optimised toward your actual business goals.\n\n\u2022 Full Campaign Architecture & Asset Management: We structure and populate your Performance Max campaign with all required creative elements (images, headlines, descriptions, and logos) rotated and refreshed on a monthly basis to prevent creative fatigue and maintain algorithmic engagement.\n\n\u2022 47-Point Optimisation Checklist: Each optimisation cycle follows a structured, comprehensive review process covering audience signals, asset performance, budget pacing, conversion goals, and exclusion lists to ensure no performance lever is overlooked.\n\n\u2022 Audience Signal Configuration: We build and continuously refine the audience signal inputs that guide the machine learning model toward your best-converting customer profiles, accelerating the algorithm's learning phase.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount structure, enquire for specific pricing based on your service combination.\n\nWhy This Matters to You\n\nPerformance Max gives Google's AI access to your entire advertising budget across all its platforms simultaneously. Without expert management, the algorithm will optimise for whatever it finds easiest to achieve, not necessarily what is most valuable to your business. Professional management ensures the machine is pointed at the right objectives and that your creative assets remain strong enough to keep it performing.\n\nSKU: GPM-PMAX-01", "newPrice": "$365/mo", "newRaw": 365, "newSku": "GPM-PMAX-01", "clientConcern": "'47-Point Optimisation Checklist' is a strong, specific claim \u2014 any savvy client will request the checklist and hold you accountable to every point monthly. 'Sliding Scale Discount' is mentioned again without definition \u2014 the 4th occurrence across Google Ads items. At R365/mo + R650 base = R1,015/mo total for a single PMax campaign, the stacking needs to be explicit in every pr ablish and maintain the live connection between your product catalogue and Google Merchant Center, ensuring pricing, availability, and product attributes update in real time as your inventory changes.\n\n\u2022 Feed Optimisation & Refinement: Product titles, descriptions, categories, and attributes are refined over time using performance data to improve Google's ability to match your products to the right search queries, increasing impressions and click-through rates.\n\n\u2022 Compliance & Policy Management: We actively monitor your feed against Google's Limited Use and Shopping policies, resolving disapprovals and policy flags to ensure your products remain eligible to serve at all times.\n\n\u2022 Sliding Scale Discount: Ordering multiple Google Ads service lines activates a volume-based discount, enquire for pricing based on your complete service combination.\n\nWhy This Matters to You\n\nA Shopping campaign is only as strong as the product feed behind it. Inaccurate prices, disapproved listings, or poorly optimised titles mean wasted budget and missed sales. This service ensures the foundation of your e-commerce advertising is always accurate, approved, and optimised; so your ad spend goes further.\n\nSKU: GPM -FEED-01", "newPrice": "$145/mo", "newRaw": 145, "newSku": "GPM -FEED-01", "clientConcern": "R145/mo for ongoing feed management sounds affordable, but clients may assume this includes product data entry, product photography coordination, and catalogue expansion \u2014 it doesn't. 'Feed Optimisation & Refinement' is described as ongoing improvement, but at this price, the actual time spent per month must be minimal. 'Sliding Scale Discount' is mentioned again without definition.", "providerConcern": "R145/mo only works if feed management is largely automated and the client's product catalogue is stable. Any manual feed work (custom labels, supplemental feeds, feed rule creation) quickly exceeds the time allocation. Google Merchant Center disapprovals can ampaign objective, whether driving profile visits, link clicks, saves, or shares.\n\nWhy This Matters to You\n\nOrganic social content that is designed with commercial intent, not just produced to fill a posting schedule, compounds in value over time. Consistent, high-quality posts build audience trust, support your paid advertising performance, and create a library of brand assets that continues working for you long after it is published.\n\nSKU: OSC -STATC-01", "newPrice": "$75 per Post/mo", "newRaw": 75, "newSku": "OSC -STATC-01", "clientConcern": "R75/post is clean and straightforward. 'SEO-Optimised Caption (up to 150 words)' \u2014 the word cap is a good scope boundary. No revision limit mentioned \u2014 client may expect 2-3 rounds of design changes at R75. Client may expect platform-specific variations (different crops for Stories, LinkedIn, Twitter/X) from a single R75 unit, which would multiply the deliverables.", "providerConcern": "R75 per post including design + caption + hashtag research is sustainable only at volume with a templated production system. The 'strategic foundation, competitor intelligence, industry trends' promise in the description adds a research/planning layer that R75 may not support per-post. If the client expects each post to be individually strategised (not batched), the per-post planning time exceeds the fee. Consider pricing this as a monthly batch (minimum 8 posts) rather than individual units to create production efficiency."}, {"id": "map_29_48", "category": "Social Content & Organic", "label": "Pay Per Reel", "oldName": "Pay Per Reel (PPR)", "oldDesc": "Design short form videos to ignite the core of your social media channels. Short form videos have better organic reach potential, allowing more people to see your content.", "oldPrice": "$135", "oldRaw": 135, "newName": "Short-Form Video Production (Reels) (PPR)", "newDesc": "Professional post-production of a single short-form vertical video asset, specifically engineered for high organic reach on Instagram Reels, TikTok, and YouTube Shorts. These assets are built around platform algorithm requirements, not just general video production standards, with a specific focus on maximising discoverability and watch-through rates within social feed environments.\n\n\u2022 High-Resolution Vertical Video (9:16, up to 45 seconds): A single vertical Reel produced to broadcast-quality standards, structured with a strong hook, high-retention mid-section, and a clear end-screen call-to-action.\n\n\u2022 Safe-Zone Optimisation: A technical layout review maps all text, graphics, and key visual elements against platform-specific UI dead zones (the areas where buttons, captions, and interface overlays appear) ensuring your headlines and key messaging are never obscured on any platform or device.\n\n\u2022 SEO-Optimised Caption & Hashtag Research: A professionally written caption and curated hashtag set designed to maximise the Reel's organic discoverability within the platform's search and recommendation systems.\n\nWhy This Matters to You\n\nShort-form video is the most algorithmically favoured content format on every major social platform. A professionally produced Reel that respects platform technical requirements (safe zones, correct dimensions, hook structure) will consistently outreach and outperform an unoptimised video, regardless of how good the underlying content is. Technical quality and creative quality must both be present.\n\nSKU: OSC -REEL-01", "newPrice": "$235 per Reel/mo", "newRaw": 235, "newSku": "OSC -REEL-01", "clientConcern": "'Up to 45 seconds' \u2014 client may push for 60s or longer for YouTube-focused content. R235/reel with 'broadcast-quality standards' may create expectations beyond what the price supports. 'SEO-Optimised Caption & Hashtag Research' \u2014 this is content writing bundled into a video production SKU, which may confuse scope with the standalone Social Content items (PPP). If a client buys both PPR and PPP, they may question why they're paying for captions in both.", "providerConcern": "R235 per reel for broadcast-quality production + safe-zone optimisation + caption writing + hashtag research is a lot of deliverables for the price. Margin depends on the source footage quality \u2014 if the client supplies shaky phone footage, producing 'broadcast-quality' output is impossible without significant post-production time. The caption/hashtag component means you need a copywriter involved in a video production workflow \u2014 coordination cost. Consider separating caption writing as optional or bundled only with the Content Management package."}, {"id": "map_47_51", "category": "Social Content & Organic", "label": "Social Profile Setup", "oldName": "The Social Booster", "oldDesc": "Branded content designed to uplift the visual experience of your social media accounts, incl. Leaderboard banners, logo/profile circles and 4x posts, customised for Instagram, Facebook and LinkedIn.", "oldPrice": "$290", "oldRaw": 290, "newName": "Social Profile Visual Refresh", "newDesc": "A comprehensive visual redesign of your social media profiles across Instagram, Facebook, and LinkedIn, ensuring every element of your brand's social presence communicates professionalism, consistency, and credibility at first glance. This package updates both profile branding assets and delivers an initial batch of high-quality feed posts to populate the refreshed profiles.\n\n\u2022 Profile Icons & Banner Variations: 2 x professional profile icon variations and 2 x banner designs, each optimised for the specific dimensions and display requirements of Facebook, LinkedIn Company, and LinkedIn Member profiles, ensuring your brand renders correctly and impactfully on every platform.\n\n\u2022 4 x High-Resolution Feed Posts: 4 x custom-designed 4:5 static posts are produced to immediately populate your refreshed profiles with quality content, preventing the empty or inconsistent appearance that undermines the impact of new profile branding.\n\n\u2022 SEO-Optimised Captions & Hashtag Research: 4 x professionally written captions with targeted hashtag research and strategic CTAs, ready to accompany each post at publishing.\n\nWhy This Matters to You\n\nSocial media profiles are the digital equivalent of a shopfront window. Inconsistent branding, outdated imagery, or incorrectly sized assets immediately communicate a lack of professionalism, and send potential customers to competitors who look more established. This refresh ensures your social presence commands the trust your business deserves.\n\nSKU: OSC -REFR-01", "newPrice": "$390", "newRaw": 390, "newSku": "OSC -REFR-01", "clientConcern": "'2 x profile icon variations and 2 x banner designs' \u2014 client may expect platform-specific designs for each of Instagram, Facebook, and LinkedIn (i.e., 6 banners not 2). The description mentions 'Facebook, LinkedIn Company, and LinkedIn Member profiles' but only 2 banner designs are included \u2014 the math doesn't add up for 3 platforms. '4 x posts' \u2014 are these unique designs or the same post formatted for multiple platforms? Not specified.", "providerConcern": "R390 for 2 icons + 2 banners + 4 posts + 4 captions is a significant amount of creative output. Margin depends on how much of this can be templated vs. bespoke. If the client expects unique designs per platform (not just resized versions), the workload increases substantially. The 'SEO-Optimised Captions' component adds copywriting to what is positioned as a design service \u2014 ensure the right person is allocated to each task. This is a one-time service \u2014 consider whether it should be the entry point for the Monthly Profile & Content Management package."}, {"id": "map_48_35", "category": "Social Content & Organic", "label": "Social Content Package", "oldName": "The Social Orbiter", "oldDesc": "Social Booster + 12x posts, customised for Instagram, Facebook and LinkedIn.", "oldPrice": "$610/mo", "oldRaw": 610, "newName": "Monthly Profile & Content Management", "newDesc": "A fully integrated monthly social media management package combining a complete profile visual refresh with a consistent, high-volume monthly content schedule. This service delivers 12 x custom-designed posts per month across your primary social channels, maintaining a high level of brand activity, audience engagement, and professional visual presence on an ongoing basis.\n\n\u2022 Everything from Social Profile Visual Refresh: The full profile refresh is included as the foundation (profile icons, banner variations across all three platforms, and the initial 4 x posts) establishing a professional brand baseline before ongoing management begins.\n\n\u2022 8 x Additional Monthly Posts: Beyond the 4 x posts included in the profile refresh, 8 x further custom-designed static posts are produced, each with a professionally written SEO-optimised caption, targeted hashtag research, and a strategic call-to-action, delivering 12 x posts in total per month.\n\n\u2022 Consistent Monthly Output: Content is planned, designed, written, and delivered on a structured monthly schedule, ensuring your social channels never go dark and your brand remains consistently active and visible to your audience.\n\nWhy This Matters to You\n\nConsistency is the most underrated factor in social media success. Brands that post sporadically, even with high-quality individual posts, lose algorithmic favour and audience attention rapidly. This package ensures the volume and consistency that keeps your brand top-of-mind, builds compounding organic reach, and demonstrates to both the algorithm and your audience that your brand is active, credible, and worth following.\n\nSKU: OSC-MGMT-01", "newPrice": "$860", "newRaw": 860, "newSku": "OSC-MGMT-01", "clientConcern": "CRITICAL: The pricing (R860) has frequency 'once' in the system but the description clearly describes a monthly service (12 posts per month). This WILL cause invoicing disputes. The service includes 'Everything from Social Profile Visual Refresh' \u2014 client may expect the full profile refresh is repeated monthly, not a one-time foundation. 12 posts/month is 3 per week \u2014 client may expect daily posting and feel under-served.", "providerConcern": "BILLING MISMATCH: Fix the frequency from 'once' to 'monthly' before this goes live \u2014 this will cause billing confusion guaranteed. At R860/mo for 12 posts with captions, hashtags, and CTAs, you're producing content at ~R72/post \u2014 cheaper than the standalone PPP rate (R75/post) which creates an internal pricing inconsistency. The profile refresh inclusion means month 1 has significantly more work (profile assets + 12 posts) than subsequent months. Consider a setup fee + monthly retainer model instead."}, {"id": "map_49_35", "category": "Social Content & Organic", "label": "Social Growth Package", "oldName": "The Social Star Tracker", "oldDesc": "The Social Orbiter + social growth strategy, supported by strategically relevant content design and paid media ads configured to drive account engagement.\u00a0\n\nAd spend not included", "oldPrice": "$1,400/mo", "oldRaw": 1400, "newName": "Monthly Profile & Content Management", "newDesc": "A fully integrated monthly social media management package combining a complete profile visual refresh with a consistent, high-volume monthly content schedule. This service delivers 12 x custom-designed posts per month across your primary social channels, maintaining a high level of brand activity, audience engagement, and professional visual presence on an ongoing basis.\n\n\u2022 Everything from Social Profile Visual Refresh: The full profile refresh is included as the foundation (profile icons, banner variations across all three platforms, and the initial 4 x posts) establishing a professional brand baseline before ongoing management begins.\n\n\u2022 8 x Additional Monthly Posts: Beyond the 4 x posts included in the profile refresh, 8 x further custom-designe  Design", "label": "Brand Guidelines", "oldName": "The Brand Pulsar", "oldDesc": "A brief yet comprehensive brand guideline / corporate identity resource, designed to guide brand stakeholders, partners and suppliers on the optimal use of your brand across the digiverse.", "oldPrice": "$895", "oldRaw": 895, "newName": "Brand Design Discovery/Audit: Research for design", "newDesc": "A dedicated strategic research and audit phase that analyses your existing brand identity, your competitive design landscape, and your current digital asset ecosystem; establishing the visual and strategic foundation required for high-quality, on-brand design work across all subsequent social, web, and marketing deliverables.\n\n\u2022 Corporate Identity & Collateral Audit: We conduct a comprehensive review of your existing brand assets (logo files, colour systems, typography, brand guidelines, and current digital collateral) assessing their consistency, quality, and fitness for purpose across digital environments.\n\n\u2022 Competitive Visual Benchmarking: A structured analysis of your direct competitors' visual presence across web, social, and advertising is produced, identifying design patterns that are dominant in your sector and opportunities to differentiate through visual positioning.\n\n\u2022 Digital Asset Requirements Mapping: We document the complete set of design assets required for your digital marketing programme, from social post formats to advertising specifications to website UI components, providing a clear production roadmap for all subsequent design work.\n\n\u2022 Cross-Stakeholder Design Direction Alignment: A structured session with your key stakeholders ensures that design direction decisions are aligned across the organisation before production begins, preventing costly revisions later.\n\nWhy This Matters to You\n\nDesign without research produces aesthetically pleasing assets that are commercially ineffective. This audit phase ensures that everything produced subsequently (every social post, every website page, every advertising creative) is built on a solid understanding of your brand, your competition, and your audience's visual expectations.\n\nSKU: AS-AUDIT-01", "newPrice": "$1,450", "newRaw": 1450, "newSku": "AS-AUDIT-01", "clientConcern": "R1,450 once-off for a research/audit phase that produces NO design deliverables. A client expecting logos, brand guidelines, social templates, or any visual output will be disappointed and may feel they paid for a meeting and a PDF. 'Cross-Stakeholder Design Direction Alignment' implies facilitation of a workshop/meeting but doesn't scope: how many attendees? How many sessions? What if stakeholders disagree \u2014 is conflict resolution included? The output needs to be very clearly defined upfront.", "providerConcern": "This is a gateway service designed to sell subsequent design work \u2014 but if the audit doesn't lead to a design engagement, the R1,450 needs to stand on its own as profitable. 'Competitive Visual Benchmarking' is research-intensive work that can expand dramatically depending on how many competitors are analysed. 'Digital Asset Requirements Mapping' is essentially a scope document for future work \u2014 you're being paid to write your own brief. The workshop facilitation risk is real: difficult stakeholders can turn a 2-hour session into a 6-hour negotiation."}, {"id": "map_40_9", "category": "Brand Design", "label": "Brand Strategy", "oldName": "The Brand Supernova (Optional - Tick To Add)", "oldDesc": "Warp drive your brand into a deep geocentric brand design experience. Develop your brand communication strategy, UVP, positioning statement, key messaging, brand personality, brand voice, brand story and target audience, made clear and comprehensive by a detailed corporate identity.", "oldPrice": "$4,595", "oldRaw": 4595, "newName": "Brand Design Discovery/Audit: Research for design", "newDesc": "A dedicated strategic research and audit phase that analyses your exi
